<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Katana · Dash & Slash</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-wrapper {
            background: #111927;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 180, 255, 0.05);
            border: 1px solid rgba(0, 180, 255, 0.08);
        }

        canvas {
            display: block;
            border-radius: 12px;
            background: #0d1520;
            width: 100%;
            height: auto;
            aspect-ratio: 900 / 600;
            touch-action: none;
            cursor: none;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 8px;
            color: #6a8ba0;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .hud .status {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .hud .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hud .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: background 0.2s;
        }

        .dot.ready {
            background: #00e676;
            box-shadow: 0 0 16px rgba(0, 230, 118, 0.5);
        }
        .dot.cooldown {
            background: #ff5252;
            box-shadow: 0 0 16px rgba(255, 82, 82, 0.4);
        }
        .dot.dashing {
            background: #00e5ff;
            box-shadow: 0 0 24px rgba(0, 229, 255, 0.7);
        }

        .hud .info {
            color: #4a7a8a;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hud .info span {
            color: #8ac4e0;
            font-weight: 600;
            min-width: 36px;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 8px;
                border-radius: 12px;
            }
            .hud {
                font-size: 11px;
                flex-wrap: wrap;
                gap: 6px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <canvas id="game" width="900" height="600"></canvas>
        <div class="hud">
            <div class="status">
                <div class="indicator">
                    <span style="color:#4a7a8a;">DASH</span>
                    <span class="dot ready" id="dashDot"></span>
                </div>
                <div class="indicator">
                    <span style="color:#4a7a8a;">SPEED</span>
                    <span id="speedDisplay" style="color:#8ac4e0; font-weight:600; min-width:40px;">0</span>
                </div>
            </div>
            <div class="info">
                <span style="color:#4a7a8a;">⚔️</span>
                <span id="swordStatus" style="color:#8ac4e0;">READY</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const dashDot = document.getElementById('dashDot');
        const speedDisplay = document.getElementById('speedDisplay');
        const swordStatus = document.getElementById('swordStatus');

        const W = 900,
            H = 600;

        // ---------- PLAYER ----------
        const player = {
            x: W / 2,
            y: H / 2,
            radius: 20,
            speed: 3.6,
            vx: 0,
            vy: 0,
            friction: 0.88,
            accel: 0.45,
            facing: 0, // always faces the finger / mouse

            // Dash
            isDashing: false,
            dashMultiplier: 1,
            dashDuration: 350,
            dashCooldown: 1200,
            dashTimer: 0,
            cooldownTimer: 0,
            dashSpeedBoost: 9.0,

            trail: [],
            maxTrail: 35,
            flashTimer: 0,
        };

        // ---------- SWORD (Katana) ----------
        const sword = {
            angle: 0,
            targetAngle: 0,
            swinging: false,
            swingTimer: 0,
            swingDuration: 400, // ms (slow draw + fast swing)
            startAngle: 0,
            currentAngle: 0,
            cooldownTimer: 0,
            cooldownDuration: 350,
            length: 110, // increased radius
            trail: [],
            maxTrail: 25,
        };

        // ---------- JOYSTICK (sword aim) ----------
        const joystick = {
            x: 110,
            y: 100,
            radius: 64,
            knobRadius: 24,
            active: false,
            touchId: null,
            angle: 0,
            dx: 0,
            dy: 0,
            baseX: 0,
            baseY: 0,
        };

        // ---------- PARTICLES ----------
        let particles = [];

        // ---------- FLASH ----------
        let flashAlpha = 0;

        // ---------- INPUT ----------
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            up: false,
            down: false,
            left: false,
            right: false,
            space: false,
        };

        let activePointer = null; // { x, y, id }

        // ---------- UTILITY ----------
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function lerp(a, b, t) { return a + (b - a) * t; }

        // ---------- PARTICLES ----------
        function spawnDashParticles(x, y, angle, count = 28) {
            for (let i = 0; i < count; i++) {
                const speed = 3 + Math.random() * 8;
                const a = angle + (Math.random() - 0.5) * 1.4;
                const size = 3 + Math.random() * 7;
                particles.push({
                    x: x + (Math.random() - 0.5) * 14,
                    y: y + (Math.random() - 0.5) * 14,
                    vx: Math.cos(a) * speed * (0.6 + Math.random() * 0.6),
                    vy: Math.sin(a) * speed * (0.6 + Math.random() * 0.6),
                    life: 1,
                    decay: 0.006 + Math.random() * 0.012,
                    size: size,
                    maxSize: size,
                    color: `hsl(${190 + Math.random() * 30}, 100%, ${65 + Math.random() * 30}%)`,
                });
            }
        }

        function spawnTrailParticles(x, y, angle, count = 8) {
            for (let i = 0; i < count; i++) {
                const speed = 1.5 + Math.random() * 3.5;
                const a = angle + (Math.random() - 0.5) * 0.8;
                particles.push({
                    x: x + (Math.random() - 0.5) * 8,
                    y: y + (Math.random() - 0.5) * 8,
                    vx: Math.cos(a) * speed * 0.5,
                    vy: Math.sin(a) * speed * 0.5,
                    life: 1,
                    decay: 0.02 + Math.random() * 0.03,
                    size: 2 + Math.random() * 4,
                    maxSize: 5,
                    color: `hsl(${200 + Math.random() * 40}, 90%, ${70 + Math.random() * 25}%)`,
                });
            }
        }

        function spawnSwordSlash(x, y, angle, count = 32) {
            for (let i = 0; i < count; i++) {
                const speed = 4 + Math.random() * 10;
                const a = angle + (Math.random() - 0.5) * 1.2;
                const size = 2 + Math.random() * 7;
                particles.push({
                    x: x + Math.cos(angle) * 50 + (Math.random() - 0.5) * 40,
                    y: y + Math.sin(angle) * 50 + (Math.random() - 0.5) * 40,
                    vx: Math.cos(a) * speed * (0.7 + Math.random() * 0.5),
                    vy: Math.sin(a) * speed * (0.7 + Math.random() * 0.5),
                    life: 1,
                    decay: 0.015 + Math.random() * 0.025,
                    size: size,
                    maxSize: size,
                    color: `hsl(${40 + Math.random() * 30}, 100%, ${70 + Math.random() * 25}%)`,
                });
            }
        }

        // ---------- DASH ----------
        function performDash() {
            if (player.isDashing) return;
            if (player.cooldownTimer > 0) return;

            player.isDashing = true;
            player.dashTimer = player.dashDuration;
            player.dashMultiplier = player.dashSpeedBoost;

            spawnDashParticles(player.x, player.y, player.facing, 40);
            for (let i = 0; i < 12; i++) {
                spawnTrailParticles(player.x, player.y, player.facing + (Math.random() - 0.5) * 0.8, 5);
            }

            player.flashTimer = 120;
            window.shakeAmount = 10;
            window.shakeTimer = 180;
        }

        // ---------- SWORD SWING ----------
        function performSwordSwing(angle) {
            if (sword.swinging) return;
            if (sword.cooldownTimer > 0) return;

            sword.swinging = true;
            sword.swingTimer = sword.swingDuration;
            sword.startAngle = angle;
            sword.currentAngle = angle;
            swordStatus.textContent = 'SWING!';

            // Spawn slash particles
            spawnSwordSlash(player.x, player.y, angle, 35);
            window.shakeAmount = 8;
            window.shakeTimer = 180;

            // Trail
            for (let i = 0; i < 14; i++) {
                sword.trail.push({ x: player.x, y: player.y, angle: angle, life: 1 });
                if (sword.trail.length > sword.maxTrail) sword.trail.shift();
            }
        }

        // ---------- UPDATE ----------
        function update(dt) {
            const dtFactor = dt / 16.67;

            // ---- Movement Input ----
            let moveX = 0,
                moveY = 0;
            if (keys.w || keys.up) moveY = -1;
            if (keys.s || keys.down) moveY = 1;
            if (keys.a || keys.left) moveX = -1;
            if (keys.d || keys.right) moveX = 1;

            const len = Math.hypot(moveX, moveY);
            if (len > 0) { moveX /= len;
                moveY /= len; }

            // ---- Face the active pointer (finger / mouse) ----
            if (activePointer) {
                const dx = activePointer.x - player.x;
                const dy = activePointer.y - player.y;
                if (Math.hypot(dx, dy) > 5) {
                    player.facing = Math.atan2(dy, dx);
                }
            } else {
                // If no pointer, face movement direction
                if (Math.abs(moveX) > 0.1 || Math.abs(moveY) > 0.1) {
                    player.facing = Math.atan2(moveY, moveX);
                }
            }

            // ---- Movement Physics ----
            const targetVx = moveX * player.speed;
            const targetVy = moveY * player.speed;
            if (moveX !== 0 || moveY !== 0) {
                player.vx += (targetVx - player.vx) * 0.18 * dtFactor;
                player.vy += (targetVy - player.vy) * 0.18 * dtFactor;
            } else {
                player.vx *= Math.pow(player.friction, dtFactor * 0.6);
                player.vy *= Math.pow(player.friction, dtFactor * 0.6);
                if (Math.abs(player.vx) < 0.02) player.vx = 0;
                if (Math.abs(player.vy) < 0.02) player.vy = 0;
            }

            // ---- Dash ----
            if (player.isDashing) {
                player.dashTimer -= dt;
                if (player.dashTimer <= 0) {
                    player.isDashing = false;
                    player.dashMultiplier = 1;
                    player.dashTimer = 0;
                    player.cooldownTimer = player.dashCooldown;
                    spawnDashParticles(player.x, player.y, player.facing + Math.PI, 20);
                } else {
                    const dashSpeed = player.speed * player.dashMultiplier;
                    const steer = 0.08;
                    const targetDashX = Math.cos(player.facing) * dashSpeed;
                    const targetDashY = Math.sin(player.facing) * dashSpeed;
                    player.vx += (targetDashX - player.vx) * steer * dtFactor;
                    player.vy += (targetDashY - player.vy) * steer * dtFactor;

                    if (Math.random() < 0.6 * dtFactor) {
                        spawnTrailParticles(player.x, player.y, player.facing + (Math.random() - 0.5) * 0.6, 3);
                    }
                }
            }

            // ---- Cooldown ----
            if (player.cooldownTimer > 0) {
                player.cooldownTimer -= dt;
                if (player.cooldownTimer < 0) player.cooldownTimer = 0;
            }

            // ---- Apply velocity ----
            player.x += player.vx * dtFactor;
            player.y += player.vy * dtFactor;

            const margin = player.radius + 4;
            player.x = clamp(player.x, margin, W - margin);
            player.y = clamp(player.y, margin, H - margin);

            // ---- Player Trail ----
            if (player.isDashing || Math.abs(player.vx) > 0.6 || Math.abs(player.vy) > 0.6) {
                player.trail.push({ x: player.x, y: player.y, life: 1 });
                if (player.trail.length > player.maxTrail) player.trail.shift();
            }
            for (let i = player.trail.length - 1; i >= 0; i--) {
                player.trail[i].life -= 0.02 * dtFactor;
                if (player.trail[i].life <= 0) player.trail.splice(i, 1);
            }

            // ---- Sword Swing Logic (Slow Draw -> Fast Swing) ----
            if (sword.swinging) {
                sword.swingTimer -= dt;
                const progress = 1 - (sword.swingTimer / sword.swingDuration);
                const totalArc = 260; // degrees (increased)
                const drawPhase = 0.25; // 25% of time for drawing
                const swingPhase = 1 - drawPhase;

                let angleOffset = 0;
                if (progress < drawPhase) {
                    // SLOW DRAW
                    const localP = progress / drawPhase;
                    // Move from -10 deg to +10 deg during draw
                    const drawArc = 20;
                    angleOffset = -drawArc / 2 + localP * drawArc;
                } else {
                    // FAST SWING
                    const localP = (progress - drawPhase) / swingPhase;
                    // Ease-in (accelerating)
                    const easedP = localP * localP * localP;
                    const swingArc = totalArc - 20;
                    angleOffset = 10 + easedP * swingArc;
                }

                // Apply the angle offset to the start angle
                const angleRad = (angleOffset * Math.PI) / 180;
                sword.currentAngle = sword.startAngle + angleRad;

                // Spawn particles during swing
                if (Math.random() < 0.6 * dtFactor) {
                    spawnSwordSlash(player.x, player.y, sword.currentAngle, 3);
                }

                // Trigger Flash at the peak of the fast swing
                if (progress > 0.35 && progress < 0.45) {
                    flashAlpha = 1.0;
                }

                // End swing
                if (sword.swingTimer <= 0) {
                    sword.swinging = false;
                    sword.currentAngle = sword.startAngle;
                    sword.cooldownTimer = sword.cooldownDuration;
                    swordStatus.textContent = 'READY';
                }
            } else {
                // Not swinging: sword points to joystick angle (if active) or last target
                if (joystick.active) {
                    sword.angle = joystick.angle;
                    sword.targetAngle = joystick.angle;
                }
            }

            // Sword cooldown
            if (sword.cooldownTimer > 0) {
                sword.cooldownTimer -= dt;
                if (sword.cooldownTimer < 0) sword.cooldownTimer = 0;
                if (sword.cooldownTimer > 0) swordStatus.textContent = 'COOLDOWN';
            }

            // Sword trail
            for (let i = sword.trail.length - 1; i >= 0; i--) {
                sword.trail[i].life -= 0.03 * dtFactor;
                if (sword.trail[i].life <= 0) sword.trail.splice(i, 1);
            }

            // ---- Particles ----
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dtFactor;
                p.y += p.vy * dtFactor;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= p.decay * dtFactor;
                p.size = p.maxSize * p.life;
                if (p.life <= 0 || p.size < 0.1) particles.splice(i, 1);
            }

            // ---- Shake ----
            if (window.shakeTimer > 0) {
                window.shakeTimer -= dt;
                if (window.shakeTimer < 0) window.shakeTimer = 0;
                window.shakeAmount *= 0.96;
                if (window.shakeAmount < 0.1) window.shakeAmount = 0;
            }

            // ---- UI ----
            const speed = Math.hypot(player.vx, player.vy);
            speedDisplay.textContent = Math.round(speed * 10) / 10;

            if (player.isDashing) dashDot.className = 'dot dashing';
            else if (player.cooldownTimer > 0) dashDot.className = 'dot cooldown';
            else dashDot.className = 'dot ready';

            if (player.flashTimer > 0) player.flashTimer -= dt;

            // ---- Flash Fade ----
            if (flashAlpha > 0) {
                flashAlpha *= 0.92;
                if (flashAlpha < 0.01) flashAlpha = 0;
            }
        }

        // ---------- RENDER ----------
        function render() {
            ctx.save();

            // ---- Screen shake ----
            let shakeX = 0,
                shakeY = 0;
            if (window.shakeTimer > 0 && window.shakeAmount > 0.1) {
                shakeX = (Math.random() - 0.5) * window.shakeAmount * 1.8;
                shakeY = (Math.random() - 0.5) * window.shakeAmount * 1.8;
                ctx.translate(shakeX, shakeY);
            }

            // ---- Background ----
            const grad = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 550);
            grad.addColorStop(0, '#132033');
            grad.addColorStop(0.5, '#0d1825');
            grad.addColorStop(1, '#070d14');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // ---- Grid ----
            ctx.strokeStyle = 'rgba(30, 60, 90, 0.15)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x <= W; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y <= H; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // ---- Glow ring ----
            const grd = ctx.createRadialGradient(player.x, player.y, 20, player.x, player.y, 140);
            grd.addColorStop(0, 'rgba(0, 180, 255, 0.06)');
            grd.addColorStop(0.5, 'rgba(0, 180, 255, 0.02)');
            grd.addColorStop(1, 'rgba(0, 180, 255, 0)');
            ctx.fillStyle = grd;
            ctx.beginPath();
            ctx.arc(player.x, player.y, 140, 0, Math.PI * 2);
            ctx.fill();

            // ---- Player Trail ----
            for (const t of player.trail) {
                const alpha = t.life * 0.3;
                const size = player.radius * 0.5 * t.life;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = `hsl(200, 90%, ${60 + 30 * t.life}%)`;
                ctx.shadowColor = `rgba(0, 180, 255, ${alpha * 0.3})`;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ---- Particles ----
            for (const p of particles) {
                ctx.globalAlpha = p.life * 0.9;
                ctx.fillStyle = p.color || '#66d0ff';
                ctx.shadowColor = `rgba(100, 200, 255, ${p.life * 0.3})`;
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(p.size, 0.5), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ---- Sword Trail ----
            for (const t of sword.trail) {
                ctx.globalAlpha = t.life * 0.25;
                ctx.strokeStyle = `hsl(40, 100%, 70%)`;
                ctx.lineWidth = 3 * t.life; // reduced thickness
                ctx.shadowColor = `rgba(255, 200, 100, ${t.life * 0.3})`;
                ctx.shadowBlur = 20;
                const swx = t.x + Math.cos(t.angle) * sword.length;
                const swy = t.y + Math.sin(t.angle) * sword.length;
                ctx.beginPath();
                ctx.moveTo(t.x, t.y);
                ctx.lineTo(swx, swy);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ---- Draw the Katana (held beside the player, following mouse) ----
            const handX = player.x + Math.cos(player.facing) * 22;
            const handY = player.y + Math.sin(player.facing) * 22;
            const swingProgress = sword.swinging ? 1 - (sword.swingTimer / sword.swingDuration) : 0;

            drawKatana(ctx, handX, handY, sword.currentAngle, swingProgress);

            // ---- Player Body ----
            const px = player.x;
            const py = player.y;
            const r = player.radius;

            // Glow
            const glowGrd = ctx.createRadialGradient(px, py, 5, px, py, r * 2.5);
            const glowColor = player.isDashing ? 'rgba(0, 220, 255, 0.3)' : 'rgba(0, 160, 255, 0.12)';
            glowGrd.addColorStop(0, glowColor);
            glowGrd.addColorStop(1, 'rgba(0, 160, 255, 0)');
            ctx.fillStyle = glowGrd;
            ctx.beginPath();
            ctx.arc(px, py, r * 2.5, 0, Math.PI * 2);
            ctx.fill();

            if (player.isDashing) {
                // Triangle
                const angle = player.facing;
                const tipDist = r * 1.4;
                const baseDist = r * 0.8;
                const baseHalf = r * 0.9;
                const tipX = px + Math.cos(angle) * tipDist;
                const tipY = py + Math.sin(angle) * tipDist;
                const baseX = px - Math.cos(angle) * baseDist;
                const baseY = py - Math.sin(angle) * baseDist;
                const perpAngle = angle + Math.PI / 2;
                const b1x = baseX + Math.cos(perpAngle) * baseHalf;
                const b1y = baseY + Math.sin(perpAngle) * baseHalf;
                const b2x = baseX - Math.cos(perpAngle) * baseHalf;
                const b2y = baseY - Math.sin(perpAngle) * baseHalf;

                ctx.shadowColor = 'rgba(0, 220, 255, 0.7)';
                ctx.shadowBlur = 40;
                const gradTri = ctx.createLinearGradient(tipX, tipY, b1x, b1y);
                gradTri.addColorStop(0, '#00e5ff');
                gradTri.addColorStop(0.5, '#0091ea');
                gradTri.addColorStop(1, '#0055b3');
                ctx.fillStyle = gradTri;
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(b1x, b1y);
                ctx.lineTo(b2x, b2y);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0, 230, 255, 0.8)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(b1x, b1y);
                ctx.lineTo(b2x, b2y);
                ctx.closePath();
                ctx.stroke();
            } else {
                // Circle
                ctx.shadowColor = 'rgba(0, 180, 255, 0.4)';
                ctx.shadowBlur = 25;
                const gradCirc = ctx.createRadialGradient(px - 6, py - 6, 5, px, py, r);
                gradCirc.addColorStop(0, '#4dd0e1');
                gradCirc.addColorStop(0.6, '#00bcd4');
                gradCirc.addColorStop(1, '#00695c');
                ctx.fillStyle = gradCirc;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0, 200, 230, 0.3)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.stroke();

                const innerGrd = ctx.createRadialGradient(px - 4, py - 4, 2, px, py, r * 0.6);
                innerGrd.addColorStop(0, 'rgba(200, 240, 255, 0.7)');
                innerGrd.addColorStop(1, 'rgba(100, 200, 255, 0)');
                ctx.fillStyle = innerGrd;
                ctx.beginPath();
                ctx.arc(px, py, r * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }

            // ---- Cooldown ring ----
            if (player.cooldownTimer > 0) {
                const progress = player.cooldownTimer / player.dashCooldown;
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 80, 80, 0.25)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(px, py, r * 1.5, -Math.PI / 2, -Math.PI / 2 + (1 - progress) * Math.PI * 2);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;

            // ---- WHITE FLASH (Power indicator) ----
            if (flashAlpha > 0) {
                ctx.save();
                const gradFlash = ctx.createRadialGradient(player.x, player.y, 20, player.x, player.y, 500);
                gradFlash.addColorStop(0, `rgba(255, 255, 255, ${flashAlpha * 0.9})`);
                gradFlash.addColorStop(0.3, `rgba(255, 255, 255, ${flashAlpha * 0.5})`);
                gradFlash.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.fillStyle = gradFlash;
                ctx.fillRect(0, 0, W, H);

                // Extra bright core
                const coreGrad = ctx.createRadialGradient(player.x, player.y, 5, player.x, player.y, 150);
                coreGrad.addColorStop(0, `rgba(255, 255, 255, ${flashAlpha * 0.6})`);
                coreGrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 150, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // ---- Joystick ----
            drawJoystick();

            ctx.restore();

            // ---- HUD: Dash bar ----
            const barW = 160,
                barH = 6;
            const barX = W / 2 - barW / 2,
                barY = H - 28;
            ctx.fillStyle = 'rgba(10, 20, 35, 0.5)';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 4);
            ctx.fill();

            let fillW = 0;
            let fillColor = '#00e676';
            if (player.isDashing) {
                const prog = player.dashTimer / player.dashDuration;
                fillW = barW * prog;
                fillColor = '#00e5ff';
            } else if (player.cooldownTimer > 0) {
                const prog = 1 - player.cooldownTimer / player.dashCooldown;
                fillW = barW * prog;
                fillColor = '#ff5252';
            } else {
                fillW = barW;
                fillColor = '#00e676';
            }
            const fillGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
            fillGrad.addColorStop(0, fillColor);
            fillGrad.addColorStop(1, fillColor);
            ctx.fillStyle = fillGrad;
            ctx.beginPath();
            if (fillW > 0) ctx.rect(barX, barY, fillW, barH);
            ctx.fill();

            ctx.fillStyle = 'rgba(120, 180, 210, 0.4)';
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('DASH', W / 2, barY - 6);

            // ---- Speed ring ----
            const speed = Math.hypot(player.vx, player.vy);
            const maxSpeed = player.speed * (player.isDashing ? player.dashMultiplier : 1);
            const speedRatio = Math.min(speed / (player.speed * 1.8), 1);
            if (speedRatio > 0.05) {
                ctx.save();
                ctx.globalAlpha = 0.15 + speedRatio * 0.25;
                ctx.strokeStyle = `hsl(${200 - speedRatio * 40}, 100%, ${60 + speedRatio * 30}%)`;
                ctx.lineWidth = 1.5;
                ctx.setLineDash([3, 5]);
                const ringR = player.radius + 8 + speedRatio * 8;
                ctx.beginPath();
                ctx.arc(player.x, player.y, ringR, 0, Math.PI * 2 * speedRatio);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }
        }

        // ---------- DRAW KATANA (thinner, elegant) ----------
        function drawKatana(ctx, x, y, angle, progress) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // Handle (Tsuka) - 25px long, thinner
            ctx.fillStyle = '#2c1a0e';
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 8;
            ctx.fillRect(-8, -3, 25, 6); // thinner

            // Handle wrapping (thinner)
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#4a2a1a';
            ctx.lineWidth = 1;
            for (let i = -4; i < 22; i += 3) {
                ctx.beginPath();
                ctx.moveTo(i, -3);
                ctx.lineTo(i + 1, 0);
                ctx.lineTo(i, 3);
                ctx.stroke();
            }

            // Guard (Tsuba) - thinner
            ctx.shadowBlur = 5;
            ctx.fillStyle = '#d4a843';
            ctx.beginPath();
            ctx.ellipse(17, 0, 4, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#8a6e2a';
            ctx.lineWidth = 0.8;
            ctx.stroke();

            // Blade (Nagasa) - 60px long, thinner
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255,255,255,0.1)';
            ctx.beginPath();
            ctx.moveTo(17, -4);
            ctx.quadraticCurveTo(50, -6, 77, 0);
            ctx.quadraticCurveTo(50, 6, 17, 4);
            ctx.closePath();

            let grad = ctx.createLinearGradient(17, -4, 17, 4);
            grad.addColorStop(0, '#b0b8c4');
            grad.addColorStop(0.3, '#ffffff');
            grad.addColorStop(0.7, '#ffffff');
            grad.addColorStop(1, '#8a929e');
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.strokeStyle = '#6a727e';
            ctx.lineWidth = 0.5;
            ctx.stroke();

            // Blade edge (Hamon) - thinner wave
            ctx.beginPath();
            ctx.moveTo(17, -1);
            for (let i = 19; i < 77; i += 2) {
                const wave = Math.sin(i * 0.7 + 1) * 1.8;
                ctx.lineTo(i, -1 + wave);
            }
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 1;
            ctx.shadowBlur = 0;
            ctx.stroke();

            // Tip (Kissaki)
            ctx.beginPath();
            ctx.arc(77, 0, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#e0e5ec';
            ctx.shadowBlur = 8;
            ctx.shadowColor = 'rgba(255,255,255,0.3)';
            ctx.fill();

            ctx.restore();
        }

        // ---------- JOYSTICK DRAW ----------
        function drawJoystick() {
            const j = joystick;
            const cx = j.x,
                cy = j.y;
            ctx.save();
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 15;
            ctx.fillStyle = 'rgba(20, 35, 50, 0.5)';
            ctx.strokeStyle = 'rgba(80, 140, 180, 0.25)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, j.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;

            let knobX = cx,
                knobY = cy;
            if (j.active) {
                const maxDist = j.radius * 0.6;
                const dist = Math.min(Math.hypot(j.dx, j.dy), maxDist);
                const angle = Math.atan2(j.dy, j.dx);
                knobX = cx + Math.cos(angle) * dist;
                knobY = cy + Math.sin(angle) * dist;
            }
            const gradKnob = ctx.createRadialGradient(knobX - 4, knobY - 4, 4, knobX, knobY, j.knobRadius);
            gradKnob.addColorStop(0, '#8ac4e0');
            gradKnob.addColorStop(0.6, '#4a8aaa');
            gradKnob.addColorStop(1, '#1a3a4a');
            ctx.shadowColor = 'rgba(0, 180, 255, 0.2)';
            ctx.shadowBlur = 12;
            ctx.fillStyle = gradKnob;
            ctx.beginPath();
            ctx.arc(knobX, knobY, j.knobRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(180, 220, 255, 0.2)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(120, 180, 210, 0.4)';
            ctx.font = '10px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('⚔️ AIM', cx, cy + j.radius + 22);
            ctx.restore();
        }

        // ---------- TOUCH / MOUSE HANDLING ----------
        function isInsideJoystick(tx, ty) {
            const j = joystick;
            return (tx - j.x) ** 2 + (ty - j.y) ** 2 < (j.radius + 30) ** 2;
        }

        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touches = e.touches;

            // Double touch -> Dash
            if (touches.length === 2) {
                performDash();
                return;
            }

            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                const { x, y } = getCanvasCoords(touch);

                if (isInsideJoystick(x, y) && !joystick.active) {
                    joystick.active = true;
                    joystick.touchId = touch.identifier;
                    joystick.dx = 0;
                    joystick.dy = 0;
                    joystick.angle = 0;
                } else if (!activePointer) {
                    activePointer = { x, y, id: touch.identifier };
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touches = e.touches;

            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                const { x, y } = getCanvasCoords(touch);

                if (joystick.active && touch.identifier === joystick.touchId) {
                    joystick.dx = x - joystick.x;
                    joystick.dy = y - joystick.y;
                    const maxDist = joystick.radius * 0.6;
                    const dist = Math.hypot(joystick.dx, joystick.dy);
                    if (dist > maxDist) {
                        joystick.dx = (joystick.dx / dist) * maxDist;
                        joystick.dy = (joystick.dy / dist) * maxDist;
                    }
                    joystick.angle = Math.atan2(joystick.dy, joystick.dx);
                    // Update facing towards joystick touch
                    if (activePointer) {
                        if (activePointer.id === touch.identifier) {
                            activePointer.x = x;
                            activePointer.y = y;
                        }
                    } else {
                        activePointer = { x, y, id: touch.identifier };
                    }
                } else if (activePointer && activePointer.id === touch.identifier) {
                    activePointer.x = x;
                    activePointer.y = y;
                    // Update movement keys based on pointer position
                    const dx = x - player.x;
                    const dy = y - player.y;
                    const dist2 = Math.hypot(dx, dy);
                    if (dist2 > 15) {
                        const nx = dx / dist2;
                        const ny = dy / dist2;
                        keys.d = nx > 0.3;
                        keys.a = nx < -0.3;
                        keys.s = ny > 0.3;
                        keys.w = ny < -0.3;
                        keys.up = false;
                        keys.down = false;
                        keys.left = false;
                        keys.right = false;
                    } else {
                        keys.w = keys.a = keys.s = keys.d = false;
                    }
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touches = e.touches;

            if (joystick.active) {
                let found = false;
                for (let i = 0; i < touches.length; i++) {
                    if (touches[i].identifier === joystick.touchId) {
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    if (joystick.active) {
                        performSwordSwing(joystick.angle);
                    }
                    joystick.active = false;
                    joystick.touchId = null;
                    joystick.dx = 0;
                    joystick.dy = 0;
                }
            }

            if (activePointer) {
                let found = false;
                for (let i = 0; i < touches.length; i++) {
                    if (touches[i].identifier === activePointer.id) {
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    keys.w = keys.a = keys.s = keys.d = false;
                    activePointer = null;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            if (joystick.active) {
                performSwordSwing(joystick.angle);
                joystick.active = false;
                joystick.touchId = null;
                joystick.dx = 0;
                joystick.dy = 0;
            }
            keys.w = keys.a = keys.s = keys.d = false;
            activePointer = null;
        }, { passive: false });

        // Mouse events (desktop)
        let mouseDown = false;
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            const { x, y } = getCanvasCoords(e);
            if (isInsideJoystick(x, y)) {
                joystick.active = true;
                joystick.dx = x - joystick.x;
                joystick.dy = y - joystick.y;
                const maxDist = joystick.radius * 0.6;
                const dist = Math.hypot(joystick.dx, joystick.dy);
                if (dist > maxDist) {
                    joystick.dx = (joystick.dx / dist) * maxDist;
                    joystick.dy = (joystick.dy / dist) * maxDist;
                }
                joystick.angle = Math.atan2(joystick.dy, joystick.dx);
                activePointer = { x, y, id: 'mouse' };
            } else {
                activePointer = { x, y, id: 'mouse' };
                const dx = x - player.x;
                const dy = y - player.y;
                if (Math.hypot(dx, dy) > 15) {
                    const nx = dx / Math.hypot(dx, dy);
                    const ny = dy / Math.hypot(dx, dy);
                    keys.d = nx > 0.3;
                    keys.a = nx < -0.3;
                    keys.s = ny > 0.3;
                    keys.w = ny < -0.3;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const { x, y } = getCanvasCoords(e);
            if (mouseDown && activePointer) {
                activePointer.x = x;
                activePointer.y = y;
                if (joystick.active) {
                    joystick.dx = x - joystick.x;
                    joystick.dy = y - joystick.y;
                    const maxDist = joystick.radius * 0.6;
                    const dist = Math.hypot(joystick.dx, joystick.dy);
                    if (dist > maxDist) {
                        joystick.dx = (joystick.dx / dist) * maxDist;
                        joystick.dy = (joystick.dy / dist) * maxDist;
                    }
                    joystick.angle = Math.atan2(joystick.dy, joystick.dx);
                } else {
                    const dx = x - player.x;
                    const dy = y - player.y;
                    if (Math.hypot(dx, dy) > 15) {
                        const nx = dx / Math.hypot(dx, dy);
                        const ny = dy / Math.hypot(dx, dy);
                        keys.d = nx > 0.3;
                        keys.a = nx < -0.3;
                        keys.s = ny > 0.3;
                        keys.w = ny < -0.3;
                    } else {
                        keys.w = keys.a = keys.s = keys.d = false;
                    }
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            mouseDown = false;
            if (joystick.active) {
                performSwordSwing(joystick.angle);
                joystick.active = false;
                joystick.dx = 0;
                joystick.dy = 0;
            }
            keys.w = keys.a = keys.s = keys.d = false;
            activePointer = null;
        });

        canvas.addEventListener('mouseleave', () => {
            if (mouseDown) {
                if (joystick.active) {
                    performSwordSwing(joystick.angle);
                    joystick.active = false;
                    joystick.dx = 0;
                    joystick.dy = 0;
                }
                keys.w = keys.a = keys.s = keys.d = false;
                mouseDown = false;
                activePointer = null;
            }
        });

        // Keyboard fallback
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(key) || e.key === ' ') {
                e.preventDefault();
            }
            if (key === 'w' || e.key === 'ArrowUp') keys.up = true;
            if (key === 's' || e.key === 'ArrowDown') keys.down = true;
            if (key === 'a' || e.key === 'ArrowLeft') keys.left = true;
            if (key === 'd' || e.key === 'ArrowRight') keys.right = true;
            if (key === ' ' || e.key === 'Shift') performDash();
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || e.key === 'ArrowUp') keys.up = false;
            if (key === 's' || e.key === 'ArrowDown') keys.down = false;
            if (key === 'a' || e.key === 'ArrowLeft') keys.left = false;
            if (key === 'd' || e.key === 'ArrowRight') keys.right = false;
        });

        // ---------- GAME LOOP ----------
        let lastTime = 0;

        function gameLoop(time) {
            const dt = Math.min(time - lastTime, 30);
            lastTime = time;
            update(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        // Polyfill roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        requestAnimationFrame(gameLoop);

        console.log('⚔️ Katana & Dash Game');
        console.log('🟢 Move: drag on canvas (or WASD on desktop)');
        console.log('⚡ Dash: two-finger tap (or Space on desktop)');
        console.log('🗡️ Aim sword: drag joystick (top-left), release to swing!');
    </script>
</body>
