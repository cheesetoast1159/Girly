<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEON DRIFT - Cyberpunk Cursor</title>
    <style>
        :root {
            --bg: #0a0a0f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', 'SF Mono', monospace;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #instructions {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, 50%);
            color: #00ffff;
            font-size: clamp(14px, 3vw, 18px);
            text-align: center;
            pointer-events: none;
            opacity: 0.9;
            letter-spacing: 3px;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffffaa;
            transition: opacity 0.8s ease;
            z-index: 10;
        }

        #instructions.fading {
            opacity: 0;
        }

        #hud-speed {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: #ff00ff;
            font-size: 13px;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 0 10px #ff00ff;
            z-index: 5;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="instructions">◈ DRIFT THE NEON ◈<br><span style="font-size:0.7em;opacity:0.7;">smooth turns = more speed</span></div>
    <div id="hud-speed">SPD <span id="speedVal">0</span></div>

    <script>
        (function() {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const instructionsEl = document.getElementById('instructions');
            const speedValEl = document.getElementById('speedVal');

            // --- Canvas Setup (Retina) ---
            let dpr = Math.min(window.devicePixelRatio || 1, 2);
            let W, H;

            function resizeCanvas() {
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => {
                setTimeout(resizeCanvas, 200);
            });

            // --- World ---
            const WORLD_SIZE = 2400;
            const WORLD_HALF = WORLD_SIZE / 2;
            const WALL_MARGIN = 60;

            // --- Player ---
            const player = {
                x: WORLD_HALF,
                y: WORLD_HALF,
                vx: 0,
                vy: 0,
                speed: 0,
                velAngle: 0, // radians, direction of actual velocity
            };

            const MAX_SPEED = 680; // pixels per second
            const ACCELERATION = 1100; // pixels per second^2
            const FRICTION = 380; // deceleration when no input
            const BASE_ROTATION_RATE = 9.0; // radians per second (at low speed)
            const MIN_ROTATION_FRAC = 0.22; // fraction of base rotation at max speed

            // --- Camera ---
            const camera = { x: 0, y: 0, targetX: 0, targetY: 0 };
            camera.x = player.x - W / 2;
            camera.y = player.y - H / 2;
            camera.targetX = camera.x;
            camera.targetY = camera.y;

            // --- Joystick ---
            const joystick = {
                active: false,
                touchId: null,
                baseX: 0,
                baseY: 0,
                baseRadius: 75,
                knobX: 0,
                knobY: 0,
                knobRadius: 32,
                angle: 0,
                magnitude: 0,
                fixedBaseX: 130,
                fixedBaseY: 0,
            };
            joystick.fixedBaseY = H - 140;

            function updateJoystickFixedBase() {
                joystick.fixedBaseY = Math.max(H - 140, H * 0.78);
                joystick.fixedBaseX = Math.min(130, W * 0.18);
            }
            updateJoystickFixedBase();

            function getJoystickOutput() {
                if (!joystick.active) return { angle: 0, magnitude: 0 };
                const dx = joystick.knobX - joystick.baseX;
                const dy = joystick.knobY - joystick.baseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = joystick.baseRadius;
                const clampedDist = Math.min(dist, maxDist);
                const angle = Math.atan2(dy, dx);
                const magnitude = clampedDist / maxDist;
                return { angle, magnitude: Math.min(magnitude, 1.0) };
            }

            // --- Collectibles (Data Nodes) ---
            const collectibles = [];
            const MAX_COLLECTIBLES = 10;
            const COLLECTIBLE_RADIUS = 18;

            function spawnCollectible() {
                const margin = 100;
                let cx, cy;
                let attempts = 0;
                do {
                    cx = margin + Math.random() * (WORLD_SIZE - margin * 2);
                    cy = margin + Math.random() * (WORLD_SIZE - margin * 2);
                    attempts++;
                } while (attempts < 30 &&
                    Math.hypot(cx - player.x, cy - player.y) < 250);
                collectibles.push({
                    x: cx,
                    y: cy,
                    radius: COLLECTIBLE_RADIUS,
                    pulse: Math.random() * Math.PI * 2,
                    type: 'data',
                });
            }

            function initCollectibles() {
                for (let i = 0; i < MAX_COLLECTIBLES; i++) {
                    spawnCollectible();
                }
            }

            // --- Obstacles (ICE) ---
            const obstacles = [];
            const MAX_OBSTACLES = 7;
            const OBSTACLE_RADIUS = 35;

            function spawnObstacle() {
                const margin = 140;
                let ox, oy;
                let attempts = 0;
                do {
                    ox = margin + Math.random() * (WORLD_SIZE - margin * 2);
                    oy = margin + Math.random() * (WORLD_SIZE - margin * 2);
                    attempts++;
                } while (attempts < 30 &&
                    Math.hypot(ox - player.x, oy - player.y) < 350);
                obstacles.push({
                    x: ox,
                    y: oy,
                    radius: OBSTACLE_RADIUS,
                    pulse: Math.random() * Math.PI * 2,
                    type: 'ice',
                });
            }

            function initObstacles() {
                for (let i = 0; i < MAX_OBSTACLES; i++) {
                    spawnObstacle();
                }
            }

            // --- Particles ---
            const particles = [];
            const MAX_PARTICLES = 200;

            function spawnParticles(x, y, count, color, baseSpeed, lifeRange) {
                for (let i = 0; i < count; i++) {
                    if (particles.length >= MAX_PARTICLES) break;
                    const angle = Math.random() * Math.PI * 2;
                    const speed = baseSpeed * (0.5 + Math.random());
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: lifeRange[0] + Math.random() * (lifeRange[1] - lifeRange[0]),
                        maxLife: lifeRange[1],
                        color,
                        size: 1.5 + Math.random() * 3.5,
                    });
                }
            }

            // --- Trail Points ---
            const trailPoints = [];
            const MAX_TRAIL = 60;
            let trailTimer = 0;

            // --- Score ---
            let score = 0;
            let comboCount = 0;
            let comboTimer = 0;
            const COMBO_TIMEOUT = 1.8; // seconds
            let screenShake = 0;
            let hitFlash = 0;

            // --- Game State ---
            let lastTime = performance.now();
            let instructionsOpacity = 1;
            let instructionsFading = false;
            let gameStarted = false;

            // --- Input Handling ---
            function getTouchPos(touch) {
                return {
                    x: touch.clientX,
                    y: touch.clientY,
                };
            }

            function isInJoystickZone(x, y) {
                const jbx = joystick.fixedBaseX;
                const jby = joystick.fixedBaseY;
                const zoneRadius = joystick.baseRadius * 2.2;
                const dx = x - jbx;
                const dy = y - jby;
                return Math.sqrt(dx * dx + dy * dy) < zoneRadius;
            }

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (!gameStarted) {
                    gameStarted = true;
                    instructionsFading = true;
                }
                for (const touch of e.changedTouches) {
                    const pos = getTouchPos(touch);
                    if (!joystick.active && isInJoystickZone(pos.x, pos.y)) {
                        joystick.active = true;
                        joystick.touchId = touch.identifier;
                        joystick.baseX = joystick.fixedBaseX;
                        joystick.baseY = joystick.fixedBaseY;
                        joystick.knobX = pos.x;
                        joystick.knobY = pos.y;
                        // Clamp knob
                        const dx = joystick.knobX - joystick.baseX;
                        const dy = joystick.knobY - joystick.baseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > joystick.baseRadius) {
                            joystick.knobX = joystick.baseX + (dx / dist) * joystick.baseRadius;
                            joystick.knobY = joystick.baseY + (dy / dist) * joystick.baseRadius;
                        }
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (joystick.active && touch.identifier === joystick.touchId) {
                        const pos = getTouchPos(touch);
                        joystick.knobX = pos.x;
                        joystick.knobY = pos.y;
                        const dx = joystick.knobX - joystick.baseX;
                        const dy = joystick.knobY - joystick.baseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist > joystick.baseRadius) {
                            joystick.knobX = joystick.baseX + (dx / dist) * joystick.baseRadius;
                            joystick.knobY = joystick.baseY + (dy / dist) * joystick.baseRadius;
                        }
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                for (const touch of e.changedTouches) {
                    if (joystick.active && touch.identifier === joystick.touchId) {
                        joystick.active = false;
                        joystick.touchId = null;
                        joystick.knobX = joystick.baseX;
                        joystick.knobY = joystick.baseY;
                        joystick.magnitude = 0;
                    }
                }
            }, { passive: false });

            canvas.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                joystick.active = false;
                joystick.touchId = null;
                joystick.knobX = joystick.baseX;
                joystick.knobY = joystick.baseY;
                joystick.magnitude = 0;
            }, { passive: false });

            // --- Mouse support for desktop ---
            let mouseDown = false;
            canvas.addEventListener('mousedown', (e) => {
                if (!gameStarted) {
                    gameStarted = true;
                    instructionsFading = true;
                }
                const pos = { x: e.clientX, y: e.clientY };
                if (isInJoystickZone(pos.x, pos.y)) {
                    mouseDown = true;
                    joystick.active = true;
                    joystick.touchId = 'mouse';
                    joystick.baseX = joystick.fixedBaseX;
                    joystick.baseY = joystick.fixedBaseY;
                    joystick.knobX = pos.x;
                    joystick.knobY = pos.y;
                    const dx = joystick.knobX - joystick.baseX;
                    const dy = joystick.knobY - joystick.baseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > joystick.baseRadius) {
                        joystick.knobX = joystick.baseX + (dx / dist) * joystick.baseRadius;
                        joystick.knobY = joystick.baseY + (dy / dist) * joystick.baseRadius;
                    }
                }
            });
            window.addEventListener('mousemove', (e) => {
                if (mouseDown && joystick.active && joystick.touchId === 'mouse') {
                    const pos = { x: e.clientX, y: e.clientY };
                    joystick.knobX = pos.x;
                    joystick.knobY = pos.y;
                    const dx = joystick.knobX - joystick.baseX;
                    const dy = joystick.knobY - joystick.baseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > joystick.baseRadius) {
                        joystick.knobX = joystick.baseX + (dx / dist) * joystick.baseRadius;
                        joystick.knobY = joystick.baseY + (dy / dist) * joystick.baseRadius;
                    }
                }
            });
            window.addEventListener('mouseup', () => {
                if (mouseDown) {
                    mouseDown = false;
                    joystick.active = false;
                    joystick.touchId = null;
                    joystick.knobX = joystick.baseX;
                    joystick.knobY = joystick.baseY;
                    joystick.magnitude = 0;
                }
            });

            // --- Utility ---
            function normalizeAngle(angle) {
                while (angle > Math.PI) angle -= Math.PI * 2;
                while (angle < -Math.PI) angle += Math.PI * 2;
                return angle;
            }

            function angleDiff(a, b) {
                return normalizeAngle(b - a);
            }

            function lerp(a, b, t) {
                return a + (b - a) * t;
            }

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function worldToScreen(wx, wy) {
                return {
                    x: wx - camera.x,
                    y: wy - camera.y,
                };
            }

            function isOnScreen(sx, sy, margin = 60) {
                return sx > -margin && sx < W + margin && sy > -margin && sy < H + margin;
            }

            // --- Update ---
            function update(dt) {
                // Clamp dt
                dt = Math.min(dt, 0.1);

                // Update joystick fixed base position
                updateJoystickFixedBase();
                if (!joystick.active) {
                    joystick.baseX = joystick.fixedBaseX;
                    joystick.baseY = joystick.fixedBaseY;
                    joystick.knobX = joystick.baseX;
                    joystick.knobY = joystick.baseY;
                }

                // Get joystick input
                const joyOutput = getJoystickOutput();
                joystick.angle = joyOutput.angle;
                joystick.magnitude = joyOutput.magnitude;

                const targetAngle = joyOutput.angle;
                const targetMagnitude = joyOutput.magnitude;
                const currentSpeed = player.speed;
                const velAngle = player.velAngle;

                // Calculate angular difference
                let angDiff = 0;
                if (currentSpeed > 5 && joystick.active && targetMagnitude > 0.05) {
                    angDiff = angleDiff(velAngle, targetAngle);
                } else if (joystick.active && targetMagnitude > 0.05 && currentSpeed < 5) {
                    // When nearly stopped, snap to target direction
                    player.velAngle = targetAngle;
                    angDiff = 0;
                }

                const absAngDiff = Math.abs(angDiff);

                // Max rotation rate depends on speed (harder to turn at high speed)
                const speedFraction = clamp(currentSpeed / MAX_SPEED, 0, 1);
                const maxRotationRate = BASE_ROTATION_RATE * (1 - (1 - MIN_ROTATION_FRAC) * speedFraction);

                // Clamp rotation
                const maxRotThisFrame = maxRotationRate * dt;
                const actualRotation = clamp(angDiff, -maxRotThisFrame, maxRotThisFrame);
                player.velAngle += actualRotation;
                player.velAngle = normalizeAngle(player.velAngle);

                // Target speed based on joystick magnitude
                let targetSpeed = targetMagnitude * MAX_SPEED;

                // Speed penalty for sharp turns
                if (joystick.active && targetMagnitude > 0.05 && currentSpeed > 20) {
                    if (absAngDiff > 2.2) { // > ~126 degrees
                        targetSpeed *= 0.2;
                    } else if (absAngDiff > 1.3) { // > ~74 degrees
                        targetSpeed *= 0.45;
                    } else if (absAngDiff > 0.7) { // > ~40 degrees
                        targetSpeed *= 0.75;
                    } else if (absAngDiff > 0.35) { // > ~20 degrees
                        targetSpeed *= 0.9;
                    }
                }

                // Apply acceleration or friction
                if (joystick.active && targetMagnitude > 0.03) {
                    // Accelerate toward target speed
                    const accel = ACCELERATION * dt;
                    if (currentSpeed < targetSpeed) {
                        player.speed = Math.min(currentSpeed + accel, targetSpeed);
                    } else {
                        // Decelerate to target (if going too fast for current input)
                        player.speed = Math.max(currentSpeed - accel * 0.8, targetSpeed);
                    }
                } else {
                    // No input - friction
                    player.speed = Math.max(0, currentSpeed - FRICTION * dt);
                }

                // Update velocity vector
                player.vx = Math.cos(player.velAngle) * player.speed;
                player.vy = Math.sin(player.velAngle) * player.speed;

                // Update position
                player.x += player.vx * dt;
                player.y += player.vy * dt;

                // Wall collision
                let wallHit = false;
                if (player.x < WALL_MARGIN) {
                    player.x = WALL_MARGIN;
                    player.vx = Math.abs(player.vx) * 0.4;
                    player.speed *= 0.5;
                    player.velAngle = Math.atan2(player.vy, Math.abs(player.vx));
                    wallHit = true;
                }
                if (player.x > WORLD_SIZE - WALL_MARGIN) {
                    player.x = WORLD_SIZE - WALL_MARGIN;
                    player.vx = -Math.abs(player.vx) * 0.4;
                    player.speed *= 0.5;
                    player.velAngle = Math.atan2(player.vy, -Math.abs(player.vx));
                    wallHit = true;
                }
                if (player.y < WALL_MARGIN) {
                    player.y = WALL_MARGIN;
                    player.vy = Math.abs(player.vy) * 0.4;
                    player.speed *= 0.5;
                    player.velAngle = Math.atan2(Math.abs(player.vy), player.vx);
                    wallHit = true;
                }
                if (player.y > WORLD_SIZE - WALL_MARGIN) {
                    player.y = WORLD_SIZE - WALL_MARGIN;
                    player.vy = -Math.abs(player.vy) * 0.4;
                    player.speed *= 0.5;
                    player.velAngle = Math.atan2(-Math.abs(player.vy), player.vx);
                    wallHit = true;
                }
                if (wallHit) {
                    player.vx = Math.cos(player.velAngle) * player.speed;
                    player.vy = Math.sin(player.velAngle) * player.speed;
                    screenShake = Math.max(screenShake, 6);
                    spawnParticles(player.x, player.y, 12, '#ff3366', 180, [0.2, 0.7]);
                }

                // Trail
                trailTimer += dt;
                if (player.speed > 30 && trailTimer > 0.025) {
                    trailTimer = 0;
                    trailPoints.push({
                        x: player.x,
                        y: player.y,
                        life: 0.55,
                        maxLife: 0.55,
                        speed: player.speed,
                    });
                    if (trailPoints.length > MAX_TRAIL) trailPoints.shift();
                }
                // Age trail
                for (let i = trailPoints.length - 1; i >= 0; i--) {
                    trailPoints[i].life -= dt;
                    if (trailPoints[i].life <= 0) trailPoints.splice(i, 1);
                }

                // Collectibles
                for (let i = collectibles.length - 1; i >= 0; i--) {
                    const c = collectibles[i];
                    const dx = player.x - c.x;
                    const dy = player.y - c.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < c.radius + 16) {
                        // Collected!
                        const speedBonus = Math.floor(player.speed / 40);
                        const points = 10 + speedBonus;
                        score += points;
                        comboCount++;
                        comboTimer = COMBO_TIMEOUT;
                        spawnParticles(c.x, c.y, 18, '#00ffff', 250, [0.3, 1.0]);
                        collectibles.splice(i, 1);
                        spawnCollectible();
                        if (comboCount > 3 && comboCount % 3 === 0) {
                            spawnParticles(player.x, player.y, 8, '#ffff00', 150, [0.2, 0.6]);
                        }
                    }
                }

                // Combo timer
                if (comboTimer > 0) {
                    comboTimer -= dt;
                    if (comboTimer <= 0) {
                        comboCount = 0;
                    }
                }

                // Obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    const dx = player.x - obs.x;
                    const dy = player.y - obs.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const collisionDist = obs.radius + 14;
                    if (dist < collisionDist) {
                        // Hit ICE!
                        const pushAngle = Math.atan2(dy, dx);
                        player.x = obs.x + Math.cos(pushAngle) * collisionDist;
                        player.y = obs.y + Math.sin(pushAngle) * collisionDist;
                        player.speed *= 0.25;
                        player.vx = Math.cos(player.velAngle) * player.speed;
                        player.vy = Math.sin(player.velAngle) * player.speed;
                        comboCount = 0;
                        comboTimer = 0;
                        screenShake = Math.max(screenShake, 10);
                        hitFlash = 0.35;
                        spawnParticles(obs.x, obs.y, 22, '#ff0044', 300, [0.3, 1.1]);
                        // Move obstacle away
                        obstacles[i].x = clamp(obs.x + (Math.random() - 0.5) * 400, WALL_MARGIN + 50, WORLD_SIZE -
                            WALL_MARGIN - 50);
                        obstacles[i].y = clamp(obs.y + (Math.random() - 0.5) * 400, WALL_MARGIN + 50, WORLD_SIZE -
                            WALL_MARGIN - 50);
                    }
                }

                // Screen shake decay
                screenShake = Math.max(0, screenShake - dt * 18);
                hitFlash = Math.max(0, hitFlash - dt * 2.5);

                // Camera follow
                camera.targetX = player.x - W / 2;
                camera.targetY = player.y - H / 2;
                camera.x = lerp(camera.x, camera.targetX, 8 * dt);
                camera.y = lerp(camera.y, camera.targetY, 8 * dt);

                // Apply screen shake
                if (screenShake > 0.1) {
                    camera.x += (Math.random() - 0.5) * screenShake * 2;
                    camera.y += (Math.random() - 0.5) * screenShake * 2;
                }

                // Update particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                // Update collectible pulses
                for (const c of collectibles) c.pulse += dt * 3.5;
                for (const o of obstacles) o.pulse += dt * 2.8;

                // Instructions fade
                if (instructionsFading && instructionsOpacity > 0) {
                    instructionsOpacity = Math.max(0, instructionsOpacity - dt * 1.5);
                    instructionsEl.style.opacity = instructionsOpacity;
                    if (instructionsOpacity <= 0) {
                        instructionsEl.classList.add('fading');
                    }
                }

                // Update speed display
                speedValEl.textContent = Math.floor(player.speed);
            }

            // --- Render ---
            function drawGrid() {
                const gridSpacing = 80;
                const startX = Math.floor(camera.x / gridSpacing) * gridSpacing;
                const startY = Math.floor(camera.y / gridSpacing) * gridSpacing;

                ctx.strokeStyle = 'rgba(0, 255, 255, 0.08)';
                ctx.lineWidth = 1;

                for (let wx = startX; wx < camera.x + W + gridSpacing; wx += gridSpacing) {
                    if (wx < 0 || wx > WORLD_SIZE) continue;
                    const sx = wx - camera.x;
                    ctx.beginPath();
                    ctx.moveTo(sx, 0);
                    ctx.lineTo(sx, H);
                    ctx.stroke();
                }
                for (let wy = startY; wy < camera.y + H + gridSpacing; wy += gridSpacing) {
                    if (wy < 0 || wy > WORLD_SIZE) continue;
                    const sy = wy - camera.y;
                    ctx.beginPath();
                    ctx.moveTo(0, sy);
                    ctx.lineTo(W, sy);
                    ctx.stroke();
                }

                // Major grid lines
                const majorSpacing = 320;
                const mStartX = Math.floor(camera.x / majorSpacing) * majorSpacing;
                const mStartY = Math.floor(camera.y / majorSpacing) * majorSpacing;
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.18)';
                ctx.lineWidth = 1.5;
                for (let wx = mStartX; wx < camera.x + W + majorSpacing; wx += majorSpacing) {
                    if (wx < 0 || wx > WORLD_SIZE) continue;
                    const sx = wx - camera.x;
                    ctx.beginPath();
                    ctx.moveTo(sx, 0);
                    ctx.lineTo(sx, H);
                    ctx.stroke();
                }
                for (let wy = mStartY; wy < camera.y + H + majorSpacing; wy += majorSpacing) {
                    if (wy < 0 || wy > WORLD_SIZE) continue;
                    const sy = wy - camera.y;
                    ctx.beginPath();
                    ctx.moveTo(0, sy);
                    ctx.lineTo(W, sy);
                    ctx.stroke();
                }
            }

            function drawWorldBorder() {
                const topLeft = worldToScreen(0, 0);
                const topRight = worldToScreen(WORLD_SIZE, 0);
                const bottomLeft = worldToScreen(0, WORLD_SIZE);
                const bottomRight = worldToScreen(WORLD_SIZE, WORLD_SIZE);

                ctx.strokeStyle = '#ff00ff';
                ctx.lineWidth = 3;
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 18;
                ctx.strokeRect(topLeft.x, topLeft.y, WORLD_SIZE, WORLD_SIZE);
                ctx.shadowBlur = 0;

                // Inner glow line
                ctx.strokeStyle = 'rgba(255, 0, 255, 0.35)';
                ctx.lineWidth = 1;
                ctx.setLineDash([15, 25]);
                ctx.strokeRect(topLeft.x + 4, topLeft.y + 4, WORLD_SIZE - 8, WORLD_SIZE - 8);
                ctx.setLineDash([]);
            }

            function drawCursorCharacter() {
                const sx = player.x - camera.x;
                const sy = player.y - camera.y;
                const angle = player.velAngle;
                const size = 22;

                ctx.save();
                ctx.translate(sx, sy);
                ctx.rotate(angle);

                // Glow
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 22;

                // Main cursor arrow shape
                ctx.fillStyle = '#00ffff';
                ctx.beginPath();
                ctx.moveTo(size, 0); // tip
                ctx.lineTo(-size * 0.55, -size * 0.55); // top-left
                ctx.lineTo(-size * 0.25, -size * 0.15); // inner notch top
                ctx.lineTo(-size * 0.25, size * 0.15); // inner notch bottom
                ctx.lineTo(-size * 0.55, size * 0.55); // bottom-left
                ctx.closePath();
                ctx.fill();

                // Bright core
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.moveTo(size * 0.7, 0);
                ctx.lineTo(-size * 0.2, -size * 0.25);
                ctx.lineTo(-size * 0.05, 0);
                ctx.lineTo(-size * 0.2, size * 0.25);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.restore();

                // Outer ring glow when fast
                if (player.speed > 200) {
                    const glowIntensity = clamp((player.speed - 200) / (MAX_SPEED - 200), 0, 1);
                    ctx.save();
                    ctx.translate(sx, sy);
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 30 * glowIntensity;
                    ctx.strokeStyle = `rgba(0, 255, 255, ${0.5 * glowIntensity})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(0, 0, size * 1.5, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.restore();
                }
            }

            function drawTrail() {
                if (trailPoints.length < 2) return;
                for (let i = 1; i < trailPoints.length; i++) {
                    const t0 = trailPoints[i - 1];
                    const t1 = trailPoints[i];
                    const alpha0 = clamp(t0.life / t0.maxLife, 0, 1);
                    const alpha1 = clamp(t1.life / t1.maxLife, 0, 1);
                    const avgAlpha = (alpha0 + alpha1) / 2;
                    if (avgAlpha < 0.02) continue;

                    const s0 = worldToScreen(t0.x, t0.y);
                    const s1 = worldToScreen(t1.x, t1.y);

                    ctx.strokeStyle = `rgba(0, 255, 255, ${avgAlpha * 0.7})`;
                    ctx.lineWidth = 3 * avgAlpha + 1;
                    ctx.shadowColor = `rgba(0, 255, 255, ${avgAlpha * 0.6})`;
                    ctx.shadowBlur = 6 * avgAlpha;
                    ctx.beginPath();
                    ctx.moveTo(s0.x, s0.y);
                    ctx.lineTo(s1.x, s1.y);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }
            }

            function drawCollectibles() {
                for (const c of collectibles) {
                    const s = worldToScreen(c.x, c.y);
                    if (!isOnScreen(s.x, s.y, 40)) continue;

                    const pulse = 1 + Math.sin(c.pulse) * 0.25;
                    const r = c.radius * pulse;

                    // Outer glow
                    ctx.shadowColor = '#00ffff';
                    ctx.shadowBlur = 16;
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.25)';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, r + 6, 0, Math.PI * 2);
                    ctx.fill();

                    // Diamond shape
                    ctx.shadowBlur = 10;
                    ctx.fillStyle = '#00ffff';
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y - r);
                    ctx.lineTo(s.x + r * 0.7, s.y);
                    ctx.lineTo(s.x, s.y + r);
                    ctx.lineTo(s.x - r * 0.7, s.y);
                    ctx.closePath();
                    ctx.fill();

                    // Inner bright
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 4;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, r * 0.35, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.shadowBlur = 0;
                }
            }

            function drawObstacles() {
                for (const obs of obstacles) {
                    const s = worldToScreen(obs.x, obs.y);
                    if (!isOnScreen(s.x, s.y, 50)) continue;

                    const pulse = 1 + Math.sin(obs.pulse) * 0.2;
                    const r = obs.radius * pulse;

                    // Outer danger glow
                    ctx.shadowColor = '#ff0044';
                    ctx.shadowBlur = 24;
                    ctx.fillStyle = 'rgba(255, 0, 60, 0.2)';
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, r + 8, 0, Math.PI * 2);
                    ctx.fill();

                    // Hexagonal ICE shape
                    ctx.shadowBlur = 14;
                    ctx.fillStyle = 'rgba(255, 20, 60, 0.7)';
                    ctx.strokeStyle = '#ff3366';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const sides = 6;
                    for (let i = 0; i < sides; i++) {
                        const a = (Math.PI * 2 / sides) * i - Math.PI / 2;
                        const px = s.x + Math.cos(a) * r;
                        const py = s.y + Math.sin(a) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();

                    // Inner X
                    ctx.strokeStyle = '#ff6688';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.moveTo(s.x - r * 0.5, s.y - r * 0.5);
                    ctx.lineTo(s.x + r * 0.5, s.y + r * 0.5);
                    ctx.moveTo(s.x + r * 0.5, s.y - r * 0.5);
                    ctx.lineTo(s.x - r * 0.5, s.y + r * 0.5);
                    ctx.stroke();

                    ctx.shadowBlur = 0;
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    const s = worldToScreen(p.x, p.y);
                    if (!isOnScreen(s.x, s.y, 20)) continue;
                    const alpha = clamp(p.life / p.maxLife, 0, 1);
                    ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb',
                        'rgba');
                    if (p.color.startsWith('#')) {
                        const hex = p.color;
                        const r = parseInt(hex.slice(1, 3), 16);
                        const g = parseInt(hex.slice(3, 5), 16);
                        const b = parseInt(hex.slice(5, 7), 16);
                        ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                    }
                    ctx.shadowColor = ctx.fillStyle;
                    ctx.shadowBlur = 4 * alpha;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, p.size * alpha, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }

            function drawJoystick() {
                const jbx = joystick.baseX;
                const jby = joystick.baseY;
                const jkx = joystick.knobX;
                const jky = joystick.knobY;

                // Base
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(jbx, jby, joystick.baseRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();

                // Inner ring
                ctx.strokeStyle = 'rgba(0, 255, 255, 0.4)';
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 12]);
                ctx.beginPath();
                ctx.arc(jbx, jby, joystick.baseRadius * 0.7, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);

                // Knob
                const knobGrad = ctx.createRadialGradient(jkx, jky, 0, jkx, jky, joystick.knobRadius);
                knobGrad.addColorStop(0, 'rgba(0, 255, 255, 0.9)');
                knobGrad.addColorStop(0.5, 'rgba(0, 200, 220, 0.6)');
                knobGrad.addColorStop(1, 'rgba(0, 100, 150, 0.3)');
                ctx.fillStyle = knobGrad;
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 18;
                ctx.beginPath();
                ctx.arc(jkx, jky, joystick.knobRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Knob highlight
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(jkx - 6, jky - 8, joystick.knobRadius * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawHUD() {
                // Score
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px "Courier New", "SF Mono", monospace';
                ctx.textAlign = 'right';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 8;
                ctx.fillText(`◈ ${score.toString().padStart(6, '0')}`, W - 30, 50);
                ctx.shadowBlur = 0;

                // Combo
                if (comboCount > 2) {
                    ctx.fillStyle = '#ffff00';
                    ctx.font = 'bold 16px "Courier New", "SF Mono", monospace';
                    ctx.textAlign = 'right';
                    ctx.shadowColor = '#ffff00';
                    ctx.shadowBlur = 10;
                    ctx.fillText(`COMBO x${comboCount}`, W - 30, 78);
                    ctx.shadowBlur = 0;
                }

                // Speed bar
                const barX = W - 180;
                const barY = H - 40;
                const barW = 150;
                const barH = 8;
                const speedFrac = clamp(player.speed / MAX_SPEED, 0, 1);

                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.strokeRect(barX - 2, barY - 2, barW + 4, barH + 4);

                // Speed bar fill
                let barColor;
                if (speedFrac < 0.4) barColor = '#00ff88';
                else if (speedFrac < 0.75) barColor = '#ffcc00';
                else barColor = '#ff3366';

                const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
                grad.addColorStop(0, barColor);
                grad.addColorStop(1, barColor.replace('ff', 'ff').replace('33', '00'));
                ctx.fillStyle = grad;
                ctx.fillRect(barX, barY, barW * speedFrac, barH);

                // Glow on bar
                ctx.shadowColor = barColor;
                ctx.shadowBlur = 8;
                ctx.fillStyle = barColor;
                ctx.fillRect(barX + barW * speedFrac - 3, barY - 1, 6, barH + 2);
                ctx.shadowBlur = 0;

                // Label
                ctx.fillStyle = '#ffffff88';
                ctx.font = '11px "Courier New", "SF Mono", monospace';
                ctx.textAlign = 'right';
                ctx.fillText('SPEED', barX - 10, barY + barH - 2);
            }

            function drawHitFlash() {
                if (hitFlash > 0.01) {
                    ctx.fillStyle = `rgba(255, 0, 40, ${hitFlash * 0.35})`;
                    ctx.fillRect(0, 0, W, H);
                }
            }

            function render() {
                // Clear
                ctx.fillStyle = '#0a0a14';
                ctx.fillRect(0, 0, W, H);

                // Subtle vignette
                const vignetteGrad = ctx.createRadialGradient(W / 2, H / 2, W * 0.55, W / 2, H / 2, W * 0.95);
                vignetteGrad.addColorStop(0, 'rgba(0,0,0,0)');
                vignetteGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
                ctx.fillStyle = vignetteGrad;
                ctx.fillRect(0, 0, W, H);

                drawGrid();
                drawWorldBorder();
                drawTrail();
                drawCollectibles();
                drawObstacles();
                drawParticles();
                drawCursorCharacter();
                drawHitFlash();
                drawJoystick();
                drawHUD();

                // Joystick zone hint (subtle)
                if (!joystick.active && !gameStarted) {
                    const jbx = joystick.fixedBaseX;
                    const jby = joystick.fixedBaseY;
                    const pulse = 0.35 + Math.sin(performance.now() / 1000) * 0.2;
                    ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
                    ctx.lineWidth = 2;
                    ctx.setLineDash([6, 8]);
                    ctx.beginPath();
                    ctx.arc(jbx, jby, joystick.baseRadius + 15, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }

            // --- Game Loop ---
            function gameLoop(timestamp) {
                let dt = (timestamp - lastTime) / 1000;
                if (dt <= 0) dt = 0.016;
                if (dt > 0.15) dt = 0.15; // Cap to avoid huge jumps
                lastTime = timestamp;

                update(dt);
                render();
                requestAnimationFrame(gameLoop);
            }

            // --- Initialize ---
            function init() {
                updateJoystickFixedBase();
                joystick.baseX = joystick.fixedBaseX;
                joystick.baseY = joystick.fixedBaseY;
                joystick.knobX = joystick.baseX;
                joystick.knobY = joystick.baseY;
                player.x = WORLD_HALF;
                player.y = WORLD_HALF;
                player.vx = 0;
                player.vy = 0;
                player.speed = 0;
                player.velAngle = 0;
                camera.x = player.x - W / 2;
                camera.y = player.y - H / 2;
                camera.targetX = camera.x;
                camera.targetY = camera.y;
                collectibles.length = 0;
                obstacles.length = 0;
                particles.length = 0;
                trailPoints.length = 0;
                score = 0;
                comboCount = 0;
                comboTimer = 0;
                screenShake = 0;
                hitFlash = 0;
                instructionsOpacity = 1;
                instructionsFading = false;
                gameStarted = false;
                instructionsEl.classList.remove('fading');
                instructionsEl.style.opacity = '1';
                speedValEl.textContent = '0';
                initCollectibles();
                initObstacles();
            }

            init();

            // Handle resize
            const origResize = resizeCanvas;
            resizeCanvas = function() {
                origResize();
                updateJoystickFixedBase();
                if (!joystick.active) {
                    joystick.baseX = joystick.fixedBaseX;
                    joystick.baseY = joystick.fixedBaseY;
                    joystick.knobX = joystick.baseX;
                    joystick.knobY = joystick.baseY;
                }
                camera.x = player.x - W / 2;
                camera.y = player.y - H / 2;
                camera.targetX = camera.x;
                camera.targetY = camera.y;
            };

            // Start
            requestAnimationFrame(gameLoop);

            console.log('◈ NEON DRIFT READY ◈');
            console.log('🕹️  Use joystick (bottom-left) to move');
            console.log('💨 Smooth turns maintain speed');
            console.log('⚠️  Sharp turns cause speed loss');
            console.log('💎 Collect cyan data nodes');
            console.log('🧊 Avoid red ICE obstacles');
            console.log('📱 Optimized for iPad touch');
        })();
    </script>
</body>
</html>
