<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dash & Glow · 2D Movement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #060b14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            touch-action: none;
            overflow: hidden;
        }

        .game-wrapper {
            background: #101a28;
            border-radius: 28px;
            padding: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9), 0 0 60px rgba(0, 140, 255, 0.04);
            border: 1px solid rgba(60, 140, 200, 0.08);
            max-width: 100vw;
            max-height: 100vh;
        }

        canvas {
            display: block;
            border-radius: 16px;
            background: #0b1422;
            width: 100%;
            height: auto;
            aspect-ratio: 900 / 600;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.7);
            touch-action: none;
            cursor: default;
        }

        .ui-overlay {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 6px;
            color: #6a8ba0;
            font-size: 13px;
            letter-spacing: 0.2px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .status-group {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .dot.ready {
            background: #00e676;
            box-shadow: 0 0 16px rgba(0, 230, 118, 0.5);
        }
        .dot.cooldown {
            background: #ff5252;
            box-shadow: 0 0 16px rgba(255, 82, 82, 0.5);
        }
        .dot.dashing {
            background: #00e5ff;
            box-shadow: 0 0 24px rgba(0, 229, 255, 0.7);
        }

        #speedDisplay {
            color: #8ac4e0;
            font-weight: 600;
            min-width: 44px;
            font-variant-numeric: tabular-nums;
        }

        .dash-btn {
            background: #1a2a3e;
            border: none;
            border-radius: 60px;
            padding: 8px 22px;
            font-weight: 700;
            font-size: 15px;
            color: #b0daf0;
            border: 1px solid #2a4a6a;
            box-shadow: 0 4px 0 #0a121e, 0 0 12px rgba(0, 160, 255, 0.1);
            transition: all 0.08s ease;
            touch-action: manipulation;
            cursor: pointer;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(145deg, #1e3048, #142234);
        }
        .dash-btn:active {
            transform: scale(0.93);
            box-shadow: 0 1px 0 #0a121e;
            background: #0f1e2e;
        }
        .dash-btn .icon {
            font-size: 18px;
            line-height: 1;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 8px;
                border-radius: 18px;
            }
            .ui-overlay {
                font-size: 11px;
                gap: 6px;
            }
            .dash-btn {
                padding: 6px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <canvas id="game" width="900" height="600"></canvas>
        <div class="ui-overlay">
            <div class="status-group">
                <div class="indicator">
                    <span style="color:#4a7a8a;">⚡</span>
                    <span class="dot ready" id="dashDot"></span>
                </div>
                <div class="indicator">
                    <span style="color:#4a7a8a;">SPEED</span>
                    <span id="speedDisplay">0</span>
                </div>
            </div>
            <button class="dash-btn" id="dashButton">
                <span class="icon">⚡</span> DASH
            </button>
        </div>
    </div>

    <script>
        // ---- SETUP ----
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const dashDot = document.getElementById('dashDot');
        const speedDisplay = document.getElementById('speedDisplay');
        const dashButton = document.getElementById('dashButton');

        const W = 900,
            H = 600;

        // ---- PLAYER (CIRCLE by default, TRIANGLE when dashing) ----
        const player = {
            x: W / 2,
            y: H / 2,
            radius: 18,
            speed: 3.6,
            vx: 0,
            vy: 0,
            friction: 0.89,
            accel: 0.5,

            facing: Math.PI / 2, // down

            // Dash
            isDashing: false,
            dashMultiplier: 1,
            dashDuration: 320, // ms
            dashCooldown: 900, // ms (reduced for more action)
            dashTimer: 0,
            cooldownTimer: 0,
            dashSpeedBoost: 9.5, // significantly buffed

            // Trail (for circle mode)
            trail: [],
            maxTrail: 38,

            flashTimer: 0,
        };

        // ---- PARTICLES (more, bigger, brighter) ----
        let particles = [];

        // ---- INPUT (mobile + mouse) ----
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            up: false,
            down: false,
            left: false,
            right: false,
        };

        let touchActive = false;
        let touchX = null,
            touchY = null;

        // ---- SHAKE ----
        window.shakeAmount = 0;
        window.shakeTimer = 0;

        // ---- UTILITY ----
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        // ---- PARTICLES (enhanced) ----
        function spawnDashParticles(x, y, angle, count = 40) {
            for (let i = 0; i < count; i++) {
                const speed = 3 + Math.random() * 9;
                const a = angle + (Math.random() - 0.5) * 1.8;
                const size = 3 + Math.random() * 9;
                const colors = [
                    `hsl(${180 + Math.random() * 40}, 100%, ${65 + Math.random() * 35}%)`,
                    `hsl(${210 + Math.random() * 30}, 100%, ${70 + Math.random() * 30}%)`,
                    `hsl(${150 + Math.random() * 40}, 100%, ${60 + Math.random() * 30}%)`,
                    `hsl(${190 + Math.random() * 30}, 100%, ${80 + Math.random() * 20}%)`,
                ];
                particles.push({
                    x: x + (Math.random() - 0.5) * 16,
                    y: y + (Math.random() - 0.5) * 16,
                    vx: Math.cos(a) * speed * (0.6 + Math.random() * 0.6),
                    vy: Math.sin(a) * speed * (0.6 + Math.random() * 0.6),
                    life: 1,
                    decay: 0.006 + Math.random() * 0.012,
                    size: size,
                    maxSize: size,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    glow: true,
                });
            }
        }

        function spawnTrailParticles(x, y, angle, count = 12) {
            for (let i = 0; i < count; i++) {
                const speed = 1.5 + Math.random() * 4;
                const a = angle + (Math.random() - 0.5) * 1.2;
                const size = 2.5 + Math.random() * 5;
                particles.push({
                    x: x + (Math.random() - 0.5) * 10,
                    y: y + (Math.random() - 0.5) * 10,
                    vx: Math.cos(a) * speed * 0.7,
                    vy: Math.sin(a) * speed * 0.7,
                    life: 1,
                    decay: 0.018 + Math.random() * 0.025,
                    size: size,
                    maxSize: size,
                    color: `hsl(${190 + Math.random() * 40}, 100%, ${70 + Math.random() * 25}%)`,
                    glow: true,
                });
            }
        }

        function spawnBurstRing(x, y, count = 30) {
            for (let i = 0; i < count; i++) {
                const a = (i / count) * Math.PI * 2 + Math.random() * 0.2;
                const speed = 2 + Math.random() * 5;
                const size = 2 + Math.random() * 5;
                particles.push({
                    x: x + (Math.random() - 0.5) * 6,
                    y: y + (Math.random() - 0.5) * 6,
                    vx: Math.cos(a) * speed * (0.8 + Math.random() * 0.4),
                    vy: Math.sin(a) * speed * (0.8 + Math.random() * 0.4),
                    life: 1,
                    decay: 0.01 + Math.random() * 0.015,
                    size: size,
                    maxSize: size,
                    color: `hsl(${200 + Math.random() * 30}, 100%, ${75 + Math.random() * 25}%)`,
                    glow: true,
                });
            }
        }

        // ---- DASH (buff) ----
        function performDash() {
            if (player.isDashing) return;
            if (player.cooldownTimer > 0) return;

            player.isDashing = true;
            player.dashTimer = player.dashDuration;
            player.dashMultiplier = player.dashSpeedBoost;

            // Mega burst
            spawnDashParticles(player.x, player.y, player.facing, 55);
            spawnBurstRing(player.x, player.y, 35);

            // Extra trails
            for (let i = 0; i < 15; i++) {
                spawnTrailParticles(
                    player.x + (Math.random() - 0.5) * 30,
                    player.y + (Math.random() - 0.5) * 30,
                    player.facing + (Math.random() - 0.5) * 0.8,
                    6
                );
            }

            player.flashTimer = 150;

            // Strong shake
            window.shakeAmount = 14;
            window.shakeTimer = 180;
        }

        // ---- UPDATE ----
        function update(dt) {
            const dtFactor = Math.min(dt / 16.67, 2.0);

            // ---- Movement from keys or touch ----
            let moveX = 0,
                moveY = 0;

            // Keyboard
            if (keys.w || keys.up) moveY = -1;
            if (keys.s || keys.down) moveY = 1;
            if (keys.a || keys.left) moveX = -1;
            if (keys.d || keys.right) moveX = 1;

            // Touch (overrides keyboard if active)
            if (touchActive && touchX !== null && touchY !== null) {
                const dx = touchX - player.x;
                const dy = touchY - player.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 12) {
                    moveX = dx / dist;
                    moveY = dy / dist;
                } else {
                    moveX = 0;
                    moveY = 0;
                }
            }

            // Normalize
            const len = Math.hypot(moveX, moveY);
            if (len > 0) {
                moveX /= len;
                moveY /= len;
            }

            // ---- Facing ----
            if (moveX !== 0 || moveY !== 0) {
                player.facing = Math.atan2(moveY, moveX);
            }

            // ---- Velocity ----
            const targetVx = moveX * player.speed;
            const targetVy = moveY * player.speed;
            if (moveX !== 0 || moveY !== 0) {
                player.vx += (targetVx - player.vx) * 0.2 * dtFactor;
                player.vy += (targetVy - player.vy) * 0.2 * dtFactor;
            } else {
                player.vx *= Math.pow(player.friction, dtFactor * 0.7);
                player.vy *= Math.pow(player.friction, dtFactor * 0.7);
                if (Math.abs(player.vx) < 0.02) player.vx = 0;
                if (Math.abs(player.vy) < 0.02) player.vy = 0;
            }

            // ---- Dash ----
            if (player.isDashing) {
                player.dashTimer -= dt;
                if (player.dashTimer <= 0) {
                    player.isDashing = false;
                    player.dashMultiplier = 1;
                    player.dashTimer = 0;
                    player.cooldownTimer = player.dashCooldown;

                    // End burst
                    spawnDashParticles(player.x, player.y, player.facing + Math.PI, 30);
                    spawnBurstRing(player.x, player.y, 25);
                    window.shakeAmount = 8;
                    window.shakeTimer = 100;
                } else {
                    // Dash speed
                    const dashSpeed = player.speed * player.dashMultiplier;
                    const steer = 0.08;
                    const targetDashX = Math.cos(player.facing) * dashSpeed;
                    const targetDashY = Math.sin(player.facing) * dashSpeed;
                    player.vx += (targetDashX - player.vx) * steer * dtFactor;
                    player.vy += (targetDashY - player.vy) * steer * dtFactor;

                    // Heavy trail during dash
                    if (Math.random() < 0.7 * dtFactor) {
                        spawnTrailParticles(
                            player.x + (Math.random() - 0.5) * 16,
                            player.y + (Math.random() - 0.5) * 16,
                            player.facing + (Math.random() - 0.5) * 0.5,
                            4 + Math.floor(Math.random() * 5)
                        );
                    }
                    // Extra sparks
                    if (Math.random() < 0.3 * dtFactor) {
                        spawnBurstRing(player.x, player.y, 8);
                    }
                }
            }

            // ---- Cooldown ----
            if (player.cooldownTimer > 0) {
                player.cooldownTimer -= dt;
                if (player.cooldownTimer < 0) player.cooldownTimer = 0;
            }

            // ---- Apply velocity ----
            player.x += player.vx * dtFactor;
            player.y += player.vy * dtFactor;

            const margin = player.radius + 4;
            player.x = clamp(player.x, margin, W - margin);
            player.y = clamp(player.y, margin, H - margin);

            // ---- Trail (for circle mode) ----
            if (!player.isDashing && (Math.abs(player.vx) > 0.4 || Math.abs(player.vy) > 0.4)) {
                player.trail.push({ x: player.x, y: player.y, life: 1 });
                if (player.trail.length > player.maxTrail) player.trail.shift();
            }
            // Fade trail
            for (let i = player.trail.length - 1; i >= 0; i--) {
                player.trail[i].life -= 0.03 * dtFactor;
                if (player.trail[i].life <= 0) player.trail.splice(i, 1);
            }

            // ---- Flash ----
            if (player.flashTimer > 0) player.flashTimer -= dt;

            // ---- Particles ----
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dtFactor;
                p.y += p.vy * dtFactor;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= p.decay * dtFactor;
                p.size = p.maxSize * p.life;
                if (p.life <= 0 || p.size < 0.2) {
                    particles.splice(i, 1);
                }
            }

            // ---- Shake ----
            if (window.shakeTimer > 0) {
                window.shakeTimer -= dt;
                if (window.shakeTimer < 0) window.shakeTimer = 0;
                window.shakeAmount *= 0.97;
                if (window.shakeAmount < 0.1) window.shakeAmount = 0;
            }

            // ---- UI ----
            const speed = Math.hypot(player.vx, player.vy);
            speedDisplay.textContent = Math.round(speed * 10) / 10;

            if (player.isDashing) {
                dashDot.className = 'dot dashing';
            } else if (player.cooldownTimer > 0) {
                dashDot.className = 'dot cooldown';
            } else {
                dashDot.className = 'dot ready';
            }
        }

        // ---- RENDER ----
        function render() {
            ctx.save();

            // Shake
            let shakeX = 0,
                shakeY = 0;
            if (window.shakeTimer > 0 && window.shakeAmount > 0.2) {
                shakeX = (Math.random() - 0.5) * window.shakeAmount * 2;
                shakeY = (Math.random() - 0.5) * window.shakeAmount * 2;
                ctx.translate(shakeX, shakeY);
            }

            // ---- Background ----
            const grad = ctx.createRadialGradient(W / 2, H / 2, 80, W / 2, H / 2, 600);
            grad.addColorStop(0, '#14263a');
            grad.addColorStop(0.5, '#0d1828');
            grad.addColorStop(1, '#060c16');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // Grid (subtle)
            ctx.strokeStyle = 'rgba(30, 70, 110, 0.15)';
            ctx.lineWidth = 1;
            for (let x = 0; x <= W; x += 55) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y <= H; y += 55) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // ---- Player glow ring ----
            const glowR = player.isDashing ? 200 : 140;
            const grdGlow = ctx.createRadialGradient(player.x, player.y, 10, player.x, player.y, glowR);
            const alpha = player.isDashing ? 0.15 : 0.06;
            grdGlow.addColorStop(0, `rgba(0, 200, 255, ${alpha})`);
            grdGlow.addColorStop(0.5, `rgba(0, 150, 255, ${alpha * 0.5})`);
            grdGlow.addColorStop(1, 'rgba(0, 100, 255, 0)');
            ctx.fillStyle = grdGlow;
            ctx.beginPath();
            ctx.arc(player.x, player.y, glowR, 0, Math.PI * 2);
            ctx.fill();

            // ---- Trail (circle mode) ----
            if (!player.isDashing) {
                for (const t of player.trail) {
                    const alpha = t.life * 0.3;
                    const size = player.radius * 0.55 * t.life;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = `hsl(200, 100%, ${65 + 30 * t.life}%)`;
                    ctx.shadowColor = `rgba(0, 180, 255, ${alpha * 0.3})`;
                    ctx.shadowBlur = 18;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            // ---- Particles ----
            for (const p of particles) {
                ctx.globalAlpha = p.life * 0.9;
                ctx.fillStyle = p.color || '#66d0ff';
                if (p.glow) {
                    ctx.shadowColor = `rgba(100, 200, 255, ${p.life * 0.5})`;
                    ctx.shadowBlur = 24;
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(p.size, 0.6), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ---- PLAYER ----
            const px = player.x,
                py = player.y,
                r = player.radius;

            if (player.isDashing) {
                // ---- TRIANGLE (dash mode) ----
                const angle = player.facing;
                const tipDist = r * 1.35;
                const baseDist = r * 0.7;
                const baseHalf = r * 0.8;

                const tipX = px + Math.cos(angle) * tipDist;
                const tipY = py + Math.sin(angle) * tipDist;
                const baseX = px - Math.cos(angle) * baseDist;
                const baseY = py - Math.sin(angle) * baseDist;
                const perpAngle = angle + Math.PI / 2;
                const b1x = baseX + Math.cos(perpAngle) * baseHalf;
                const b1y = baseY + Math.sin(perpAngle) * baseHalf;
                const b2x = baseX - Math.cos(perpAngle) * baseHalf;
                const b2y = baseY - Math.sin(perpAngle) * baseHalf;

                // Glow
                ctx.shadowColor = 'rgba(0, 220, 255, 0.9)';
                ctx.shadowBlur = 60;

                // Gradient
                const gradTri = ctx.createLinearGradient(tipX, tipY, b1x, b1y);
                gradTri.addColorStop(0, '#00f0ff');
                gradTri.addColorStop(0.4, '#0099ff');
                gradTri.addColorStop(1, '#0033aa');
                ctx.fillStyle = gradTri;
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(b1x, b1y);
                ctx.lineTo(b2x, b2y);
                ctx.closePath();
                ctx.fill();

                // Border
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0, 240, 255, 0.7)';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Inner core
                const innerX = px + Math.cos(angle) * r * 0.3;
                const innerY = py + Math.sin(angle) * r * 0.3;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowColor = 'rgba(0, 200, 255, 0.8)';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(innerX, innerY, r * 0.25, 0, Math.PI * 2);
                ctx.fill();

                // Extra dash ring
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0, 230, 255, 0.25)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 8]);
                const ringR = r * 1.7 + Math.sin(Date.now() / 60) * 4;
                ctx.beginPath();
                ctx.arc(px, py, ringR, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);

                // Speed lines
                for (let i = 0; i < 16; i++) {
                    const a = i / 16 * Math.PI * 2 + Date.now() / 250;
                    const dist = r * 1.9 + Math.sin(a * 2 + Date.now() / 180) * 5;
                    const lx = px + Math.cos(a) * dist;
                    const ly = py + Math.sin(a) * dist;
                    const sz = 2.5 + Math.sin(a * 3 + Date.now() / 120) * 2;
                    ctx.fillStyle = `rgba(0, 220, 255, ${0.2 + Math.sin(a + Date.now() / 200) * 0.15 + 0.15})`;
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = 'rgba(0, 200, 255, 0.3)';
                    ctx.beginPath();
                    ctx.arc(lx, ly, sz, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;

            } else {
                // ---- CIRCLE (normal mode) ----
                // Soft glow
                ctx.shadowColor = 'rgba(0, 180, 255, 0.25)';
                ctx.shadowBlur = 30;

                const gradCirc = ctx.createRadialGradient(px - 4, py - 4, 4, px, py, r);
                gradCirc.addColorStop(0, '#6ed4ff');
                gradCirc.addColorStop(0.5, '#1a8cff');
                gradCirc.addColorStop(1, '#003d7a');
                ctx.fillStyle = gradCirc;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fill();

                // Border
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(100, 200, 255, 0.35)';
                ctx.lineWidth = 1.8;
                ctx.stroke();

                // Inner highlight
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(0, 200, 255, 0.2)';
                const hlGrad = ctx.createRadialGradient(px - 5, py - 6, 2, px, py, r * 0.7);
                hlGrad.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
                hlGrad.addColorStop(0.4, 'rgba(200, 240, 255, 0.2)');
                hlGrad.addColorStop(1, 'rgba(0, 100, 200, 0)');
                ctx.fillStyle = hlGrad;
                ctx.beginPath();
                ctx.arc(px, py, r * 0.7, 0, Math.PI * 2);
                ctx.fill();

                // Core dot (facing indicator)
                const dotX = px + Math.cos(player.facing) * r * 0.45;
                const dotY = py + Math.sin(player.facing) * r * 0.45;
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'rgba(0, 220, 255, 0.4)';
                ctx.fillStyle = '#b0ecff';
                ctx.beginPath();
                ctx.arc(dotX, dotY, r * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;

                // Small direction indicator (arrow)
                const tipX2 = px + Math.cos(player.facing) * r * 0.9;
                const tipY2 = py + Math.sin(player.facing) * r * 0.9;
                const backX = px - Math.cos(player.facing) * r * 0.25;
                const backY = py - Math.sin(player.facing) * r * 0.25;
                const perp2 = player.facing + Math.PI / 2;
                const w1x = backX + Math.cos(perp2) * r * 0.22;
                const w1y = backY + Math.sin(perp2) * r * 0.22;
                const w2x = backX - Math.cos(perp2) * r * 0.22;
                const w2y = backY - Math.sin(perp2) * r * 0.22;
                ctx.fillStyle = 'rgba(180, 235, 255, 0.35)';
                ctx.beginPath();
                ctx.moveTo(tipX2, tipY2);
                ctx.lineTo(w1x, w1y);
                ctx.lineTo(w2x, w2y);
                ctx.closePath();
                ctx.fill();
            }

            // ---- Cooldown ring (both modes) ----
            if (player.cooldownTimer > 0 && !player.isDashing) {
                const progress = player.cooldownTimer / player.dashCooldown;
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 80, 80, 0.3)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(px, py, r * 1.45, -Math.PI / 2, -Math.PI / 2 + (1 - progress) * Math.PI * 2);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;
            ctx.restore();

            // ---- HUD: Dash bar (bottom) ----
            const barW = 180,
                barH = 7;
            const barX = W / 2 - barW / 2,
                barY = H - 28;
            ctx.fillStyle = 'rgba(8, 16, 30, 0.6)';
            ctx.beginPath();
            ctx.roundRect(barX - 2, barY - 2, barW + 4, barH + 4, 8);
            ctx.fill();

            ctx.fillStyle = 'rgba(10, 20, 35, 0.5)';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 5);
            ctx.fill();

            let fillW = 0;
            let fillColor = '#00e676';
            if (player.isDashing) {
                const prog = player.dashTimer / player.dashDuration;
                fillW = barW * prog;
                fillColor = '#00e5ff';
            } else if (player.cooldownTimer > 0) {
                const prog = 1 - player.cooldownTimer / player.dashCooldown;
                fillW = barW * prog;
                fillColor = '#ff5252';
            } else {
                fillW = barW;
                fillColor = '#00e676';
            }

            const fillGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
            if (player.isDashing) {
                fillGrad.addColorStop(0, '#0099cc');
                fillGrad.addColorStop(1, '#00e5ff');
            } else if (player.cooldownTimer > 0) {
                fillGrad.addColorStop(0, '#cc0033');
                fillGrad.addColorStop(1, '#ff5252');
            } else {
                fillGrad.addColorStop(0, '#00c853');
                fillGrad.addColorStop(1, '#69f0ae');
            }
            ctx.fillStyle = fillGrad;
            ctx.beginPath();
            if (fillW > 0) {
                ctx.roundRect(barX, barY, fillW, barH, 5);
                ctx.fill();
            }

            ctx.fillStyle = 'rgba(120, 180, 210, 0.4)';
            ctx.font = '9px "Segoe UI", system-ui, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('⚡ DASH', W / 2, barY - 6);

            // ---- Speed ring ----
            const speed = Math.hypot(player.vx, player.vy);
            const maxSpeed = player.speed * (player.isDashing ? player.dashMultiplier : 1.5);
            const speedRatio = Math.min(speed / (player.speed * 1.8), 1);
            if (speedRatio > 0.05 && !player.isDashing) {
                ctx.save();
                ctx.globalAlpha = 0.15 + speedRatio * 0.25;
                ctx.strokeStyle = `hsl(${200 - speedRatio * 40}, 100%, ${60 + speedRatio * 30}%)`;
                ctx.lineWidth = 1.8;
                ctx.setLineDash([3, 6]);
                const ringR = player.radius + 10 + speedRatio * 10;
                ctx.beginPath();
                ctx.arc(player.x, player.y, ringR, 0, Math.PI * 2 * speedRatio);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }
        }

        // ---- GAME LOOP ----
        let lastTime = 0;

        function gameLoop(time) {
            const dt = Math.min(time - lastTime, 35);
            lastTime = time;

            update(dt);
            render();

            requestAnimationFrame(gameLoop);
        }

        // ---- INPUT (Keyboard) ----
        function handleKeyDown(e) {
            const key = e.key.toLowerCase();
            const map = {
                'w': 'w',
                'a': 'a',
                's': 's',
                'd': 'd',
                'arrowup': 'up',
                'arrowdown': 'down',
                'arrowleft': 'left',
                'arrowright': 'right',
            };
            const mapped = map[key] || map[e.key];
            if (mapped) {
                e.preventDefault();
                keys[mapped] = true;
            }
            if (key === ' ' || e.key === ' ' || e.key === 'Shift') {
                e.preventDefault();
                performDash();
            }
        }

        function handleKeyUp(e) {
            const key = e.key.toLowerCase();
            const map = {
                'w': 'w',
                'a': 'a',
                's': 's',
                'd': 'd',
                'arrowup': 'up',
                'arrowdown': 'down',
                'arrowleft': 'left',
                'arrowright': 'right',
            };
            const mapped = map[key] || map[e.key];
            if (mapped) {
                e.preventDefault();
                keys[mapped] = false;
            }
            if (key === ' ' || e.key === ' ' || e.key === 'Shift') {
                e.preventDefault();
            }
        }

        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('keyup', handleKeyUp);
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space' || e.key === 'Shift') e.preventDefault();
        }, { passive: false });

        // ---- MOUSE / TOUCH (mobile-friendly) ----
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY,
            };
        }

        function handlePointerDown(e) {
            e.preventDefault();
            const pos = getPos(e);
            touchX = pos.x;
            touchY = pos.y;
            touchActive = true;

            // If it's a mouse click, dash
            if (!e.touches) {
                performDash();
            }
        }

        function handlePointerMove(e) {
            e.preventDefault();
            if (!touchActive) return;
            const pos = getPos(e);
            touchX = pos.x;
            touchY = pos.y;
        }

        function handlePointerUp(e) {
            e.preventDefault();
            touchActive = false;
            touchX = null;
            touchY = null;
            // Reset keys if no touch
            keys.w = keys.a = keys.s = keys.d = false;
            keys.up = keys.down = keys.left = keys.right = false;
        }

        // Mouse
        canvas.addEventListener('mousedown', handlePointerDown);
        canvas.addEventListener('mousemove', handlePointerMove);
        canvas.addEventListener('mouseup', handlePointerUp);
        canvas.addEventListener('mouseleave', handlePointerUp);

        // Touch
        canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
        canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
        canvas.addEventListener('touchend', handlePointerUp, { passive: false });
        canvas.addEventListener('touchcancel', handlePointerUp, { passive: false });

        // ---- DASH BUTTON ----
        dashButton.addEventListener('click', (e) => {
            e.preventDefault();
            performDash();
        });
        dashButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            performDash();
        }, { passive: false });

        // ---- ROUND RECT POLYFILL ----
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        // ---- START ----
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
