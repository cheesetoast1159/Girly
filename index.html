            }

            setupInput() {
                // Joystick and button logic (simplified from original)
                // We'll reuse the original touch/mouse handlers but integrate with this.input
                // For brevity, we assume the original handlers are adapted to set this.input.
                // In this single-file version, we keep the original event listeners from the previous code.
                // They will directly modify this.input. We'll just attach them.
                // We'll also include a simple keyboard fallback.
                const canvas = this.canvas;
                const game = this;

                // --- Joystick state (reuse existing) ---
                const aimJoystick = {
                    x: 140,
                    y: 480,
                    radius: 64,
                    active: false,
                    dx: 0,
                    dy: 0,
                };
                const moveJoystick = {
                    x: 760,
                    y: 480,
                    radius: 64,
                    active: false,
                    dx: 0,
                    dy: 0,
                };
                const dashButton = {
                    x: 70,
                    y: 70,
                    radius: 40,
                    active: false,
                };

                // Touch handlers
                const getCanvasCoords = (e) => {
                    const rect = canvas.getBoundingClientRect();
                    return {
                        x: (e.clientX - rect.left) * (canvas.width / rect.width),
                        y: (e.clientY - rect.top) * (canvas.height / rect.height)
                    };
                };
                const isInside = (x, y, cx, cy, r) => (x - cx) ** 2 + (y - cy) ** 2 < r ** 2;

                canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    for (const touch of e.touches) {
                        const { x, y } = getCanvasCoords(touch);
                        if (isInside(x, y, aimJoystick.x, aimJoystick.y, aimJoystick.radius + 20)) {
                            aimJoystick.active = true;
                            aimJoystick.dx = x - aimJoystick.x;
                            aimJoystick.dy = y - aimJoystick.y;
                            const maxDist = aimJoystick.radius * 0.6;
                            const d = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                            if (d > maxDist) { aimJoystick.dx = (aimJoystick.dx / d) * maxDist;
                                aimJoystick.dy = (aimJoystick.dy / d) * maxDist; }
                            game.input.aimAngle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                            game.input.shoot = true; // will be released on touchend
                        } else if (isInside(x, y, moveJoystick.x, moveJoystick.y, moveJoystick.radius + 20)) {
                            moveJoystick.active = true;
                            moveJoystick.dx = x - moveJoystick.x;
                            moveJoystick.dy = y - moveJoystick.y;
                            const maxDist = moveJoystick.radius * 0.6;
                            const d = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                            if (d > maxDist) { moveJoystick.dx = (moveJoystick.dx / d) * maxDist;
                                moveJoystick.dy = (moveJoystick.dy / d) * maxDist; }
                            game.input.moveX = moveJoystick.dx / maxDist;
                            game.input.moveY = moveJoystick.dy / maxDist;
                            const len = Math.hypot(game.input.moveX, game.input.moveY);
                            if (len > 1) { game.input.moveX /= len;
                                game.input.moveY /= len; }
                        } else if (isInside(x, y, dashButton.x, dashButton.y, dashButton.radius + 20)) {
                            game.input.dash = true;
                        }
                    }
                }, { passive: false });

                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    for (const touch of e.touches) {
                        const { x, y } = getCanvasCoords(touch);
                        if (aimJoystick.active) {
                            aimJoystick.dx = x - aimJoystick.x;
                            aimJoystick.dy = y - aimJoystick.y;
                            const maxDist = aimJoystick.radius * 0.6;
                            const d = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                            if (d > maxDist) { aimJoystick.dx = (aimJoystick.dx / d) * maxDist;
                                aimJoystick.dy = (aimJoystick.dy / d) * maxDist; }
                            game.input.aimAngle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                        }
                        if (moveJoystick.active) {
                            moveJoystick.dx = x - moveJoystick.x;
                            moveJoystick.dy = y - moveJoystick.y;
                            const maxDist = moveJoystick.radius * 0.6;
                            const d = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                            if (d > maxDist) { moveJoystick.dx = (moveJoystick.dx / d) * maxDist;
                                moveJoystick.dy = (moveJoystick.dy / d) * maxDist; }
                            game.input.moveX = moveJoystick.dx / maxDist;
                            game.input.moveY = moveJoystick.dy / maxDist;
                            const len = Math.hypot(game.input.moveX, game.input.moveY);
                            if (len > 1) { game.input.moveX /= len;
                                game.input.moveY /= len; }
                        }
                    }
                }, { passive: false });

                canvas.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    // On release of aim joystick, shoot
                    if (aimJoystick.active) {
                        game.input.shoot = true; // we fire on release
                        aimJoystick.active = false;
                    }
                    // Move joystick release
                    if (moveJoystick.active) {
                        moveJoystick.active = false;
                        game.input.moveX = 0;
                        game.input.moveY = 0;
                    }
                    // Dash button release
                    if (game.input.dash) {
                        game.input.dash = false;
                    }
                }, { passive: false });

                canvas.addEventListener('touchcancel', (e) => {
                    aimJoystick.active = false;
                    moveJoystick.active = false;
                    game.input.moveX = 0;
                    game.input.moveY = 0;
                    game.input.dash = false;
                }, { passive: false });

                // Mouse events
                let mouseDown = false;
                let mouseOnAim = false;
                let mouseOnMove = false;
                canvas.addEventListener('mousedown', (e) => {
                    const { x, y } = getCanvasCoords(e);
                    if (isInside(x, y, aimJoystick.x, aimJoystick.y, aimJoystick.radius + 20)) {
                        mouseOnAim = true;
                        aimJoystick.active = true;
                        aimJoystick.dx = x - aimJoystick.x;
                        aimJoystick.dy = y - aimJoystick.y;
                        const maxDist = aimJoystick.radius * 0.6;
                        const d = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                        if (d > maxDist) { aimJoystick.dx = (aimJoystick.dx / d) * maxDist;
                            aimJoystick.dy = (aimJoystick.dy / d) * maxDist; }
                        game.input.aimAngle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                    } else if (isInside(x, y, moveJoystick.x, moveJoystick.y, moveJoystick.radius + 20)) {
                        mouseOnMove = true;
                        moveJoystick.active = true;
                        moveJoystick.dx = x - moveJoystick.x;
                        moveJoystick.dy = y - moveJoystick.y;
                        const maxDist = moveJoystick.radius * 0.6;
                        const d = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                        if (d > maxDist) { moveJoystick.dx = (moveJoystick.dx / d) * maxDist;
                            moveJoystick.dy = (moveJoystick.dy / d) * maxDist; }
                        game.input.moveX = moveJoystick.dx / maxDist;
                        game.input.moveY = moveJoystick.dy / maxDist;
                        const len = Math.hypot(game.input.moveX, game.input.moveY);
                        if (len > 1) { game.input.moveX /= len;
                            game.input.moveY /= len; }
                    } else if (isInside(x, y, dashButton.x, dashButton.y, dashButton.radius + 20)) {
                        game.input.dash = true;
                    }
                });
                canvas.addEventListener('mousemove', (e) => {
                    const { x, y } = getCanvasCoords(e);
                    if (mouseOnAim && aimJoystick.active) {
                        aimJoystick.dx = x - aimJoystick.x;
                        aimJoystick.dy = y - aimJoystick.y;
                        const maxDist = aimJoystick.radius * 0.6;
                        const d = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                        if (d > maxDist) { aimJoystick.dx = (aimJoystick.dx / d) * maxDist;
                            aimJoystick.dy = (aimJoystick.dy / d) * maxDist; }
                        game.input.aimAngle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                    }
                    if (mouseOnMove && moveJoystick.active) {
                        moveJoystick.dx = x - moveJoystick.x;
                        moveJoystick.dy = y - moveJoystick.y;
                        const maxDist = moveJoystick.radius * 0.6;
                        const d = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                        if (d > maxDist) { moveJoystick.dx = (moveJoystick.dx / d) * maxDist;
                            moveJoystick.dy = (moveJoystick.dy / d) * maxDist; }
                        game.input.moveX = moveJoystick.dx / maxDist;
                        game.input.moveY = moveJoystick.dy / maxDist;
                        const len = Math.hypot(game.input.moveX, game.input.moveY);
                        if (len > 1) { game.input.moveX /= len;
                            game.input.moveY /= len; }
                    }
                });
                canvas.addEventListener('mouseup', (e) => {
                    if (mouseOnAim && aimJoystick.active) {
                        game.input.shoot = true; // fire on release
                        aimJoystick.active = false;
                    }
                    mouseOnAim = false;
                    mouseOnMove = false;
                    if (moveJoystick.active) {
                        moveJoystick.active = false;
                        game.input.moveX = 0;
                        game.input.moveY = 0;
                    }
                    if (game.input.dash) game.input.dash = false;
                });
                canvas.addEventListener('mouseleave', () => {
                    if (mouseOnAim && aimJoystick.active) {
                        game.input.shoot = true;
                        aimJoystick.active = false;
                    }
                    mouseOnAim = false;
                    mouseOnMove = false;
                    if (moveJoystick.active) {
                        moveJoystick.active = false;
                        game.input.moveX = 0;
                        game.input.moveY = 0;
                    }
                    if (game.input.dash) game.input.dash = false;
                });

                // Keyboard
                const keys = { w: false, a: false, s: false, d: false, up: false, down: false, left: false, right: false };
                window.addEventListener('keydown', (e) => {
                    const key = e.key.toLowerCase();
                    if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'shift', 'j']
                        .includes(key)) e.preventDefault();
                    if (key === 'w' || e.key === 'ArrowUp') keys.up = true;
                    if (key === 's' || e.key === 'ArrowDown') keys.down = true;
                    if (key === 'a' || e.key === 'ArrowLeft') keys.left = true;
                    if (key === 'd' || e.key === 'ArrowRight') keys.right = true;
                    if (key === ' ' || e.key === 'Shift') game.input.dash = true;
                    if (key === 'j') game.input.shoot = true;
                    // Update movement from keys
                    let mx = 0,
                        my = 0;
                    if (keys.up || keys.w) my = -1;
                    if (keys.down || keys.s) my = 1;
                    if (keys.left || keys.a) mx = -1;
                    if (keys.right || keys.d) mx = 1;
                    const len = Math.hypot(mx, my);
                    if (len > 0) { mx /= len;
                        my /= len; }
                    if (!moveJoystick.active) {
                        game.input.moveX = mx;
                        game.input.moveY = my;
                    }
                });
                window.addEventListener('keyup', (e) => {
                    const key = e.key.toLowerCase();
                    if (key === 'w' || e.key === 'ArrowUp') keys.up = false;
                    if (key === 's' || e.key === 'ArrowDown') keys.down = false;
                    if (key === 'a' || e.key === 'ArrowLeft') keys.left = false;
                    if (key === 'd' || e.key === 'ArrowRight') keys.right = false;
                    if (key === ' ' || e.key === 'Shift') game.input.dash = false;
                    // Update movement from keys
                    let mx = 0,
                        my = 0;
                    if (keys.up || keys.w) my = -1;
                    if (keys.down || keys.s) my = 1;
                    if (keys.left || keys.a) mx = -1;
                    if (keys.right || keys.d) mx = 1;
                    const len = Math.hypot(mx, my);
                    if (len > 0) { mx /= len;
                        my /= len; }
                    if (!moveJoystick.active) {
                        game.input.moveX = mx;
                        game.input.moveY = my;
                    }
                });
            }

            startBossSpecial(boss) {
                if (this.specialAttackPhase !== 0) return;
                this.specialAttackPhase = 1;
                this.specialAttackTimer = 0;
                // Particles
                for (let i = 0; i < 30; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 5;
                    this.particles.push({
                        x: boss.x + (Math.random() - 0.5) * 30,
                        y: boss.y + (Math.random() - 0.5) * 30,
                        vx: Math.cos(a) * speed,
                        vy: Math.sin(a) * speed,
                        life: 1,
                        decay: 0.01 + Math.random() * 0.02,
                        size: 2 + Math.random() * 6,
                        maxSize: 8,
                        color: 'hsl(0, 100%, 60%)',
                    });
                }
                window.shakeAmount = 4;
                window.shakeTimer = 200;
            }

            updateSpecialAttack(dt) {
                if (this.specialAttackPhase === 1) {
                    this.specialAttackTimer += dt;
                    if (this.specialAttackTimer > 1000) {
                        this.specialAttackPhase = 2;
                        this.specialAttackTimer = 0;
                        this.targetCircle = {
                            x: this.player.x,
                            y: this.player.y,
                            radius: 40,
                            timer: 0,
                            duration: 2000,
                        };
                        for (let i = 0; i < 40; i++) {
                            const a = Math.random() * Math.PI * 2;
                            const speed = 1 + Math.random() * 3;
                            this.particles.push({
                                x: this.targetCircle.x + (Math.random() - 0.5) * 20,
                                y: this.targetCircle.y + (Math.random() - 0.5) * 20,
                                vx: Math.cos(a) * speed,
                                vy: Math.sin(a) * speed,
                                life: 1,
                                decay: 0.01 + Math.random() * 0.02,
                                size: 2 + Math.random() * 5,
                                maxSize: 7,
                                color: 'hsl(0, 100%, 70%)',
                            });
                        }
                        window.shakeAmount = 6;
                        window.shakeTimer = 150;
                    }
                } else if (this.specialAttackPhase === 2) {
                    this.targetCircle.timer += dt;
                    this.targetCircle.x += (this.player.x - this.targetCircle.x) * 0.05 * (dt / 16.67);
                    this.targetCircle.y += (this.player.y - this.targetCircle.y) * 0.05 * (dt / 16.67);
                    if (Math.random() < 0.3) {
                        const a = Math.random() * Math.PI * 2;
                        const speed = 1 + Math.random() * 2;
                        this.particles.push({
                            x: this.targetCircle.x + Math.cos(a) * this.targetCircle.radius,
                            y: this.targetCircle.y + Math.sin(a) * this.targetCircle.radius,
                            vx: Math.cos(a) * speed * 0.5,
                            vy: Math.sin(a) * speed * 0.5,
                            life: 1,
                            decay: 0.02 + Math.random() * 0.03,
                            size: 2 + Math.random() * 4,
                            maxSize: 5,
                            color: 'hsl(0, 100%, 60%)',
                        });
                    }
                    if (this.targetCircle.timer > this.targetCircle.duration) {
                        this.specialAttackPhase = 3;
                        this.specialAttackTimer = 0;
                        const count = 7;
                        const radius = 120;
                        for (let i = 0; i < count; i++) {
                            const angle = (i / count) * Math.PI * 2;
                            this.circleDrones.push({
                                x: this.targetCircle.x + Math.cos(angle) * radius,
                                y: this.targetCircle.y + Math.sin(angle) * radius,
                                radius: 12,
                                angle: angle,
                                orbitRadius: radius,
                                speed: 4.5,
                                life: 1,
                                targetX: this.targetCircle.x,
                                targetY: this.targetCircle.y,
                            });
                        }
                        for (let i = 0; i < 30; i++) {
                            const a = Math.random() * Math.PI * 2;
                            const speed = 2 + Math.random() * 4;
                            this.particles.push({
                                x: this.targetCircle.x + (Math.random() - 0.5) * 40,
                                y: this.targetCircle.y + (Math.random() - 0.5) * 40,
                                vx: Math.cos(a) * speed,
                                vy: Math.sin(a) * speed,
                                life: 1,
                                decay: 0.01 + Math.random() * 0.02,
                                size: 3 + Math.random() * 6,
                                maxSize: 8,
                                color: 'hsl(0, 100%, 70%)',
                            });
                        }
                        window.shakeAmount = 10;
                        window.shakeTimer = 200;
                        setTimeout(() => { this.targetCircle = null; }, 500);
                    }
                } else if (this.specialAttackPhase === 3) {
                    const speed = 4.5;
                    const rounds = 2;
                    const totalTime = (rounds * 2 * Math.PI) / speed;
                    this.specialAttackTimer += dt;
                    const progress = this.specialAttackTimer / totalTime;
                    for (const drone of this.circleDrones) {
                        drone.angle += speed * (dt / 16.67) * 0.001;
                        const cx = this.targetCircle ? this.targetCircle.x : drone.targetX;
                        const cy = this.targetCircle ? this.targetCircle.y : drone.targetY;
                        drone.targetX = cx;
                        drone.targetY = cy;
                        drone.x = cx + Math.cos(drone.angle) * drone.orbitRadius;
                        drone.y = cy + Math.sin(drone.angle) * drone.orbitRadius;
                        if (Math.random() < 0.3) {
                            this.particles.push({
                                x: drone.x + (Math.random() - 0.5) * 6,
                                y: drone.y + (Math.random() - 0.5) * 6,
                                vx: (Math.random() - 0.5) * 0.5,
                                vy: (Math.random() - 0.5) * 0.5,
                                life: 1,
                                decay: 0.02 + Math.random() * 0.03,
                                size: 2 + Math.random() * 3,
                                maxSize: 4,
                                color: 'hsl(0, 100%, 60%)',
                            });
                        }
                    }
                    if (this.specialAttackTimer > totalTime) {
                        this.circleDrones = [];
                        this.specialAttackPhase = 0;
                        this.targetCircle = null;
                        if (this.boss) this.boss.specialCooldown = 0;
                    }
                }
            }

            update(dt) {
                const dtFactor = dt / 16.67;

                // ---- Process input ----
                // Dash
                if (this.input.dash) {
                    if (this.player.dash()) {
                        // dash particles handled in player? we can spawn here
                        this.spawnDashParticles(this.player.x, this.player.y, this.player.facing);
                        window.shakeAmount = 8;
                        window.shakeTimer = 150;
                    }
                    this.input.dash = false;
                }

                // Shoot
                if (this.input.shoot) {
                    this.weapon.fire(this.player, this.bullets, this.beams, this.particles);
                    this.input.shoot = false;
                }

                // ---- Update player ----
                this.player.update(dt, this.input);

                // ---- Update weapon ----
                this.weapon.update(dt);

                // ---- Update enemies ----
                for (let i = this.enemies.length - 1; i >= 0; i--) {
                    const e = this.enemies[i];
                    e.update(dt, this.player, this.bullets, this.enemies);
                    // Check if missile exploded
                    if (e.type === 'missile' && !e.alive) {
                        // Explosion handled via onDeath
                    }
                    // Remove dead enemies
                    if (!e.alive) {
                        this.enemies.splice(i, 1);
                    }
                }

                // ---- Update enemy projectiles ----
                for (let i = this.enemyProjectiles.length - 1; i >= 0; i--) {
                    const p = this.enemyProjectiles[i];
                    p.x += p.vx * dtFactor;
                    p.y += p.vy * dtFactor;
                    if (p.x < -20 || p.x > this.W + 20 || p.y < -20 || p.y > this.H + 20) {
                        this.enemyProjectiles.splice(i, 1);
                        continue;
                    }
                    // Hit player
                    if (MathUtils.dist(p.x, p.y, this.player.x, this.player.y) < this.player.radius + p.radius) {
                        this.player.takeDamage(p.damage || 1);
                        this.enemyProjectiles.splice(i, 1);
                        // particles
                        for (let j = 0; j < 8; j++) {
                            const a = Math.random() * Math.PI * 2;
                            const speed = 1 + Math.random() * 3;
                            this.particles.push({
                                x: p.x,
                                y: p.y,
                                vx: Math.cos(a) * speed,
                                vy: Math.sin(a) * speed,
                                life: 1,
                                decay: 0.02 + Math.random() * 0.03,
                                size: 2 + Math.random() * 4,
                                maxSize: 5,
                                color: 'hsl(0, 80%, 60%)',
                            });
                        }
                        continue;
                    }
                }

                // ---- Update bullets vs enemies (piercing) ----
                for (let i = this.bullets.length - 1; i >= 0; i--) {
                    const b = this.bullets[i];
                    b.x += b.vx * dtFactor;
                    b.y += b.vy * dtFactor;
                    b.age += dt;
                    const traveled = MathUtils.dist(b.originX, b.originY, b.x, b.y);
                    b.life = 1 - Math.min(traveled / this.weapon.maxRange, 1);
                    b.damage = this.weapon.damageBase * b.life;
                    if (traveled > this.weapon.maxRange || b.x < -50 || b.x > this.W + 50 || b.y < -50 || b.y > this.H +
                        50) {
                        this.bullets.splice(i, 1);
                        continue;
                    }
                    // Check collision with enemies
                    let used = false;
                    for (const e of this.enemies) {
                        if (!e.alive) continue;
                        if (MathUtils.dist(b.x, b.y, e.x, e.y) < e.radius + 4) {
                            const dmg = b.damage;
                            const killed = e.takeDamage(dmg);
                            // Life steal
                            const heal = dmg * this.player.lifeSteal;
                            this.player.heal(heal);
                            // particles
                            for (let k = 0; k < 4; k++) {
                                const a = Math.random() * Math.PI * 2;
                                const speed = 1 + Math.random() * 2;
                                this.particles.push({
                                    x: b.x,
                                    y: b.y,
                                    vx: Math.cos(a) * speed,
                                    vy: Math.sin(a) * speed,
                                    life: 1,
                                    decay: 0.03 + Math.random() * 0.04,
                                    size: 2 + Math.random() * 3,
                                    maxSize: 4,
                                    color: 'hsl(0, 80%, 70%)',
                                });
                            }
                            if (killed) {
                                this.killCount++;
                                this.killCountDisplay.textContent = this.killCount;
                                // Spawn boss if not yet
                                if (!this.bossSpawned && this.killCount >= CONFIG.BOSS.killsToSpawn) {
                                    this.boss = new Boss(this.W / 2, this.H / 2);
                                    this.bossSpawned = true;
                                    window.sniperFlash = 1.0;
                                    window.sniperFlashTimer = 400;
                                    this.spawnExplosion(this.boss.x, this.boss.y, true);
                                }
                                // Remove enemy (already removed in takeDamage)
                            }
                            if (!b.piercing) {
                                used = true;
                                break;
                            }
                        }
                    }
                    if (used) {
                        this.bullets.splice(i, 1);
                    }
                }

                // ---- Update beams ----
                for (let i = this.beams.length - 1; i >= 0; i--) {
                    const beam = this.beams[i];
                    beam.age += dt;
                    if (beam.bulletRef && beam.active) {
                        let found = false;
                        for (const b of this.bullets) {
                            if (b === beam.bulletRef) {
                                found = true;
                                beam.endX = b.x;
                                beam.endY = b.y;
                                beam.life = 1.0;
                                break;
                            }
                        }
                        if (!found) {
                            beam.bulletRef = null;
                            beam.active = false;
                        }
                    } else {
                        beam.life -= 0.015 * dtFactor;
                        if (beam.life <= 0) {
                            this.beams.splice(i, 1);
                            continue;
                        }
                    }
                    beam.startX += (this.player.x - beam.startX) * 0.1 * dtFactor;
                    beam.startY += (this.player.y - beam.startY) * 0.1 * dtFactor;
                }

                // ---- Update boss ----
                if (this.boss && this.boss.alive) {
                    this.boss.update(dt, this.player, this.enemies, this.bullets, this.enemyFactory, this);
                    if (!this.boss.alive) {
                        // boss death
                        this.spawnExplosion(this.boss.x, this.boss.y, true);
                        window.shakeAmount = 20;
                        window.shakeTimer = 400;
                        this.boss = null;
                        this.bossSpawned = false;
                    }
                }

                // ---- Update special attack (boss) ----
                this.updateSpecialAttack(dt);

                // ---- Spawn normal enemies if needed ----
                const maxEnemies = this.bossSpawned ? 2 : 4;
                const normalEnemies = this.enemies.filter(e => !e.isBound);
                while (normalEnemies.length < maxEnemies) {
                    const newEnemy = this.enemyFactory.spawnRandom();
                    this.enemies.push(newEnemy);
                }

                // ---- Update particles ----
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.x += p.vx * dtFactor;
                    p.y += p.vy * dtFactor;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.life -= p.decay * dtFactor;
                    p.size = p.maxSize * p.life;
                    if (p.life <= 0 || p.size < 0.1) this.particles.splice(i, 1);
                }

                // ---- Screen shake ----
                if (window.shakeTimer > 0) {
                    window.shakeTimer -= dt;
                    if (window.shakeTimer < 0) window.shakeTimer = 0;
                    window.shakeAmount *= 0.96;
                    if (window.shakeAmount < 0.1) window.shakeAmount = 0;
                }
                if (window.sniperFlashTimer > 0) {
                    window.sniperFlashTimer -= dt;
                    window.sniperFlash = window.sniperFlashTimer / 200;
                    if (window.sniperFlashTimer <= 0) window.sniperFlash = 0;
                }

                // ---- Update UI ----
                const speed = Math.hypot(this.player.vx, this.player.vy);
                this.speedDisplay.textContent = Math.round(speed * 10) / 10;
                this.enemyCount.textContent = this.enemies.length + (this.boss && this.boss.alive ? 1 : 0);
                if (this.player.isDashing) this.dashDot.className = 'dot dashing';
                else if (this.player.cooldownTimer > 0) this.dashDot.className = 'dot cooldown';
                else this.dashDot.className = 'dot ready';
                this.healthDisplay.textContent = `${Math.round(this.player.health * 10) / 10}/${this.player.maxHealth}`;
                this.healthBar.style.width = `${(this.player.health / this.player.maxHealth) * 100}%`;
            }

            // ---- Particle spawners ----
            spawnDashParticles(x, y, angle) {
                for (let i = 0; i < 35; i++) {
                    const speed = 2 + Math.random() * 6;
                    const a = angle + (Math.random() - 0.5) * 1.4;
                    const size = 2 + Math.random() * 6;
                    this.particles.push({
                        x: x + (Math.random() - 0.5) * 12,
                        y: y + (Math.random() - 0.5) * 12,
                        vx: Math.cos(a) * speed * (0.6 + Math.random() * 0.6),
                        vy: Math.sin(a) * speed * (0.6 + Math.random() * 0.6),
                        life: 1,
                        decay: 0.008 + Math.random() * 0.015,
                        size: size,
                        maxSize: size,
                        color: `hsl(${190 + Math.random() * 30}, 100%, ${65 + Math.random() * 30}%)`,
                    });
                }
            }

            spawnExplosion(x, y, big) {
                const count = big ? 80 : 50;
                for (let i = 0; i < count; i++) {
                    const speed = (2 + Math.random() * 8) * (big ? 1.5 : 1);
                    const a = Math.random() * Math.PI * 2;
                    const size = (3 + Math.random() * 9) * (big ? 1.5 : 1);
                    this.particles.push({
                        x: x + (Math.random() - 0.5) * 14,
                        y: y + (Math.random() - 0.5) * 14,
                        vx: Math.cos(a) * speed * (0.5 + Math.random() * 0.6),
                        vy: Math.sin(a) * speed * (0.5 + Math.random() * 0.6),
                        life: 1,
                        decay: 0.004 + Math.random() * 0.01,
                        size: size,
                        maxSize: size,
                        color: `hsl(${25 + Math.random() * 35}, 100%, ${45 + Math.random() * 35}%)`,
                    });
                }
                for (let i = 0; i < (big ? 40 : 25); i++) {
                    const speed = 1 + Math.random() * 4;
                    const a = Math.random() * Math.PI * 2;
                    const size = 2 + Math.random() * 6;
                    this.particles.push({
                        x: x + (Math.random() - 0.5) * 10,
                        y: y + (Math.random() - 0.5) * 10,
                        vx: Math.cos(a) * speed * 0.4,
                        vy: Math.sin(a) * speed * 0.4 - 1.5,
                        life: 1,
                        decay: 0.006 + Math.random() * 0.015,
                        size: size,
                        maxSize: size,
                        color: `hsl(0, 0%, ${20 + Math.random() * 30}%)`,
                    });
                }
                window.shakeAmount = big ? 16 : 10;
                window.shakeTimer = big ? 300 : 200;
            }

            // ---- Render ----
            render() {
                const ctx = this.ctx;
                ctx.save();

                // Screen shake
                let shakeX = 0,
                    shakeY = 0;
                if (window.shakeTimer > 0 && window.shakeAmount > 0.1) {
                    shakeX = (Math.random() - 0.5) * window.shakeAmount * 1.8;
                    shakeY = (Math.random() - 0.5) * window.shakeAmount * 1.8;
                    ctx.translate(shakeX, shakeY);
                }

                // Background
                const grad = ctx.createRadialGradient(this.W / 2, this.H / 2, 100, this.W / 2, this.H / 2, 550);
                grad.addColorStop(0, '#132033');
                grad.addColorStop(0.5, '#0d1825');
                grad.addColorStop(1, '#070d14');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, this.W, this.H);

                // Grid
                ctx.strokeStyle = 'rgba(30, 60, 90, 0.15)';
                ctx.lineWidth = 1;
                for (let x = 0; x <= this.W; x += 50) { ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, this.H);
                    ctx.stroke(); }
                for (let y = 0; y <= this.H; y += 50) { ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(this.W, y);
                    ctx.stroke(); }

                // Player trail
                for (const t of this.player.trail) {
                    const alpha = t.life * 0.25;
                    const size = this.player.radius * 0.5 * t.life;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = `hsl(200, 90%, ${60 + 30 * t.life}%)`;
                    ctx.shadowColor = `rgba(0, 180, 255, ${alpha * 0.3})`;
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // Beams
                for (const beam of this.beams) {
                    if (beam.life < 0.01) continue;
                    const alpha = beam.life * 0.85;
                    ctx.save();
                    ctx.globalAlpha = alpha;
                    ctx.shadowColor = 'rgba(50, 150, 255, 0.9)';
                    ctx.shadowBlur = 45;
                    ctx.strokeStyle = `rgba(70, 180, 255, ${alpha * 0.7})`;
                    ctx.lineWidth = 6 * beam.life + 2;
                    ctx.beginPath();
                    ctx.moveTo(beam.startX, beam.startY);
                    ctx.lineTo(beam.endX, beam.endY);
                    ctx.stroke();
                    ctx.shadowBlur = 60;
                    ctx.strokeStyle = `rgba(180, 230, 255, ${alpha * 0.9})`;
                    ctx.lineWidth = 3 * beam.life + 1;
                    ctx.beginPath();
                    ctx.moveTo(beam.startX, beam.startY);
                    ctx.lineTo(beam.endX, beam.endY);
                    ctx.stroke();
                    ctx.shadowBlur = 40;
                    for (let t = 0.1; t < 1; t += 0.1) {
                        const bx = beam.startX + (beam.endX - beam.startX) * t;
                        const by = beam.startY + (beam.endY - beam.startY) * t;
                        ctx.fillStyle = `rgba(150, 220, 255, ${alpha * 0.3 * (1 - t)})`;
                        ctx.beginPath();
                        ctx.arc(bx, by, 3 * beam.life * (1 - t) + 1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    ctx.restore();
                }
                ctx.shadowBlur = 0;

                // Bullets
                for (const b of this.bullets) {
                    const alpha = b.life * 0.8;
                    ctx.globalAlpha = alpha;
                    ctx.fillStyle = `hsl(210, 100%, 65%)`;
                    ctx.shadowColor = `rgba(100, 200, 255, ${alpha * 0.7})`;
                    ctx.shadowBlur = 50;
                    const size = 7 + 5 * b.life;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 70;
                    ctx.fillStyle = `rgba(150, 220, 255, ${alpha * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, size * 3.5, 0, Math.PI * 2);
                    ctx.fill();
                    // lightning particles
                    for (let j = 0; j < 2; j++) {
                        const off = (Math.random() - 0.5) * 0.5;
                        const px = b.x - Math.cos(Math.atan2(b.vy, b.vx) + off) * 8;
                        const py = b.y - Math.sin(Math.atan2(b.vy, b.vx) + off) * 8;
                        this.particles.push({
                            x: px,
                            y: py,
                            vx: (Math.random() - 0.5) * 0.3,
                            vy: (Math.random() - 0.5) * 0.3,
                            life: 0.6 + Math.random() * 0.3,
                            decay: 0.02 + Math.random() * 0.03,
                            size: 1 + Math.random() * 3,
                            maxSize: 4,
                            color: 'hsl(210, 100%, 70%)',
                        });
                    }
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // Enemy projectiles
                for (const p of this.enemyProjectiles) {
                    ctx.fillStyle = '#ff5252';
                    ctx.shadowColor = 'rgba(255, 80, 80, 0.6)';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255, 200, 200, 0.3)';
                    ctx.shadowBlur = 30;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;

                // Enemies
                for (const e of this.enemies) {
                    e.render(ctx);
                }

                // Circle drones (special)
                for (const d of this.circleDrones) {
                    ctx.save();
                    ctx.translate(d.x, d.y);
                    const size = d.radius;
                    ctx.shadowColor = 'rgba(255, 0, 0, 0.8)';
                    ctx.shadowBlur = 20;
                    ctx.fillStyle = '#1a0000';
                    ctx.beginPath();
                    ctx.moveTo(size, 0);
                    ctx.lineTo(-size * 0.4, -size * 0.5);
                    ctx.lineTo(-size * 0.2, 0);
                    ctx.lineTo(-size * 0.4, size * 0.5);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 25;
                    ctx.strokeStyle = '#ff1744';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.restore();
                }

                // Target circle
                if (this.targetCircle) {
                    ctx.save();
                    ctx.shadowColor = 'rgba(255, 0, 0, 0.5)';
                    ctx.shadowBlur = 30;
                    ctx.strokeStyle = 'rgba(255, 0, 0, 0.6)';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([8, 8]);
                    ctx.beginPath();
                    ctx.arc(this.targetCircle.x, this.targetCircle.y, this.targetCircle.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.shadowBlur = 50;
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
                    ctx.beginPath();
                    ctx.arc(this.targetCircle.x, this.targetCircle.y, this.targetCircle.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }

                // Boss
                if (this.boss && this.boss.alive) {
                    this.boss.render(ctx);
                }

                // Particles
                for (const p of this.particles) {
                    ctx.globalAlpha = p.life * 0.9;
                    ctx.fillStyle = p.color || '#66d0ff';
                    ctx.shadowColor = `rgba(100, 200, 255, ${p.life * 0.3})`;
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, Math.max(p.size, 0.5), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;

                // Sniper flash
                if (window.sniperFlash && window.sniperFlash > 0.01) {
                    const alpha = window.sniperFlash * 0.8;
                    const gradFlash = ctx.createRadialGradient(this.player.x, this.player.y, 20, this.player.x, this.player.y,
                        500);
                    gradFlash.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
                    gradFlash.addColorStop(0.3, `rgba(255, 255, 255, ${alpha * 0.5})`);
                    gradFlash.addColorStop(1, `rgba(255, 255, 255, 0)`);
                    ctx.fillStyle = gradFlash;
                    ctx.fillRect(0, 0, this.W, this.H);
                    const coreGrad = ctx.createRadialGradient(this.player.x, this.player.y, 5, this.player.x, this.player.y,
                        150);
                    coreGrad.addColorStop(0, `rgba(255, 255, 255, ${alpha * 0.6})`);
                    coreGrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                    ctx.fillStyle = coreGrad;
                    ctx.beginPath();
                    ctx.arc(this.player.x, this.player.y, 150, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Player
                this.player.render(ctx);

                // Aim spread fan (for sniper it's narrow but we still show)
                if (this.input.aimAngle !== undefined && this.weapon) {
                    const angle = this.input.aimAngle;
                    const spread = this.weapon.spread;
                    const range = 120;
                    ctx.save();
                    ctx.globalAlpha = 0.25;
                    ctx.fillStyle = 'rgba(255, 200, 100, 0.2)';
                    ctx.shadowColor = 'rgba(255, 200, 100, 0.3)';
                    ctx.shadowBlur = 20;
                    ctx.beginPath();
                    ctx.moveTo(this.player.x + Math.cos(angle) * 20, this.player.y + Math.sin(angle) * 20);
                    ctx.arc(this.player.x + Math.cos(angle) * 20, this.player.y + Math.sin(angle) * 20, range, angle - spread /
                        2, angle + spread / 2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255, 200, 100, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                    ctx.restore();
                }

                // Joysticks and buttons (draw)
                this.drawJoystick({ x: 140, y: 480, radius: 64, active: aimJoystick.active, dx: aimJoystick.dx || 0,
                    dy: aimJoystick.dy || 0 }, 'AIM');
                this.drawJoystick({ x: 760, y: 480, radius: 64, active: moveJoystick.active, dx: moveJoystick.dx || 0,
                    dy: moveJoystick.dy || 0 }, 'MOVE');
                this.drawDashButton();

                ctx.restore();

                // HUD: Dash bar
                const barW = 160,
                    barH = 6;
                const barX = this.W / 2 - barW / 2,
                    barY = this.H - 28;
                ctx.fillStyle = 'rgba(10, 20, 35, 0.5)';
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW, barH, 4);
                ctx.fill();
                let fillW = 0,
                    fillColor = '#00e676';
                if (this.player.isDashing) { fillW = barW * (this.player.dashTimer / this.player.dashDuration);
                    fillColor = '#00e5ff'; } else if (this.player.cooldownTimer > 0) { fillW = barW * (1 - this.player
                        .cooldownTimer / this.player.dashCooldown);
                    fillColor = '#ff5252'; } else { fillW = barW;
                    fillColor = '#00e676'; }
                ctx.fillStyle = fillColor;
                ctx.beginPath();
                if (fillW > 0) ctx.rect(barX, barY, fillW, barH);
                ctx.fill();
                ctx.fillStyle = 'rgba(120, 180, 210, 0.4)';
                ctx.font = '9px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('DASH', this.W / 2, barY - 6);

                // Speed ring
                const speed = Math.hypot(this.player.vx, this.player.vy);
                const speedRatio = Math.min(speed / (this.player.speed * 1.8), 1);
                if (speedRatio > 0.05) {
                    ctx.save();
                    ctx.globalAlpha = 0.15 + speedRatio * 0.25;
                    ctx.strokeStyle = `hsl(${200 - speedRatio * 40}, 100%, ${60 + speedRatio * 30}%)`;
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([3, 5]);
                    const ringR = this.player.radius + 8 + speedRatio * 8;
                    ctx.beginPath();
                    ctx.arc(this.player.x, this.player.y, ringR, 0, Math.PI * 2 * speedRatio);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    ctx.restore();
                }

                // Boss health bar
                if (this.boss && this.boss.alive) {
                    ctx.save();
                    const bw = 200,
                        bh = 10;
                    const bx = this.W / 2 - bw / 2,
                        by = 20;
                    ctx.fillStyle = 'rgba(0,0,0,0.6)';
                    ctx.roundRect(bx, by, bw, bh, 4);
                    ctx.fill();
                    const healthPercent = this.boss.health / this.boss.maxHealth;
                    ctx.fillStyle = healthPercent > 0.3 ? '#ffd700' : '#ff5252';
                    ctx.roundRect(bx, by, bw * healthPercent, bh, 4);
                    ctx.fill();
                    ctx.fillStyle = '#ffd700';
                    ctx.font = '10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('BOSS: DRONE RHAPSODY', this.W / 2, by - 6);
                    ctx.restore();
                }
            }

            // --- UI helpers ---
            drawJoystick(j, label) {
                const ctx = this.ctx;
                const cx = j.x,
                    cy = j.y;
                ctx.save();
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 15;
                ctx.fillStyle = 'rgba(20, 35, 50, 0.6)';
                ctx.strokeStyle = 'rgba(80, 140, 180, 0.25)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(cx, cy, j.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                let knobX = cx,
                    knobY = cy;
                if (j.active) {
                    const maxDist = j.radius * 0.6;
                    const dist = Math.min(Math.hypot(j.dx, j.dy), maxDist);
                    const angle = Math.atan2(j.dy, j.dx);
                    knobX = cx + Math.cos(angle) * dist;
                    knobY = cy + Math.sin(angle) * dist;
                }
                const gradKnob = ctx.createRadialGradient(knobX - 4, knobY - 4, 4, knobX, knobY, 26);
                gradKnob.addColorStop(0, '#8ac4e0');
                gradKnob.addColorStop(0.6, '#4a8aaa');
                gradKnob.addColorStop(1, '#1a3a4a');
                ctx.shadowColor = 'rgba(0, 180, 255, 0.2)';
                ctx.shadowBlur = 12;
                ctx.fillStyle = gradKnob;
                ctx.beginPath();
                ctx.arc(knobX, knobY, 26, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(180, 220, 255, 0.2)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(120, 180, 210, 0.4)';
                ctx.font = '9px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(label, cx, cy + j.radius + 22);
                ctx.restore();
            }

            drawDashButton() {
                const ctx = this.ctx;
                const dx = 70,
                    dy = 70;
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.3)';
                ctx.shadowBlur = 15;
                ctx.fillStyle = 'rgba(40, 60, 80, 0.7)';
                ctx.strokeStyle = 'rgba(0, 200, 255, 0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(dx, dy, 40, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#4dd0e1';
                ctx.font = 'bold 18px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⚡', dx, dy);
                ctx.restore();
            }

            // ---- Game Loop ----
            loop(time) {
                const dt = Math.min(time - (this._lastTime || time), 30);
                this._lastTime = time;
                this.update(dt);
                this.render();
                requestAnimationFrame(this.loop);
            }
        }

        // ============================================================
        //  START THE GAME
        // ============================================================
        const canvas = document.getElementById('game');
        const game = new Game(canvas);

        // RoundRect polyfill
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        console.log('🎯 Drone Hunter - Modular Sniper Edition');
        console.log('🔫 Sniper: piercing + blue beam + lightning tail');
        console.log('❤️ 50% life steal on damage');
        console.log('👑 Boss: Drone Rhapsody after 15 kills');
        console.log('🕹️  Use joysticks to move/aim, tap dash button.');
    </script>
</body>
