<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Drone Hunter - Sniper Edition</title>
    <style>
        /* --- Styles (unchanged) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-wrapper {
            background: #111927;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 180, 255, 0.05);
            border: 1px solid rgba(0, 180, 255, 0.08);
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 12px;
            background: #0d1520;
            width: 100%;
            height: auto;
            aspect-ratio: 900 / 600;
            touch-action: none;
            cursor: none;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 8px;
            color: #6a8ba0;
            font-size: 13px;
            letter-spacing: 0.3px;
            flex-wrap: wrap;
            gap: 6px;
        }

        .hud .status {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .hud .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hud .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: background 0.2s;
        }

        .dot.ready {
            background: #00e676;
            box-shadow: 0 0 16px rgba(0, 230, 118, 0.5);
        }
        .dot.cooldown {
            background: #ff5252;
            box-shadow: 0 0 16px rgba(255, 82, 82, 0.4);
        }
        .dot.dashing {
            background: #00e5ff;
            box-shadow: 0 0 24px rgba(0, 229, 255, 0.7);
        }

        .hud .info {
            color: #4a7a8a;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .hud .info span {
            color: #8ac4e0;
            font-weight: 600;
            min-width: 36px;
        }

        .health-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            margin-top: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .health-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #00e676, #4dd0e1);
            border-radius: 8px;
            transition: width 0.2s;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 8px;
                border-radius: 12px;
            }
            .hud {
                font-size: 11px;
                flex-direction: column;
                align-items: stretch;
            }
            .hud .status {
                flex-wrap: wrap;
                justify-content: center;
            }
            .hud .info {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="gameWrapper">
        <canvas id="game" width="900" height="600"></canvas>
        <div class="hud">
            <div class="status">
                <div class="indicator">
                    <span style="color:#4a7a8a;">DASH</span>
                    <span class="dot ready" id="dashDot"></span>
                </div>
                <div class="indicator">
                    <span style="color:#4a7a8a;">SPEED</span>
                    <span id="speedDisplay" style="color:#8ac4e0; font-weight:600; min-width:40px;">0</span>
                </div>
                <div class="indicator">
                    <span style="color:#4a7a8a;">ENEMIES</span>
                    <span id="enemyCount" style="color:#ff8a65; font-weight:600;">0</span>
                </div>
                <div class="indicator">
                    <span style="color:#4a7a8a;">KILLS</span>
                    <span id="killCount" style="color:#ffd54f; font-weight:600;">0</span>
                </div>
            </div>
            <div class="info">
                <span style="color:#4a7a8a;">🔫</span>
                <span id="ammoStatus" style="color:#8ac4e0;">READY</span>
                <span style="color:#4a7a8a; margin-left:10px;">WEAPON:</span>
                <span id="weaponLabel" style="color:#8ac4e0; font-weight:600;">SNIPER</span>
                <span style="color:#4a7a8a; margin-left:10px;">HP:</span>
                <span id="healthDisplay" style="color:#ff8a65; font-weight:600;">10/10</span>
            </div>
        </div>
        <div class="health-bar-container">
            <div class="health-bar" id="healthBar" style="width:100%;"></div>
        </div>
    </div>

    <script>
        // ============================================================
        //  MODULE: UTILITY
        // ============================================================
        class MathUtils {
            static clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
            static dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
            static lerp(a, b, t) { return a + (b - a) * t; }
        }

        // ============================================================
        //  MODULE: CONFIG
        // ============================================================
        const CONFIG = {
            W: 900,
            H: 600,
            SNIPER: {
                cooldown: 500,
                pelletCount: 1,
                spread: 0.02,
                pelletSpeed: 20,
                maxRange: 800,
                damageBase: 10,
                shake: 14,
                flashCount: 40,
                piercing: true,
            },
            PLAYER: {
                radius: 14,
                speed: 3.5,
                friction: 0.92,
                accel: 0.6,
                dashDuration: 280,
                dashCooldown: 1200,
                dashSpeedBoost: 9.0,
                maxHealth: 10,
                lifeSteal: 0.5,
            },
            BOSS: {
                radius: 40,
                health: 50,
                speed: 1.2,
                summonInterval: 6000,
                specialInterval: 18000,
                killsToSpawn: 15,
            },
            ENEMIES: {
                drone: { radius: 16, speed: 0.8, health: 5, color: '#ff1744', glow: 'rgba(255,23,68,0.8)', shootInterval: 3000,
                    preferredDistance: 250 },
                missile: { radius: 16, speed: 3.2, health: 3, color: '#ff9100', glow: 'rgba(255,145,0,0.8)',
                    shootInterval: 0, explosionRadius: 60 },
            }
        };

        // ============================================================
        //  MODULE: ENTITY (Base)
        // ============================================================
        class Entity {
            constructor(x, y, config) {
                this.x = x;
                this.y = y;
                this.radius = config.radius || 16;
                this.vx = 0;
                this.vy = 0;
                this.alive = true;
            }
            update(dt) { /* override */ }
            render(ctx) { /* override */ }
        }

        // ============================================================
        //  MODULE: PLAYER
        // ============================================================
        class Player extends Entity {
            constructor(x, y) {
                super(x, y, { radius: CONFIG.PLAYER.radius });
                this.speed = CONFIG.PLAYER.speed;
                this.friction = CONFIG.PLAYER.friction;
                this.accel = CONFIG.PLAYER.accel;
                this.facing = 0;
                this.isDashing = false;
                this.dashTimer = 0;
                this.dashDuration = CONFIG.PLAYER.dashDuration;
                this.dashCooldown = CONFIG.PLAYER.dashCooldown;
                this.cooldownTimer = 0;
                this.dashMultiplier = 1;
                this.dashSpeedBoost = CONFIG.PLAYER.dashSpeedBoost;
                this.health = CONFIG.PLAYER.maxHealth;
                this.maxHealth = CONFIG.PLAYER.maxHealth;
                this.lifeSteal = CONFIG.PLAYER.lifeSteal;
                this.trail = [];
                this.maxTrail = 30;
                this.flashTimer = 0;
            }

            update(dt, input) {
                const dtFactor = dt / 16.67;

                // Movement from joystick or keyboard
                let mx = input.moveX || 0,
                    my = input.moveY || 0;
                const len = Math.hypot(mx, my);
                if (len > 1) { mx /= len;
                    my /= len; }

                // Facing
                if (mx !== 0 || my !== 0) this.facing = Math.atan2(my, mx);
                else if (input.aimAngle !== undefined) this.facing = input.aimAngle;

                // Physics
                const targetVx = mx * this.speed;
                const targetVy = my * this.speed;
                if (mx !== 0 || my !== 0) {
                    this.vx += (targetVx - this.vx) * 0.18 * dtFactor;
                    this.vy += (targetVy - this.vy) * 0.18 * dtFactor;
                } else {
                    this.vx *= Math.pow(this.friction, dtFactor * 0.6);
                    this.vy *= Math.pow(this.friction, dtFactor * 0.6);
                    if (Math.abs(this.vx) < 0.05) this.vx = 0;
                    if (Math.abs(this.vy) < 0.05) this.vy = 0;
                }

                // Dash
                if (this.isDashing) {
                    this.dashTimer -= dt;
                    if (this.dashTimer <= 0) {
                        this.isDashing = false;
                        this.dashMultiplier = 1;
                        this.dashTimer = 0;
                        this.cooldownTimer = this.dashCooldown;
                    } else {
                        const dashSpeed = this.speed * this.dashMultiplier;
                        const steer = 0.08;
                        const targetDashX = Math.cos(this.facing) * dashSpeed;
                        const targetDashY = Math.sin(this.facing) * dashSpeed;
                        this.vx += (targetDashX - this.vx) * steer * dtFactor;
                        this.vy += (targetDashY - this.vy) * steer * dtFactor;
                    }
                }

                if (this.cooldownTimer > 0) {
                    this.cooldownTimer -= dt;
                    if (this.cooldownTimer < 0) this.cooldownTimer = 0;
                }

                // Apply velocity & bounds
                this.x += this.vx * dtFactor;
                this.y += this.vy * dtFactor;
                const margin = this.radius + 4;
                if (this.isDashing) {
                    // Wall bounce
                    let bounced = false;
                    if (this.x - this.radius < 0) { this.x = this.radius;
                        this.vx = -this.vx * 0.8;
                        bounced = true; } else if (this.x + this.radius > CONFIG.W) { this.x = CONFIG.W - this.radius;
                        this.vx = -this.vx * 0.8;
                        bounced = true; }
                    if (this.y - this.radius < 0) { this.y = this.radius;
                        this.vy = -this.vy * 0.8;
                        bounced = true; } else if (this.y + this.radius > CONFIG.H) { this.y = CONFIG.H - this.radius;
                        this.vy = -this.vy * 0.8;
                        bounced = true; }
                    if (bounced) {
                        // spawn particles (handled externally)
                    }
                } else {
                    this.x = MathUtils.clamp(this.x, margin, CONFIG.W - margin);
                    this.y = MathUtils.clamp(this.y, margin, CONFIG.H - margin);
                }

                // Trail
                if (this.isDashing || Math.abs(this.vx) > 0.4 || Math.abs(this.vy) > 0.4) {
                    this.trail.push({ x: this.x, y: this.y, life: 1 });
                    if (this.trail.length > this.maxTrail) this.trail.shift();
                }
                for (let i = this.trail.length - 1; i >= 0; i--) {
                    this.trail[i].life -= 0.02 * dtFactor;
                    if (this.trail[i].life <= 0) this.trail.splice(i, 1);
                }
                if (this.flashTimer > 0) this.flashTimer -= dt;
            }

            takeDamage(dmg) {
                this.health -= dmg;
                this.flashTimer = 200;
                if (this.health < 0) this.health = 0;
            }

            heal(amount) {
                this.health = Math.min(this.maxHealth, this.health + amount);
            }

            dash() {
                if (this.isDashing || this.cooldownTimer > 0) return false;
                this.isDashing = true;
                this.dashTimer = this.dashDuration;
                this.dashMultiplier = this.dashSpeedBoost;
                return true;
            }

            render(ctx) {
                const px = this.x,
                    py = this.y,
                    r = this.radius;
                // Glow
                const glowGrd = ctx.createRadialGradient(px, py, 5, px, py, r * 2.5);
                const glowColor = this.isDashing ? 'rgba(0, 220, 255, 0.3)' : 'rgba(0, 160, 255, 0.12)';
                glowGrd.addColorStop(0, glowColor);
                glowGrd.addColorStop(1, 'rgba(0, 160, 255, 0)');
                ctx.fillStyle = glowGrd;
                ctx.beginPath();
                ctx.arc(px, py, r * 2.5, 0, Math.PI * 2);
                ctx.fill();

                if (this.isDashing) {
                    ctx.strokeStyle = 'rgba(0, 230, 255, 0.2)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 8]);
                    const ringR = r * 1.7 + Math.sin(Date.now() / 70) * 4;
                    ctx.beginPath();
                    ctx.arc(px, py, ringR, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                if (this.isDashing) {
                    const angle = this.facing;
                    const tipDist = r * 1.4;
                    const baseDist = r * 0.8;
                    const baseHalf = r * 0.9;
                    const tipX = px + Math.cos(angle) * tipDist;
                    const tipY = py + Math.sin(angle) * tipDist;
                    const baseX = px - Math.cos(angle) * baseDist;
                    const baseY = py - Math.sin(angle) * baseDist;
                    const perpAngle = angle + Math.PI / 2;
                    const b1x = baseX + Math.cos(perpAngle) * baseHalf;
                    const b1y = baseY + Math.sin(perpAngle) * baseHalf;
                    const b2x = baseX - Math.cos(perpAngle) * baseHalf;
                    const b2y = baseY - Math.sin(perpAngle) * baseHalf;
                    ctx.shadowColor = 'rgba(0, 220, 255, 0.7)';
                    ctx.shadowBlur = 40;
                    const gradTri = ctx.createLinearGradient(tipX, tipY, b1x, b1y);
                    gradTri.addColorStop(0, '#00e5ff');
                    gradTri.addColorStop(0.5, '#0091ea');
                    gradTri.addColorStop(1, '#0055b3');
                    ctx.fillStyle = gradTri;
                    ctx.beginPath();
                    ctx.moveTo(tipX, tipY);
                    ctx.lineTo(b1x, b1y);
                    ctx.lineTo(b2x, b2y);
                    ctx.closePath();
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(0, 230, 255, 0.8)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(tipX, tipY);
                    ctx.lineTo(b1x, b1y);
                    ctx.lineTo(b2x, b2y);
                    ctx.closePath();
                    ctx.stroke();
                } else {
                    ctx.shadowColor = 'rgba(0, 180, 255, 0.4)';
                    ctx.shadowBlur = 25;
                    const gradCirc = ctx.createRadialGradient(px - 6, py - 6, 5, px, py, r);
                    gradCirc.addColorStop(0, '#4dd0e1');
                    gradCirc.addColorStop(0.6, '#00bcd4');
                    gradCirc.addColorStop(1, '#00695c');
                    ctx.fillStyle = gradCirc;
                    ctx.beginPath();
                    ctx.arc(px, py, r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(0, 200, 230, 0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(px, py, r, 0, Math.PI * 2);
                    ctx.stroke();
                    const innerGrd = ctx.createRadialGradient(px - 4, py - 4, 2, px, py, r * 0.6);
                    innerGrd.addColorStop(0, 'rgba(200, 240, 255, 0.7)');
                    innerGrd.addColorStop(1, 'rgba(100, 200, 255, 0)');
                    ctx.fillStyle = innerGrd;
                    ctx.beginPath();
                    ctx.arc(px, py, r * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                }

                if (this.cooldownTimer > 0) {
                    const progress = this.cooldownTimer / this.dashCooldown;
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255, 80, 80, 0.25)';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(px, py, r * 1.5, -Math.PI / 2, -Math.PI / 2 + (1 - progress) * Math.PI * 2);
                    ctx.stroke();
                }
                ctx.shadowBlur = 0;
            }
        }

        // ============================================================
        //  MODULE: WEAPON (Sniper only)
        // ============================================================
        class Sniper {
            constructor() {
                this.cooldown = 0;
                this.cooldownDuration = CONFIG.SNIPER.cooldown;
                this.pelletCount = CONFIG.SNIPER.pelletCount;
                this.spread = CONFIG.SNIPER.spread;
                this.pelletSpeed = CONFIG.SNIPER.pelletSpeed;
                this.maxRange = CONFIG.SNIPER.maxRange;
                this.damageBase = CONFIG.SNIPER.damageBase;
                this.piercing = CONFIG.SNIPER.piercing;
                this.shake = CONFIG.SNIPER.shake;
                this.flashCount = CONFIG.SNIPER.flashCount;
            }

            update(dt) {
                if (this.cooldown > 0) {
                    this.cooldown -= dt;
                    if (this.cooldown < 0) this.cooldown = 0;
                }
            }

            canShoot() { return this.cooldown <= 0; }

            fire(player, bullets, beams, particles) {
                if (!this.canShoot()) return;
                this.cooldown = this.cooldownDuration;
                const angle = player.facing;
                const isSniper = true;

                // Muzzle flash
                this.spawnMuzzleFlash(player.x, player.y, angle, particles, true);

                for (let i = 0; i < this.pelletCount; i++) {
                    const spreadAngle = angle + (Math.random() - 0.5) * this.spread;
                    const speed = this.pelletSpeed * (0.85 + Math.random() * 0.3);
                    const originX = player.x + Math.cos(angle) * 22;
                    const originY = player.y + Math.sin(angle) * 22;
                    const bullet = {
                        x: originX,
                        y: originY,
                        vx: Math.cos(spreadAngle) * speed,
                        vy: Math.sin(spreadAngle) * speed,
                        life: 1,
                        maxLife: 2000,
                        age: 0,
                        originX: originX,
                        originY: originY,
                        damage: this.damageBase,
                        isSniper: true,
                        piercing: true,
                    };
                    bullets.push(bullet);
                    // Beam
                    beams.push({
                        startX: player.x,
                        startY: player.y,
                        endX: originX,
                        endY: originY,
                        life: 1.0,
                        active: true,
                        bulletRef: bullet,
                        age: 0,
                    });
                    // Lightning tail particles
                    for (let j = 0; j < 5; j++) {
                        this.spawnLightningTail(originX, originY, angle, particles);
                    }
                }
                // Screen shake & flash
                window.shakeAmount = this.shake;
                window.shakeTimer = 220;
                window.sniperFlash = 1.0;
                window.sniperFlashTimer = 200;
            }

            spawnMuzzleFlash(x, y, angle, particles, big) {
                const color = 'hsl(40, 100%, 85%)';
                const speedMult = 1.8;
                for (let i = 0; i < 40; i++) {
                    const speed = (1.5 + Math.random() * 7) * speedMult;
                    const a = angle + (Math.random() - 0.5) * 1.2;
                    const size = (2 + Math.random() * 6) * 1.8;
                    particles.push({
                        x: x + Math.cos(angle) * 14 + (Math.random() - 0.5) * 12,
                        y: y + Math.sin(angle) * 14 + (Math.random() - 0.5) * 12,
                        vx: Math.cos(a) * speed * (0.5 + Math.random() * 0.5),
                        vy: Math.sin(a) * speed * (0.5 + Math.random() * 0.5),
                        life: 1,
                        decay: (0.025 + Math.random() * 0.045) * 0.6,
                        size: size,
                        maxSize: size,
                        color: color,
                    });
                }
            }

            spawnLightningTail(x, y, angle, particles) {
                for (let i = 0; i < 8; i++) {
                    const speed = 2 + Math.random() * 6;
                    const a = angle + (Math.random() - 0.5) * 0.8;
                    const size = 1.5 + Math.random() * 4;
                    particles.push({
                        x: x + (Math.random() - 0.5) * 6,
                        y: y + (Math.random() - 0.5) * 6,
                        vx: Math.cos(a) * speed * 0.3,
                        vy: Math.sin(a) * speed * 0.3,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.04,
                        size: size,
                        maxSize: size,
                        color: 'hsl(210, 100%, 70%)',
                    });
                }
            }
        }

        // ============================================================
        //  MODULE: ENEMY (Base)
        // ============================================================
        class Enemy extends Entity {
            constructor(x, y, config) {
                super(x, y, config);
                this.speed = config.speed || 0.8;
                this.health = config.health || 5;
                this.maxHealth = this.health;
                this.color = config.color || '#ff1744';
                this.glowColor = config.glow || 'rgba(255,23,68,0.8)';
                this.type = config.type || 'enemy';
                this.shootTimer = 0;
                this.shootInterval = config.shootInterval || 3000;
                this.isBound = false;
                this.boundToBoss = false;
                this.customUpdate = config.customUpdate || null;
                this.onDeath = config.onDeath || null;
                this.onHit = config.onHit || null;
            }

            update(dt, player, bullets, enemies) {
                if (!this.alive) return;
                if (this.customUpdate) {
                    this.customUpdate(this, dt, player, bullets, enemies);
                } else {
                    this.defaultUpdate(dt, player);
                }
                // Clamp to screen
                this.x = MathUtils.clamp(this.x, this.radius, CONFIG.W - this.radius);
                this.y = MathUtils.clamp(this.y, this.radius, CONFIG.H - this.radius);
            }

            defaultUpdate(dt, player) {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const d = Math.hypot(dx, dy);
                if (d > 1) {
                    const angle = Math.atan2(dy, dx);
                    this.vx += (Math.cos(angle) * this.speed - this.vx) * 0.04 * dt;
                    this.vy += (Math.sin(angle) * this.speed - this.vy) * 0.04 * dt;
                }
                this.x += this.vx * dt;
                this.y += this.vy * dt;
            }

            takeDamage(damage) {
                this.health -= damage;
                if (this.onHit) this.onHit(this);
                if (this.health <= 0) {
                    this.alive = false;
                    if (this.onDeath) this.onDeath(this);
                    return true;
                }
                return false;
            }

            render(ctx) {
                if (!this.alive) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.shadowColor = this.glowColor;
                ctx.shadowBlur = 20;
                ctx.fillStyle = '#000000';
                ctx.beginPath();
                ctx.moveTo(this.radius, 0);
                ctx.lineTo(-this.radius * 0.4, -this.radius * 0.5);
                ctx.lineTo(-this.radius * 0.2, 0);
                ctx.lineTo(-this.radius * 0.4, this.radius * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 25;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2.5;
                ctx.stroke();
                ctx.shadowBlur = 0;
                // health bar
                const healthPercent = this.health / this.maxHealth;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(-this.radius, -this.radius - 10, this.radius * 2, 4);
                ctx.fillStyle = healthPercent > 0.3 ? '#4caf50' : '#ff5252';
                ctx.fillRect(-this.radius, -this.radius - 10, this.radius * 2 * healthPercent, 4);
                ctx.restore();
            }
        }

        // ============================================================
        //  MODULE: DRONE (Specific Enemy)
        // ============================================================
        class Drone extends Enemy {
            constructor(x, y, config = {}) {
                const defaults = CONFIG.ENEMIES.drone;
                super(x, y, { ...defaults, ...config, type: 'drone' });
                this.preferredDistance = config.preferredDistance || defaults.preferredDistance;
                this.distanceDeadZone = 20;
            }

            defaultUpdate(dt, player) {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const d = Math.hypot(dx, dy);
                if (d > 1) {
                    const angle = Math.atan2(dy, dx);
                    let speedFactor = 0;
                    if (d > this.preferredDistance + this.distanceDeadZone) speedFactor = 0.6;
                    else if (d < this.preferredDistance - this.distanceDeadZone) speedFactor = -0.6;
                    if (d > this.preferredDistance + 100) speedFactor = 0.8;
                    const moveSpeed = this.speed * speedFactor;
                    this.vx += (Math.cos(angle) * moveSpeed - this.vx) * 0.04 * dt;
                    this.vy += (Math.sin(angle) * moveSpeed - this.vy) * 0.04 * dt;
                }
                this.x += this.vx * dt;
                this.y += this.vy * dt;
            }
        }

        // ============================================================
        //  MODULE: MISSILE (Suicide)
        // ============================================================
        class Missile extends Enemy {
            constructor(x, y, config = {}) {
                const defaults = CONFIG.ENEMIES.missile;
                super(x, y, { ...defaults, ...config, type: 'missile' });
                this.explosionRadius = defaults.explosionRadius || 60;
                this.dodgeRadius = 90;
            }

            defaultUpdate(dt, player, bullets) {
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const d = Math.hypot(dx, dy);

                // Explode on contact with player
                if (d < this.radius + player.radius + 12) {
                    this.explode();
                    return;
                }

                if (d > 1) {
                    const angle = Math.atan2(dy, dx);
                    // Dodge bullets
                    let dodgeX = 0,
                        dodgeY = 0;
                    for (const b of bullets) {
                        const distToBullet = MathUtils.dist(this.x, this.y, b.x, b.y);
                        if (distToBullet < this.dodgeRadius && b.life > 0.2) {
                            const bulletDir = Math.atan2(b.vy, b.vx);
                            const perpAngle = bulletDir + Math.PI / 2;
                            const toBullet = Math.atan2(b.y - this.y, b.x - this.x);
                            const angleDiff = Math.atan2(Math.sin(toBullet - bulletDir), Math.cos(toBullet - bulletDir));
                            if (Math.abs(angleDiff) < 1.2) {
                                const strength = 2.0 * (1 - distToBullet / this.dodgeRadius);
                                dodgeX += Math.cos(perpAngle) * strength;
                                dodgeY += Math.sin(perpAngle) * strength;
                            }
                        }
                    }
                    if (dodgeX !== 0 || dodgeY !== 0) {
                        const dodgeAngle = Math.atan2(dodgeY, dodgeX);
                        const blend = 0.65;
                        const finalAngle = Math.atan2(
                            Math.sin(angle) * (1 - blend) + Math.sin(dodgeAngle) * blend,
                            Math.cos(angle) * (1 - blend) + Math.cos(dodgeAngle) * blend
                        );
                        const speed = this.speed * 1.3;
                        this.vx += (Math.cos(finalAngle) * speed - this.vx) * 0.09 * dt;
                        this.vy += (Math.sin(finalAngle) * speed - this.vy) * 0.09 * dt;
                    } else {
                        const speed = this.speed * 1.1;
                        this.vx += (Math.cos(angle) * speed - this.vx) * 0.09 * dt;
                        this.vy += (Math.sin(angle) * speed - this.vy) * 0.09 * dt;
                    }
                }
                this.x += this.vx * dt;
                this.y += this.vy * dt;
            }

            explode() {
                this.alive = false;
                // Explosion particles and damage are handled externally via onDeath
            }
        }

        // ============================================================
        //  MODULE: ENEMY FACTORY
        // ============================================================
        class EnemyFactory {
            constructor() {
                this.types = {
                    drone: Drone,
                    missile: Missile,
                };
            }

            register(type, enemyClass) {
                this.types[type] = enemyClass;
            }

            create(type, x, y, config = {}) {
                const EnemyClass = this.types[type] || Drone;
                return new EnemyClass(x, y, config);
            }

            randomPosition() {
                const margin = 50;
                const side = Math.floor(Math.random() * 4);
                let x, y;
                if (side === 0) { x = margin + Math.random() * (CONFIG.W - 2 * margin);
                    y = margin; } else if (side === 1) { x = CONFIG.W - margin;
                    y = margin + Math.random() * (CONFIG.H - 2 * margin); } else if (side === 2) { x = margin + Math.random() *
                        (CONFIG.W - 2 * margin);
                    y = CONFIG.H - margin; } else { x = margin;
                    y = margin + Math.random() * (CONFIG.H - 2 * margin); }
                return { x, y };
            }

            spawnRandom(type = null) {
                const pos = this.randomPosition();
                if (!type) {
                    const types = Object.keys(this.types);
                    type = types[Math.floor(Math.random() * types.length)];
                }
                return this.create(type, pos.x, pos.y);
            }
        }

        // ============================================================
        //  MODULE: BOSS (Drone Rhapsody)
        // ============================================================
        class Boss extends Entity {
            constructor(x, y) {
                super(x, y, { radius: CONFIG.BOSS.radius });
                this.health = CONFIG.BOSS.health;
                this.maxHealth = CONFIG.BOSS.health;
                this.speed = CONFIG.BOSS.speed;
                this.alive = true;
                this.summonTimer = 0;
                this.summonInterval = CONFIG.BOSS.summonInterval;
                this.specialCooldown = 0;
                this.specialInterval = CONFIG.BOSS.specialInterval;
                this.boundDrones = [];
                this.flashTimer = 0;
                this.angle = 0;
            }

            update(dt, player, enemies, bullets, enemyFactory, game) {
                if (!this.alive) return;
                const dtFactor = dt / 16.67;

                // Move toward player
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                const d = Math.hypot(dx, dy);
                if (d > 50) {
                    const angle = Math.atan2(dy, dx);
                    this.vx += (Math.cos(angle) * this.speed - this.vx) * 0.02 * dtFactor;
                    this.vy += (Math.sin(angle) * this.speed - this.vy) * 0.02 * dtFactor;
                } else {
                    this.vx *= 0.95;
                    this.vy *= 0.95;
                }
                this.x += this.vx * dtFactor;
                this.y += this.vy * dtFactor;
                this.x = MathUtils.clamp(this.x, this.radius, CONFIG.W - this.radius);
                this.y = MathUtils.clamp(this.y, this.radius, CONFIG.H - this.radius);

                // Update bound drones
                for (const drone of this.boundDrones) {
                    if (drone && drone.alive && drone.isBound) {
                        const angle = Math.atan2(this.y - drone.y, this.x - drone.x);
                        const dist = 60;
                        const targetX = this.x - Math.cos(angle) * dist;
                        const targetY = this.y - Math.sin(angle) * dist;
                        drone.vx += (targetX - drone.x) * 0.05 * dtFactor;
                        drone.vy += (targetY - drone.y) * 0.05 * dtFactor;
                        drone.x += drone.vx * dtFactor;
                        drone.y += drone.vy * dtFactor;
                    }
                }
                this.boundDrones = this.boundDrones.filter(d => d && d.alive && d.isBound);

                // Summon timer
                this.summonTimer += dt;
                if (this.summonTimer >= this.summonInterval) {
                    this.summonTimer = 0;
                    this.releaseDrones();
                    this.summonDrones(enemyFactory);
                }

                // Special attack cooldown
                this.specialCooldown += dt;
                if (this.specialCooldown >= this.specialInterval && game.specialAttackPhase === 0) {
                    this.specialCooldown = 0;
                    game.startBossSpecial(this);
                }

                if (this.flashTimer > 0) this.flashTimer -= dt;
                if (this.health <= 0) {
                    this.alive = false;
                    // explosion handled externally
                }
            }

            summonDrones(enemyFactory) {
                for (let i = 0; i < 2; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 60 + Math.random() * 30;
                    const dx = Math.cos(angle) * dist;
                    const dy = Math.sin(angle) * dist;
                    const drone = enemyFactory.create('drone', this.x + dx, this.y + dy, {
                        isBound: true,
                        boundToBoss: true,
                        speed: 1.2,
                        health: 3,
                        preferredDistance: 50,
                    });
                    drone.isBound = true;
                    drone.boundToBoss = true;
                    this.boundDrones.push(drone);
                    // Add to enemies list
                    game.enemies.push(drone);
                }
            }

            releaseDrones() {
                for (const drone of this.boundDrones) {
                    if (drone && drone.alive && drone.isBound) {
                        drone.isBound = false;
                        drone.boundToBoss = false;
                        drone.speed = 0.8;
                        drone.preferredDistance = 250;
                    }
                }
                this.boundDrones = [];
            }

            render(ctx) {
                if (!this.alive) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                const size = this.radius;
                ctx.shadowColor = 'rgba(255, 215, 0, 0.8)';
                ctx.shadowBlur = 50;
                ctx.fillStyle = '#2a2a3a';
                ctx.beginPath();
                ctx.moveTo(0, -size);
                ctx.lineTo(size, 0);
                ctx.lineTo(0, size);
                ctx.lineTo(-size, 0);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 30;
                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.shadowBlur = 40;
                ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                const healthPercent = this.health / this.maxHealth;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(-size, -size - 20, size * 2, 6);
                ctx.fillStyle = healthPercent > 0.3 ? '#ffd700' : '#ff5252';
                ctx.fillRect(-size, -size - 20, size * 2 * healthPercent, 6);
                ctx.fillStyle = '#ffd700';
                ctx.font = '10px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('DRONE RHAPSODY', 0, -size - 26);
                ctx.restore();
            }
        }

        // ============================================================
        //  MODULE: GAME (Main Controller)
        // ============================================================
        class Game {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.W = CONFIG.W;
                this.H = CONFIG.H;

                // Systems
                this.player = new Player(this.W / 2, this.H / 2);

                this.bullets = [];
                this.beams = [];
                this.enemyProjectiles = [];
                this.particles = [];

                // Special attack state
                this.specialAttackPhase = 0; // 0=idle,1=buildup,2=follow,3=circle
                this.specialAttackTimer = 0;
                this.targetCircle = null;
                this.circleDrones = [];

                // Input
                this.input = {
                    moveX: 0,
                    moveY: 0,
                    aimAngle: 0,

                };

                // UI refs

                // Shake

                    this.enemies.push(this.enemyFactory.spawnRandom());
                }

                // Bind events
