<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Drone Hunter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-wrapper {
            background: #111927;
            border-radius: 20px;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), 0 0 40px rgba(0, 180, 255, 0.05);
            border: 1px solid rgba(0, 180, 255, 0.08);
            position: relative;
        }

        canvas {
            display: block;
            border-radius: 12px;
            background: #0d1520;
            width: 100%;
            height: auto;
            aspect-ratio: 900 / 600;
            touch-action: none;
            cursor: none;
        }

        #menuOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(13, 21, 32, 0.88);
            border-radius: 20px;
            z-index: 10;
            backdrop-filter: blur(8px);
            transition: opacity 0.4s;
        }
        #menuOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #menuOverlay h1 {
            color: #8ac4e0;
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(0, 180, 255, 0.3);
            margin-bottom: 40px;
        }
        .menu-buttons {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .menu-btn {
            background: rgba(30, 50, 70, 0.7);
            border: 2px solid rgba(80, 140, 180, 0.4);
            color: #b0d4e8;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            min-width: 160px;
        }
        .menu-btn:hover {
            background: rgba(50, 90, 130, 0.6);
            border-color: #4dd0e1;
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 180, 255, 0.2);
        }
        .menu-btn:active {
            transform: scale(0.95);
        }
        .menu-btn .sub {
            display: block;
            font-size: 0.7rem;
            font-weight: 300;
            opacity: 0.6;
            margin-top: 4px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            padding: 0 8px;
            color: #6a8ba0;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .hud .status {
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .hud .indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hud .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: background 0.2s;
        }

        .dot.ready {
            background: #00e676;
            box-shadow: 0 0 16px rgba(0, 230, 118, 0.5);
        }
        .dot.cooldown {
            background: #ff5252;
            box-shadow: 0 0 16px rgba(255, 82, 82, 0.4);
        }
        .dot.dashing {
            background: #00e5ff;
            box-shadow: 0 0 24px rgba(0, 229, 255, 0.7);
        }

        .hud .info {
            color: #4a7a8a;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .hud .info span {
            color: #8ac4e0;
            font-weight: 600;
            min-width: 36px;
        }

        @media (max-width: 600px) {
            .game-wrapper {
                padding: 8px;
                border-radius: 12px;
            }
            .hud {
                font-size: 11px;
                flex-wrap: wrap;
                gap: 6px;
                justify-content: center;
            }
            #menuOverlay h1 {
                font-size: 1.8rem;
            }
            .menu-btn {
                padding: 12px 28px;
                font-size: 1.2rem;
                min-width: 120px;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper" id="gameWrapper">
        <canvas id="game" width="900" height="600"></canvas>

        <div id="menuOverlay">
            <h1>⚔️ DRONE HUNTER</h1>
            <div class="menu-buttons">
                <div class="menu-btn" data-weapon="shotgun">
                    🔫 SHOTGUN
                    <span class="sub">spread shot · damage falloff</span>
                </div>
                <div class="menu-btn" data-weapon="sniper">
                    🎯 SNIPER
                    <span class="sub">high caliber · blue beam trail</span>
                </div>
            </div>
        </div>

        <div class="hud">
            <div class="status">
                <div class="indicator">
                    <span style="color:#4a7a8a;">DASH</span>
                    <span class="dot ready" id="dashDot"></span>
                </div>
                <div class="indicator">
                    <span style="color:#4a7a8a;">SPEED</span>
                    <span id="speedDisplay" style="color:#8ac4e0; font-weight:600; min-width:40px;">0</span>
                </div>
                <div class="indicator">
                    <span style="color:#4a7a8a;">ENEMIES</span>
                    <span id="enemyCount" style="color:#ff8a65; font-weight:600;">0</span>
                </div>
            </div>
            <div class="info">
                <span style="color:#4a7a8a;">🔫</span>
                <span id="ammoStatus" style="color:#8ac4e0;">READY</span>
                <span style="color:#4a7a8a; margin-left:10px;">WEAPON:</span>
                <span id="weaponLabel" style="color:#8ac4e0; font-weight:600;">SHOTGUN</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const dashDot = document.getElementById('dashDot');
        const speedDisplay = document.getElementById('speedDisplay');
        const ammoStatus = document.getElementById('ammoStatus');
        const enemyCount = document.getElementById('enemyCount');
        const weaponLabel = document.getElementById('weaponLabel');
        const menuOverlay = document.getElementById('menuOverlay');

        const W = 900,
            H = 600;

        // ---------- WEAPON SELECTION ----------
        let weaponType = 'shotgun';
        let gameStarted = false;

        // ---------- PLAYER ----------
        const player = {
            x: W / 2,
            y: H / 2,
            radius: 14,
            speed: 3.5,
            vx: 0,
            vy: 0,
            friction: 0.92,
            accel: 0.6,
            facing: 0,

            isDashing: false,
            dashMultiplier: 1,
            dashDuration: 280,
            dashCooldown: 1200,
            dashTimer: 0,
            cooldownTimer: 0,
            dashSpeedBoost: 9.0,

            trail: [],
            maxTrail: 30,
            flashTimer: 0,
            health: 5,
            maxHealth: 5,
        };

        // ---------- WEAPON CONFIGS ----------
        const weaponConfigs = {
            shotgun: {
                cooldownDuration: 250,
                pelletCount: 8,
                spread: 0.3,
                pelletSpeed: 8,
                maxRange: 400,
                damageBase: 2,
                effects: { shake: 3, flashCount: 18 },
            },
            sniper: {
                cooldownDuration: 500,
                pelletCount: 1,
                spread: 0.02,
                pelletSpeed: 18,
                maxRange: 750,
                damageBase: 10,
                effects: { shake: 14, flashCount: 40 },
            }
        };

        // ---------- SHOTGUN ----------
        let shotgun = {
            cooldown: 0,
            cooldownDuration: 250,
            pelletCount: 8,
            spread: 0.3,
            pelletSpeed: 8,
            maxRange: 400,
            damageBase: 2,
        };

        // ---------- BULLETS ----------
        let bullets = [];

        // ---------- BEAMS (sniper trail) ----------
        let beams = [];

        // ---------- ENEMIES ----------
        let enemies = [];
        let enemyProjectiles = [];

        // ---------- JOYSTICKS ----------
        const aimJoystick = {
            x: 140,
            y: 480,
            radius: 64,
            knobRadius: 26,
            active: false,
            touchId: null,
            dx: 0,
            dy: 0,
            angle: 0,
            shouldShootOnRelease: false,
        };

        const moveJoystick = {
            x: 760,
            y: 480,
            radius: 64,
            knobRadius: 26,
            active: false,
            touchId: null,
            dx: 0,
            dy: 0,
            magnitude: 0,
        };

        // ---------- BUTTONS ----------
        const dashButton = {
            x: 70,
            y: 70,
            radius: 40,
            active: false,
            touchId: null,
        };

        // ---------- PARTICLES ----------
        let particles = [];

        // ---------- INPUT ----------
        const keys = {
            w: false,
            a: false,
            s: false,
            d: false,
            up: false,
            down: false,
            left: false,
            right: false,
        };

        // ---------- UTILITY ----------
        function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

        function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

        // ---------- PARTICLES ----------
        function spawnDashParticles(x, y, angle, count = 28) {
            for (let i = 0; i < count; i++) {
                const speed = 2 + Math.random() * 6;
                const a = angle + (Math.random() - 0.5) * 1.4;
                const size = 2 + Math.random() * 6;
                particles.push({
                    x: x + (Math.random() - 0.5) * 12,
                    y: y + (Math.random() - 0.5) * 12,
                    vx: Math.cos(a) * speed * (0.6 + Math.random() * 0.6),
                    vy: Math.sin(a) * speed * (0.6 + Math.random() * 0.6),
                    life: 1,
                    decay: 0.008 + Math.random() * 0.015,
                    size: size,
                    maxSize: size,
                    color: `hsl(${190 + Math.random() * 30}, 100%, ${65 + Math.random() * 30}%)`,
                });
            }
        }

        function spawnTrailParticles(x, y, angle, count = 6) {
            for (let i = 0; i < count; i++) {
                const speed = 1 + Math.random() * 2.5;
                const a = angle + (Math.random() - 0.5) * 0.8;
                particles.push({
                    x: x + (Math.random() - 0.5) * 6,
                    y: y + (Math.random() - 0.5) * 6,
                    vx: Math.cos(a) * speed * 0.5,
                    vy: Math.sin(a) * speed * 0.5,
                    life: 1,
                    decay: 0.025 + Math.random() * 0.035,
                    size: 1.5 + Math.random() * 3,
                    maxSize: 4,
                    color: `hsl(${200 + Math.random() * 40}, 90%, ${70 + Math.random() * 25}%)`,
                });
            }
        }

        function spawnMuzzleFlash(x, y, angle, count = 18, big = false) {
            const color = big ? 'hsl(40, 100%, 85%)' : 'hsl(40, 100%, 70%)';
            const speedMult = big ? 1.8 : 1;
            for (let i = 0; i < count; i++) {
                const speed = (1.5 + Math.random() * 7) * speedMult;
                const a = angle + (Math.random() - 0.5) * (big ? 1.2 : 0.7);
                const size = (2 + Math.random() * 6) * (big ? 1.8 : 1);
                particles.push({
                    x: x + Math.cos(angle) * 14 + (Math.random() - 0.5) * 12,
                    y: y + Math.sin(angle) * 14 + (Math.random() - 0.5) * 12,
                    vx: Math.cos(a) * speed * (0.5 + Math.random() * 0.5),
                    vy: Math.sin(a) * speed * (0.5 + Math.random() * 0.5),
                    life: 1,
                    decay: (0.025 + Math.random() * 0.045) * (big ? 0.6 : 1),
                    size: size,
                    maxSize: size,
                    color: color,
                });
            }
        }

        function spawnEnemyDeath(x, y, color = 'hsl(0, 80%, 50%)') {
            for (let i = 0; i < 24; i++) {
                const speed = 1 + Math.random() * 5;
                const a = Math.random() * Math.PI * 2;
                particles.push({
                    x: x + (Math.random() - 0.5) * 12,
                    y: y + (Math.random() - 0.5) * 12,
                    vx: Math.cos(a) * speed * (0.4 + Math.random() * 0.6),
                    vy: Math.sin(a) * speed * (0.4 + Math.random() * 0.6),
                    life: 1,
                    decay: 0.008 + Math.random() * 0.018,
                    size: 2 + Math.random() * 5,
                    maxSize: 7,
                    color: color,
                });
            }
        }

        // ---------- EXPLOSION (for suicide missile) ----------
        function spawnExplosion(x, y) {
            // Fireball
            for (let i = 0; i < 50; i++) {
                const speed = 3 + Math.random() * 9;
                const a = Math.random() * Math.PI * 2;
                const size = 3 + Math.random() * 9;
                particles.push({
                    x: x + (Math.random() - 0.5) * 12,
                    y: y + (Math.random() - 0.5) * 12,
                    vx: Math.cos(a) * speed * (0.5 + Math.random() * 0.6),
                    vy: Math.sin(a) * speed * (0.5 + Math.random() * 0.6),
                    life: 1,
                    decay: 0.005 + Math.random() * 0.012,
                    size: size,
                    maxSize: size,
                    color: `hsl(${25 + Math.random() * 35}, 100%, ${45 + Math.random() * 35}%)`,
                });
            }
            // Smoke / debris
            for (let i = 0; i < 25; i++) {
                const speed = 1 + Math.random() * 4;
                const a = Math.random() * Math.PI * 2;
                const size = 2 + Math.random() * 6;
                particles.push({
                    x: x + (Math.random() - 0.5) * 8,
                    y: y + (Math.random() - 0.5) * 8,
                    vx: Math.cos(a) * speed * 0.4,
                    vy: Math.sin(a) * speed * 0.4 - 1.5,
                    life: 1,
                    decay: 0.006 + Math.random() * 0.015,
                    size: size,
                    maxSize: size,
                    color: `hsl(0, 0%, ${20 + Math.random() * 30}%)`,
                });
            }
            // Red/orange core
            for (let i = 0; i < 20; i++) {
                const speed = 1 + Math.random() * 3;
                const a = Math.random() * Math.PI * 2;
                particles.push({
                    x: x + (Math.random() - 0.5) * 6,
                    y: y + (Math.random() - 0.5) * 6,
                    vx: Math.cos(a) * speed * 0.6,
                    vy: Math.sin(a) * speed * 0.6 - 0.5,
                    life: 1,
                    decay: 0.01 + Math.random() * 0.02,
                    size: 4 + Math.random() * 8,
                    maxSize: 10,
                    color: `hsl(${5 + Math.random() * 20}, 100%, ${50 + Math.random() * 30}%)`,
                });
            }
            // Screen shake
            window.shakeAmount = 12;
            window.shakeTimer = 200;
        }

        // ---------- DASH ----------
        function performDash() {
            if (player.isDashing) return;
            if (player.cooldownTimer > 0) return;

            player.isDashing = true;
            player.dashTimer = player.dashDuration;
            player.dashMultiplier = player.dashSpeedBoost;

            spawnDashParticles(player.x, player.y, player.facing, 35);
            for (let i = 0; i < 10; i++) {
                spawnTrailParticles(player.x, player.y, player.facing + (Math.random() - 0.5) * 0.8, 4);
            }

            player.flashTimer = 100;
            window.shakeAmount = 8;
            window.shakeTimer = 150;
        }

        // ---------- SHOOT ----------
        function shoot(angle) {
            if (shotgun.cooldown > 0) return;

            shotgun.cooldown = shotgun.cooldownDuration;
            player.facing = angle;

            const config = weaponConfigs[weaponType];
            const isSniper = weaponType === 'sniper';
            const shakeAmt = config.effects.shake;
            const flashCount = config.effects.flashCount;

            spawnMuzzleFlash(player.x, player.y, angle, flashCount, isSniper);

            // Store beam start position for sniper
            let beamStartX = player.x;
            let beamStartY = player.y;

            for (let i = 0; i < shotgun.pelletCount; i++) {
                const spreadAngle = angle + (Math.random() - 0.5) * shotgun.spread;
                const speed = shotgun.pelletSpeed * (0.85 + Math.random() * 0.3);
                const originX = player.x + Math.cos(angle) * 22;
                const originY = player.y + Math.sin(angle) * 22;
                const bullet = {
                    x: originX,
                    y: originY,
                    vx: Math.cos(spreadAngle) * speed,
                    vy: Math.sin(spreadAngle) * speed,
                    life: 1,
                    maxLife: 2000,
                    age: 0,
                    originX: originX,
                    originY: originY,
                    damage: shotgun.damageBase,
                    isSniper: isSniper,
                };
                bullets.push(bullet);

                // If sniper, create a beam for this bullet
                if (isSniper) {
                    beams.push({
                        startX: beamStartX,
                        startY: beamStartY,
                        endX: originX,
                        endY: originY,
                        life: 1.0,
                        active: true,
                        bulletRef: bullet,
                        age: 0,
                    });
                }
            }

            window.shakeAmount = shakeAmt;
            window.shakeTimer = isSniper ? 220 : 80;

            ammoStatus.textContent = isSniper ? 'BOOM!' : 'BANG!';
            setTimeout(() => { ammoStatus.textContent = 'READY'; }, 300);

            if (isSniper) {
                window.sniperFlash = 1.0;
                window.sniperFlashTimer = 200;
            }
        }

        // ---------- ENEMY SPAWN ----------
        function spawnEnemy() {
            let x, y;
            const side = Math.floor(Math.random() * 4);
            const margin = 50;
            if (side === 0) { x = margin + Math.random() * (W - 2 * margin);
                y = margin; } else if (side === 1) { x = W - margin;
                y = margin + Math.random() * (H - 2 * margin); } else if (side === 2) { x = margin + Math.random() * (W - 2 *
                    margin);
                y = H - margin; } else { x = margin;
                y = margin + Math.random() * (H - 2 * margin); }

            const missileCount = enemies.filter(e => e.type === 'missile').length;
            let type = 'drone';
            if (missileCount < 2 && Math.random() < 0.55) {
                type = 'missile';
            } else if (enemies.length < 3) {
                type = 'drone';
            } else {
                type = Math.random() < 0.5 ? 'drone' : 'missile';
            }

            const isMissile = type === 'missile';
            enemies.push({
                x: x,
                y: y,
                radius: 16,
                speed: isMissile ? 3.2 : 0.8,
                vx: 0,
                vy: 0,
                health: isMissile ? 3 : 5,
                shootTimer: 0,
                shootInterval: 3000,
                angle: 0,
                type: type,
                preferredDistance: isMissile ? 30 : 250,
                distanceDeadZone: 20,
                dodgeCooldown: 0,
                // for missile: explosion radius
                explosionRadius: 60,
            });
        }

        // ---------- UPDATE ----------
        function update(dt) {
            if (!gameStarted) return;

            const dtFactor = dt / 16.67;

            // ---- Aiming ----
            if (aimJoystick.active) {
                const mag = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                if (mag > 5) {
                    player.facing = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                }
            }

            // ---- Movement ----
            let moveX = 0,
                moveY = 0;
            if (moveJoystick.active) {
                const maxDist = moveJoystick.radius * 0.6;
                const mag = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                if (mag > 5) {
                    moveX = (moveJoystick.dx / maxDist);
                    moveY = (moveJoystick.dy / maxDist);
                    const len = Math.hypot(moveX, moveY);
                    if (len > 1) { moveX /= len;
                        moveY /= len; }
                }
            } else {
                if (keys.w || keys.up) moveY = -1;
                if (keys.s || keys.down) moveY = 1;
                if (keys.a || keys.left) moveX = -1;
                if (keys.d || keys.right) moveX = 1;
                const len = Math.hypot(moveX, moveY);
                if (len > 0) { moveX /= len;
                    moveY /= len; }
            }

            // ---- Movement Physics ----
            const targetVx = moveX * player.speed;
            const targetVy = moveY * player.speed;
            if (moveX !== 0 || moveY !== 0) {
                player.vx += (targetVx - player.vx) * 0.18 * dtFactor;
                player.vy += (targetVy - player.vy) * 0.18 * dtFactor;
            } else {
                player.vx *= Math.pow(player.friction, dtFactor * 0.6);
                player.vy *= Math.pow(player.friction, dtFactor * 0.6);
                if (Math.abs(player.vx) < 0.05) player.vx = 0;
                if (Math.abs(player.vy) < 0.05) player.vy = 0;
            }

            // ---- Dash ----
            if (player.isDashing) {
                player.dashTimer -= dt;
                if (player.dashTimer <= 0) {
                    player.isDashing = false;
                    player.dashMultiplier = 1;
                    player.dashTimer = 0;
                    player.cooldownTimer = player.dashCooldown;
                    spawnDashParticles(player.x, player.y, player.facing + Math.PI, 20);
                } else {
                    const dashSpeed = player.speed * player.dashMultiplier;
                    const steer = 0.08;
                    const targetDashX = Math.cos(player.facing) * dashSpeed;
                    const targetDashY = Math.sin(player.facing) * dashSpeed;
                    player.vx += (targetDashX - player.vx) * steer * dtFactor;
                    player.vy += (targetDashY - player.vy) * steer * dtFactor;

                    if (Math.random() < 0.5 * dtFactor) {
                        spawnTrailParticles(player.x, player.y, player.facing + (Math.random() - 0.5) * 0.6, 3);
                    }
                }
            }

            // ---- Cooldown ----
            if (player.cooldownTimer > 0) {
                player.cooldownTimer -= dt;
                if (player.cooldownTimer < 0) player.cooldownTimer = 0;
            }

            // ---- Apply velocity ----
            player.x += player.vx * dtFactor;
            player.y += player.vy * dtFactor;

            const margin = player.radius + 4;
            let bounced = false;
            if (player.isDashing) {
                if (player.x - player.radius < 0) {
                    player.x = player.radius;
                    player.vx = -player.vx * 0.8;
                    bounced = true;
                } else if (player.x + player.radius > W) {
                    player.x = W - player.radius;
                    player.vx = -player.vx * 0.8;
                    bounced = true;
                }
                if (player.y - player.radius < 0) {
                    player.y = player.radius;
                    player.vy = -player.vy * 0.8;
                    bounced = true;
                } else if (player.y + player.radius > H) {
                    player.y = H - player.radius;
                    player.vy = -player.vy * 0.8;
                    bounced = true;
                }
                if (bounced) {
                    spawnDashParticles(player.x, player.y, Math.atan2(player.vy, player.vx), 10);
                }
            } else {
                player.x = clamp(player.x, margin, W - margin);
                player.y = clamp(player.y, margin, H - margin);
            }

            // ---- Player Trail ----
            if (player.isDashing || Math.abs(player.vx) > 0.4 || Math.abs(player.vy) > 0.4) {
                player.trail.push({ x: player.x, y: player.y, life: 1 });
                if (player.trail.length > player.maxTrail) player.trail.shift();
            }
            for (let i = player.trail.length - 1; i >= 0; i--) {
                player.trail[i].life -= 0.02 * dtFactor;
                if (player.trail[i].life <= 0) player.trail.splice(i, 1);
            }

            // ---- Shotgun cooldown ----
            if (shotgun.cooldown > 0) {
                shotgun.cooldown -= dt;
                if (shotgun.cooldown < 0) shotgun.cooldown = 0;
            }

            // ---- Player Bullets ----
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx * dtFactor;
                b.y += b.vy * dtFactor;
                b.age += dt;
                const traveled = dist(b.originX, b.originY, b.x, b.y);
                const lifeRatio = 1 - Math.min(traveled / shotgun.maxRange, 1);
                b.life = lifeRatio;
                b.damage = shotgun.damageBase * lifeRatio;

                if (traveled > shotgun.maxRange || b.x < -50 || b.x > W + 50 || b.y < -50 || b.y > H + 50) {
                    bullets.splice(i, 1);
                }
            }

            // ---- BEAMS: update to follow bullets ----
            for (let i = beams.length - 1; i >= 0; i--) {
                const beam = beams[i];
                beam.age += dt;

                if (beam.bulletRef && beam.active) {
                    // Check if bullet still exists
                    let bulletExists = false;
                    for (const b of bullets) {
                        if (b === beam.bulletRef) {
                            bulletExists = true;
                            beam.endX = b.x;
                            beam.endY = b.y;
                            beam.life = 1.0;
                            break;
                        }
                    }
                    if (!bulletExists) {
                        beam.bulletRef = null;
                        beam.active = false;
                    }
                } else {
                    // Fade out
                    beam.life -= 0.015 * dtFactor;
                    if (beam.life <= 0) {
                        beams.splice(i, 1);
                        continue;
                    }
                }

                // Update start position to follow player (smoothly)
                beam.startX += (player.x - beam.startX) * 0.1 * dtFactor;
                beam.startY += (player.y - beam.startY) * 0.1 * dtFactor;
            }

            // ---- Enemy AI ----
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x;
                const dy = player.y - e.y;
                const d = Math.hypot(dx, dy);

                // ---- SUICIDE MISSILE: check for impact explosion ----
                if (e.type === 'missile') {
                    const distToPlayer = dist(e.x, e.y, player.x, player.y);
                    if (distToPlayer < e.radius + player.radius + 12) {
                        // EXPLODE!
                        spawnExplosion(e.x, e.y);
                        window.shakeAmount = 12;
                        window.shakeTimer = 200;
                        player.flashTimer = 180;
                        // Damage player (flash only for now, health system simple)
                        player.flashTimer = 200;
                        // Remove missile
                        spawnEnemyDeath(e.x, e.y, 'hsl(30, 100%, 50%)');
                        enemies.splice(i, 1);
                        continue;
                    }
                }

                if (d > 1) {
                    const angle = Math.atan2(dy, dx);
                    let speedFactor = 0;

                    if (e.type === 'missile') {
                        // Missile: always move toward player, dodge bullets
                        let dodgeX = 0,
                            dodgeY = 0;
                        for (const b of bullets) {
                            const distToBullet = dist(e.x, e.y, b.x, b.y);
                            if (distToBullet < 90 && b.life > 0.2) {
                                const bulletDir = Math.atan2(b.vy, b.vx);
                                const perpAngle = bulletDir + Math.PI / 2;
                                const toBullet = Math.atan2(b.y - e.y, b.x - e.x);
                                const angleDiff = Math.atan2(Math.sin(toBullet - bulletDir), Math.cos(toBullet - bulletDir));
                                if (Math.abs(angleDiff) < 1.2) {
                                    const strength = 2.0 * (1 - distToBullet / 90);
                                    dodgeX += Math.cos(perpAngle) * strength;
                                    dodgeY += Math.sin(perpAngle) * strength;
                                }
                            }
                        }
                        if (dodgeX !== 0 || dodgeY !== 0) {
                            const dodgeAngle = Math.atan2(dodgeY, dodgeX);
                            const moveAngle = angle;
                            const blend = 0.65;
                            const finalAngle = Math.atan2(
                                Math.sin(moveAngle) * (1 - blend) + Math.sin(dodgeAngle) * blend,
                                Math.cos(moveAngle) * (1 - blend) + Math.cos(dodgeAngle) * blend
                            );
                            const speed = e.speed * 1.3;
                            e.vx += (Math.cos(finalAngle) * speed - e.vx) * 0.09 * dtFactor;
                            e.vy += (Math.sin(finalAngle) * speed - e.vy) * 0.09 * dtFactor;
                        } else {
                            const speed = e.speed * 1.1;
                            e.vx += (Math.cos(angle) * speed - e.vx) * 0.09 * dtFactor;
                            e.vy += (Math.sin(angle) * speed - e.vy) * 0.09 * dtFactor;
                        }
                    } else {
                        // Drone: maintain distance
                        const pref = e.preferredDistance;
                        const dead = e.distanceDeadZone;
                        if (d > pref + dead) speedFactor = 0.6;
                        else if (d < pref - dead) speedFactor = -0.6;
                        else speedFactor = 0;
                        if (d > pref + 100) speedFactor = 0.8;
                        const moveSpeed = e.speed * speedFactor;
                        e.vx += (Math.cos(angle) * moveSpeed - e.vx) * 0.04 * dtFactor;
                        e.vy += (Math.sin(angle) * moveSpeed - e.vy) * 0.04 * dtFactor;
                    }
                }
                e.x += e.vx * dtFactor;
                e.y += e.vy * dtFactor;
                e.x = clamp(e.x, e.radius, W - e.radius);
                e.y = clamp(e.y, e.radius, H - e.radius);

                // Drone shoots
                if (e.type === 'drone') {
                    e.shootTimer += dt;
                    if (e.shootTimer >= e.shootInterval) {
                        e.shootTimer = 0;
                        const angle = Math.atan2(player.y - e.y, player.x - e.x);
                        enemyProjectiles.push({
                            x: e.x + Math.cos(angle) * (e.radius + 4),
                            y: e.y + Math.sin(angle) * (e.radius + 4),
                            vx: Math.cos(angle) * 3.0,
                            vy: Math.sin(angle) * 3.0,
                            radius: 6,
                            life: 1,
                            damage: 1,
                        });
                    }
                }
            }

            // ---- Enemy Projectiles ----
            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                const p = enemyProjectiles[i];
                p.x += p.vx * dtFactor;
                p.y += p.vy * dtFactor;
                if (p.x < -20 || p.x > W + 20 || p.y < -20 || p.y > H + 20) {
                    enemyProjectiles.splice(i, 1);
                    continue;
                }
                if (dist(p.x, p.y, player.x, player.y) < player.radius + p.radius) {
                    player.flashTimer = 200;
                    window.shakeAmount = 4;
                    window.shakeTimer = 100;
                    enemyProjectiles.splice(i, 1);
                    for (let j = 0; j < 8; j++) {
                        const a = Math.random() * Math.PI * 2;
                        const speed = 1 + Math.random() * 3;
                        particles.push({
                            x: p.x,
                            y: p.y,
                            vx: Math.cos(a) * speed,
                            vy: Math.sin(a) * speed,
                            life: 1,
                            decay: 0.02 + Math.random() * 0.03,
                            size: 2 + Math.random() * 4,
                            maxSize: 5,
                            color: `hsl(0, 80%, 60%)`,
                        });
                    }
                    continue;
                }
            }

            // ---- Bullet vs Enemy Collision ----
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                let bulletUsed = false;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (dist(b.x, b.y, e.x, e.y) < e.radius + 4) {
                        e.health -= b.damage;
                        bulletUsed = true;
                        for (let k = 0; k < 4; k++) {
                            const a = Math.random() * Math.PI * 2;
                            const speed = 1 + Math.random() * 2;
                            particles.push({
                                x: b.x,
                                y: b.y,
                                vx: Math.cos(a) * speed,
                                vy: Math.sin(a) * speed,
                                life: 1,
                                decay: 0.03 + Math.random() * 0.04,
                                size: 2 + Math.random() * 3,
                                maxSize: 4,
                                color: `hsl(0, 80%, 70%)`,
                            });
                        }
                        if (e.health <= 0) {
                            const color = e.type === 'missile' ? 'hsl(30, 100%, 50%)' : 'hsl(0, 80%, 50%)';
                            spawnEnemyDeath(e.x, e.y, color);
                            enemies.splice(j, 1);
                        }
                        break;
                    }
                }
                if (bulletUsed) {
                    bullets.splice(i, 1);
                }
            }

            // ---- Spawn new enemies ----
            const maxEnemies = 4;
            while (enemies.length < maxEnemies) {
                spawnEnemy();
            }

            // ---- Particles ----
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx * dtFactor;
                p.y += p.vy * dtFactor;
                p.vx *= 0.98;
                p.vy *= 0.98;
                p.life -= p.decay * dtFactor;
                p.size = p.maxSize * p.life;
                if (p.life <= 0 || p.size < 0.1) particles.splice(i, 1);
            }

            // ---- Shake ----
            if (window.shakeTimer > 0) {
                window.shakeTimer -= dt;
                if (window.shakeTimer < 0) window.shakeTimer = 0;
                window.shakeAmount *= 0.96;
                if (window.shakeAmount < 0.1) window.shakeAmount = 0;
            }

            // ---- Sniper flash ----
            if (window.sniperFlashTimer !== undefined && window.sniperFlashTimer > 0) {
                window.sniperFlashTimer -= dt;
                window.sniperFlash = window.sniperFlashTimer / 200;
                if (window.sniperFlashTimer <= 0) window.sniperFlash = 0;
            }

            // ---- UI ----
            const speed = Math.hypot(player.vx, player.vy);
            speedDisplay.textContent = Math.round(speed * 10) / 10;
            enemyCount.textContent = enemies.length;

            if (player.isDashing) dashDot.className = 'dot dashing';
            else if (player.cooldownTimer > 0) dashDot.className = 'dot cooldown';
            else dashDot.className = 'dot ready';

            if (player.flashTimer > 0) player.flashTimer -= dt;
        }

        // ---------- RENDER ----------
        function render() {
            ctx.save();

            // ---- Shake ----
            let shakeX = 0,
                shakeY = 0;
            if (window.shakeTimer > 0 && window.shakeAmount > 0.1) {
                shakeX = (Math.random() - 0.5) * window.shakeAmount * 1.8;
                shakeY = (Math.random() - 0.5) * window.shakeAmount * 1.8;
                ctx.translate(shakeX, shakeY);
            }

            // ---- Background ----
            const grad = ctx.createRadialGradient(W / 2, H / 2, 100, W / 2, H / 2, 550);
            grad.addColorStop(0, '#132033');
            grad.addColorStop(0.5, '#0d1825');
            grad.addColorStop(1, '#070d14');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, H);

            // ---- Grid ----
            ctx.strokeStyle = 'rgba(30, 60, 90, 0.15)';
            ctx.lineWidth = 1;
            const gridSize = 50;
            for (let x = 0; x <= W; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y <= H; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // ---- Player Trail ----
            for (const t of player.trail) {
                const alpha = t.life * 0.25;
                const size = player.radius * 0.5 * t.life;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = `hsl(200, 90%, ${60 + 30 * t.life}%)`;
                ctx.shadowColor = `rgba(0, 180, 255, ${alpha * 0.3})`;
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ---- BEAMS (Sniper Blue Trail) ----
            for (const beam of beams) {
                if (beam.life < 0.01) continue;
                const alpha = beam.life * 0.85;
                ctx.save();
                ctx.globalAlpha = alpha;

                // Outer glow
                ctx.shadowColor = 'rgba(50, 150, 255, 0.9)';
                ctx.shadowBlur = 45;
                ctx.strokeStyle = `rgba(70, 180, 255, ${alpha * 0.7})`;
                ctx.lineWidth = 6 * beam.life + 2;
                ctx.beginPath();
                ctx.moveTo(beam.startX, beam.startY);
                ctx.lineTo(beam.endX, beam.endY);
                ctx.stroke();

                // Inner bright core
                ctx.shadowBlur = 60;
                ctx.strokeStyle = `rgba(180, 230, 255, ${alpha * 0.9})`;
                ctx.lineWidth = 3 * beam.life + 1;
                ctx.beginPath();
                ctx.moveTo(beam.startX, beam.startY);
                ctx.lineTo(beam.endX, beam.endY);
                ctx.stroke();

                // Additional glow dots along the beam
                ctx.shadowBlur = 40;
                for (let t = 0.1; t < 1; t += 0.1) {
                    const bx = beam.startX + (beam.endX - beam.startX) * t;
                    const by = beam.startY + (beam.endY - beam.startY) * t;
                    ctx.fillStyle = `rgba(150, 220, 255, ${alpha * 0.3 * (1 - t)})`;
                    ctx.beginPath();
                    ctx.arc(bx, by, 3 * beam.life * (1 - t) + 1, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
            ctx.shadowBlur = 0;

            // ---- Player Bullets ----
            for (const b of bullets) {
                const alpha = b.life * 0.8;
                ctx.globalAlpha = alpha;
                const isSniper = b.isSniper || false;
                ctx.fillStyle = isSniper ? `hsl(210, 100%, 65%)` : `hsl(40, 100%, ${50 + 30 * b.life}%)`;
                ctx.shadowColor = isSniper ?
                    `rgba(100, 200, 255, ${alpha * 0.7})` :
                    `rgba(255, 200, 100, ${alpha * 0.5})`;
                ctx.shadowBlur = isSniper ? 50 : 15;
                const size = isSniper ? 7 + 5 * b.life : 2 + 3 * b.life;
                ctx.beginPath();
                ctx.arc(b.x, b.y, size, 0, Math.PI * 2);
                ctx.fill();
                if (isSniper) {
                    ctx.shadowBlur = 70;
                    ctx.fillStyle = `rgba(150, 220, 255, ${alpha * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, size * 3.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ---- Enemy Projectiles ----
            for (const p of enemyProjectiles) {
                ctx.fillStyle = '#ff5252';
                ctx.shadowColor = 'rgba(255, 80, 80, 0.6)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'rgba(255, 200, 200, 0.3)';
                ctx.shadowBlur = 30;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            // ---- Enemies ----
            for (const e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                ctx.rotate(angle);
                const size = e.radius;
                const isMissile = e.type === 'missile';
                const fillColor = '#000000';
                const strokeColor = isMissile ? '#ff9100' : '#ff1744';
                const glowColor = isMissile ? 'rgba(255, 145, 0, 0.8)' : 'rgba(255, 23, 68, 0.8)';
                ctx.shadowColor = glowColor;
                ctx.shadowBlur = 20;
                ctx.fillStyle = fillColor;
                ctx.beginPath();
                ctx.moveTo(size, 0);
                ctx.lineTo(-size * 0.4, -size * 0.5);
                ctx.lineTo(-size * 0.2, 0);
                ctx.lineTo(-size * 0.4, size * 0.5);
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 25;
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 2.5;
                ctx.stroke();

                ctx.shadowBlur = 0;
                const healthPercent = e.health / (isMissile ? 3 : 5);
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(-size, -size - 10, size * 2, 4);
                ctx.fillStyle = healthPercent > 0.3 ? '#4caf50' : '#ff5252';
                ctx.fillRect(-size, -size - 10, size * 2 * healthPercent, 4);

                // Missile indicator: small explosion icon
                if (isMissile) {
                    ctx.fillStyle = 'rgba(255, 145, 0, 0.5)';
                    ctx.font = '8px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('💥', 0, size + 16);
                }

                ctx.restore();
            }

            // ---- Particles ----
            for (const p of particles) {
                ctx.globalAlpha = p.life * 0.9;
                ctx.fillStyle = p.color || '#66d0ff';
                ctx.shadowColor = `rgba(100, 200, 255, ${p.life * 0.3})`;
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(p.size, 0.5), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // ---- Sniper Flash ----
            if (window.sniperFlash && window.sniperFlash > 0.01) {
                const alpha = window.sniperFlash * 0.8;
                const gradFlash = ctx.createRadialGradient(player.x, player.y, 20, player.x, player.y, 500);
                gradFlash.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
                gradFlash.addColorStop(0.3, `rgba(255, 255, 255, ${alpha * 0.5})`);
                gradFlash.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.fillStyle = gradFlash;
                ctx.fillRect(0, 0, W, H);
                const coreGrad = ctx.createRadialGradient(player.x, player.y, 5, player.x, player.y, 150);
                coreGrad.addColorStop(0, `rgba(255, 255, 255, ${alpha * 0.6})`);
                coreGrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                ctx.fillStyle = coreGrad;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 150, 0, Math.PI * 2);
                ctx.fill();
            }

            // ---- Player ----
            const px = player.x;
            const py = player.y;
            const r = player.radius;

            const glowGrd = ctx.createRadialGradient(px, py, 5, px, py, r * 2.5);
            const glowColor = player.isDashing ? 'rgba(0, 220, 255, 0.3)' : 'rgba(0, 160, 255, 0.12)';
            glowGrd.addColorStop(0, glowColor);
            glowGrd.addColorStop(1, 'rgba(0, 160, 255, 0)');
            ctx.fillStyle = glowGrd;
            ctx.beginPath();
            ctx.arc(px, py, r * 2.5, 0, Math.PI * 2);
            ctx.fill();

            if (player.isDashing) {
                ctx.strokeStyle = 'rgba(0, 230, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 8]);
                const ringR = r * 1.7 + Math.sin(Date.now() / 70) * 4;
                ctx.beginPath();
                ctx.arc(px, py, ringR, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            if (player.isDashing) {
                const angle = player.facing;
                const tipDist = r * 1.4;
                const baseDist = r * 0.8;
                const baseHalf = r * 0.9;
                const tipX = px + Math.cos(angle) * tipDist;
                const tipY = py + Math.sin(angle) * tipDist;
                const baseX = px - Math.cos(angle) * baseDist;
                const baseY = py - Math.sin(angle) * baseDist;
                const perpAngle = angle + Math.PI / 2;
                const b1x = baseX + Math.cos(perpAngle) * baseHalf;
                const b1y = baseY + Math.sin(perpAngle) * baseHalf;
                const b2x = baseX - Math.cos(perpAngle) * baseHalf;
                const b2y = baseY - Math.sin(perpAngle) * baseHalf;

                ctx.shadowColor = 'rgba(0, 220, 255, 0.7)';
                ctx.shadowBlur = 40;
                const gradTri = ctx.createLinearGradient(tipX, tipY, b1x, b1y);
                gradTri.addColorStop(0, '#00e5ff');
                gradTri.addColorStop(0.5, '#0091ea');
                gradTri.addColorStop(1, '#0055b3');
                ctx.fillStyle = gradTri;
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(b1x, b1y);
                ctx.lineTo(b2x, b2y);
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0, 230, 255, 0.8)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.moveTo(tipX, tipY);
                ctx.lineTo(b1x, b1y);
                ctx.lineTo(b2x, b2y);
                ctx.closePath();
                ctx.stroke();
            } else {
                ctx.shadowColor = 'rgba(0, 180, 255, 0.4)';
                ctx.shadowBlur = 25;
                const gradCirc = ctx.createRadialGradient(px - 6, py - 6, 5, px, py, r);
                gradCirc.addColorStop(0, '#4dd0e1');
                gradCirc.addColorStop(0.6, '#00bcd4');
                gradCirc.addColorStop(1, '#00695c');
                ctx.fillStyle = gradCirc;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(0, 200, 230, 0.3)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(px, py, r, 0, Math.PI * 2);
                ctx.stroke();

                const innerGrd = ctx.createRadialGradient(px - 4, py - 4, 2, px, py, r * 0.6);
                innerGrd.addColorStop(0, 'rgba(200, 240, 255, 0.7)');
                innerGrd.addColorStop(1, 'rgba(100, 200, 255, 0)');
                ctx.fillStyle = innerGrd;
                ctx.beginPath();
                ctx.arc(px, py, r * 0.6, 0, Math.PI * 2);
                ctx.fill();
            }

            if (player.cooldownTimer > 0) {
                const progress = player.cooldownTimer / player.dashCooldown;
                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255, 80, 80, 0.25)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(px, py, r * 1.5, -Math.PI / 2, -Math.PI / 2 + (1 - progress) * Math.PI * 2);
                ctx.stroke();
            }

            ctx.shadowBlur = 0;

            // ---- Shotgun Spread Fan ----
            if (aimJoystick.active && Math.hypot(aimJoystick.dx, aimJoystick.dy) > 5) {
                const angle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                const spread = shotgun.spread;
                const range = 120;
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = 'rgba(255, 200, 100, 0.2)';
                ctx.shadowColor = 'rgba(255, 200, 100, 0.3)';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(px + Math.cos(angle) * 20, py + Math.sin(angle) * 20);
                ctx.arc(px + Math.cos(angle) * 20, py + Math.sin(angle) * 20, range, angle - spread / 2, angle + spread / 2);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 200, 100, 0.4)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                ctx.restore();
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.strokeStyle = 'rgba(255, 200, 100, 0.4)';
                ctx.lineWidth = 1.5;
                ctx.setLineDash([4, 6]);
                const len = range;
                const edgeAngle1 = angle - spread / 2;
                const edgeAngle2 = angle + spread / 2;
                ctx.beginPath();
                ctx.moveTo(px + Math.cos(angle) * 20, py + Math.sin(angle) * 20);
                ctx.lineTo(px + Math.cos(angle) * 20 + Math.cos(edgeAngle1) * len, py + Math.sin(angle) * 20 + Math.sin(
                    edgeAngle1) * len);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px + Math.cos(angle) * 20, py + Math.sin(angle) * 20);
                ctx.lineTo(px + Math.cos(angle) * 20 + Math.cos(edgeAngle2) * len, py + Math.sin(angle) * 20 + Math.sin(
                    edgeAngle2) * len);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }

            // ---- Draw Joysticks & Buttons ----
            drawJoystick(aimJoystick, 'AIM (release to shoot)');
            drawJoystick(moveJoystick, 'MOVE');
            drawDashButton();

            ctx.restore();

            // ---- HUD: Dash bar ----
            const barW = 160,
                barH = 6;
            const barX = W / 2 - barW / 2,
                barY = H - 28;
            ctx.fillStyle = 'rgba(10, 20, 35, 0.5)';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 4);
            ctx.fill();

            let fillW = 0;
            let fillColor = '#00e676';
            if (player.isDashing) {
                const prog = player.dashTimer / player.dashDuration;
                fillW = barW * prog;
                fillColor = '#00e5ff';
            } else if (player.cooldownTimer > 0) {
                const prog = 1 - player.cooldownTimer / player.dashCooldown;
                fillW = barW * prog;
                fillColor = '#ff5252';
            } else {
                fillW = barW;
                fillColor = '#00e676';
            }
            const fillGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
            fillGrad.addColorStop(0, fillColor);
            fillGrad.addColorStop(1, fillColor);
            ctx.fillStyle = fillGrad;
            ctx.beginPath();
            if (fillW > 0) ctx.rect(barX, barY, fillW, barH);
            ctx.fill();

            ctx.fillStyle = 'rgba(120, 180, 210, 0.4)';
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('DASH', W / 2, barY - 6);

            // ---- Speed ring ----
            const speed = Math.hypot(player.vx, player.vy);
            const speedRatio = Math.min(speed / (player.speed * 1.8), 1);
            if (speedRatio > 0.05) {
                ctx.save();
                ctx.globalAlpha = 0.15 + speedRatio * 0.25;
                ctx.strokeStyle = `hsl(${200 - speedRatio * 40}, 100%, ${60 + speedRatio * 30}%)`;
                ctx.lineWidth = 1.5;
                ctx.setLineDash([3, 5]);
                const ringR = player.radius + 8 + speedRatio * 8;
                ctx.beginPath();
                ctx.arc(player.x, player.y, ringR, 0, Math.PI * 2 * speedRatio);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }
        }

        // ---------- DRAW JOYSTICK ----------
        function drawJoystick(j, label) {
            const cx = j.x,
                cy = j.y;
            ctx.save();
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = 15;
            ctx.fillStyle = 'rgba(20, 35, 50, 0.6)';
            ctx.strokeStyle = 'rgba(80, 140, 180, 0.25)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(cx, cy, j.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;

            let knobX = cx,
                knobY = cy;
            if (j.active) {
                const maxDist = j.radius * 0.6;
                const dist = Math.min(Math.hypot(j.dx, j.dy), maxDist);
                const angle = Math.atan2(j.dy, j.dx);
                knobX = cx + Math.cos(angle) * dist;
                knobY = cy + Math.sin(angle) * dist;
            }
            const gradKnob = ctx.createRadialGradient(knobX - 4, knobY - 4, 4, knobX, knobY, j.knobRadius);
            gradKnob.addColorStop(0, '#8ac4e0');
            gradKnob.addColorStop(0.6, '#4a8aaa');
            gradKnob.addColorStop(1, '#1a3a4a');
            ctx.shadowColor = 'rgba(0, 180, 255, 0.2)';
            ctx.shadowBlur = 12;
            ctx.fillStyle = gradKnob;
            ctx.beginPath();
            ctx.arc(knobX, knobY, j.knobRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(180, 220, 255, 0.2)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.shadowBlur = 0;
            ctx.fillStyle = 'rgba(120, 180, 210, 0.4)';
            ctx.font = '9px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(label, cx, cy + j.radius + 22);
            ctx.restore();
        }

        // ---------- DRAW DASH BUTTON ----------
        function drawDashButton() {
            ctx.save();
            const dx = dashButton.x,
                dy = dashButton.y;
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 15;
            ctx.fillStyle = 'rgba(40, 60, 80, 0.7)';
            ctx.strokeStyle = 'rgba(0, 200, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(dx, dy, dashButton.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#4dd0e1';
            ctx.font = 'bold 18px "Segoe UI", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚡', dx, dy);
            ctx.restore();
        }

        // ---------- TOUCH / MOUSE ----------
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        function isInside(x, y, cx, cy, radius) {
            return (x - cx) ** 2 + (y - cy) ** 2 < radius ** 2;
        }

        // Touch
        canvas.addEventListener('touchstart', (e) => {
            if (!gameStarted) return;
            e.preventDefault();
            const touches = e.touches;

            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                const { x, y } = getCanvasCoords(touch);

                if (isInside(x, y, aimJoystick.x, aimJoystick.y, aimJoystick.radius + 20)) {
                    if (!aimJoystick.active) {
                        aimJoystick.active = true;
                        aimJoystick.touchId = touch.identifier;
                        aimJoystick.dx = x - aimJoystick.x;
                        aimJoystick.dy = y - aimJoystick.y;
                        const maxDist = aimJoystick.radius * 0.6;
                        const dist = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                        if (dist > maxDist) {
                            aimJoystick.dx = (aimJoystick.dx / dist) * maxDist;
                            aimJoystick.dy = (aimJoystick.dy / dist) * maxDist;
                        }
                        aimJoystick.shouldShootOnRelease = true;
                    }
                } else if (isInside(x, y, moveJoystick.x, moveJoystick.y, moveJoystick.radius + 20)) {
                    if (!moveJoystick.active) {
                        moveJoystick.active = true;
                        moveJoystick.touchId = touch.identifier;
                        moveJoystick.dx = x - moveJoystick.x;
                        moveJoystick.dy = y - moveJoystick.y;
                        const maxDist = moveJoystick.radius * 0.6;
                        const dist = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                        if (dist > maxDist) {
                            moveJoystick.dx = (moveJoystick.dx / dist) * maxDist;
                            moveJoystick.dy = (moveJoystick.dy / dist) * maxDist;
                        }
                    }
                } else if (isInside(x, y, dashButton.x, dashButton.y, dashButton.radius + 20)) {
                    dashButton.active = true;
                    dashButton.touchId = touch.identifier;
                    performDash();
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            if (!gameStarted) return;
            e.preventDefault();
            const touches = e.touches;

            for (let i = 0; i < touches.length; i++) {
                const touch = touches[i];
                const { x, y } = getCanvasCoords(touch);

                if (aimJoystick.active && touch.identifier === aimJoystick.touchId) {
                    aimJoystick.dx = x - aimJoystick.x;
                    aimJoystick.dy = y - aimJoystick.y;
                    const maxDist = aimJoystick.radius * 0.6;
                    const dist = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                    if (dist > maxDist) {
                        aimJoystick.dx = (aimJoystick.dx / dist) * maxDist;
                        aimJoystick.dy = (aimJoystick.dy / dist) * maxDist;
                    }
                }

                if (moveJoystick.active && touch.identifier === moveJoystick.touchId) {
                    moveJoystick.dx = x - moveJoystick.x;
                    moveJoystick.dy = y - moveJoystick.y;
                    const maxDist = moveJoystick.radius * 0.6;
                    const dist = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                    if (dist > maxDist) {
                        moveJoystick.dx = (moveJoystick.dx / dist) * maxDist;
                        moveJoystick.dy = (moveJoystick.dy / dist) * maxDist;
                    }
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            if (!gameStarted) return;
            e.preventDefault();
            const touches = e.touches;

            if (aimJoystick.active) {
                let found = false;
                for (let i = 0; i < touches.length; i++) {
                    if (touches[i].identifier === aimJoystick.touchId) {
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    if (aimJoystick.shouldShootOnRelease) {
                        const angle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                        if (Math.hypot(aimJoystick.dx, aimJoystick.dy) > 5) {
                            shoot(angle);
                        }
                        aimJoystick.shouldShootOnRelease = false;
                    }
                    aimJoystick.active = false;
                    aimJoystick.touchId = null;
                    aimJoystick.dx = 0;
                    aimJoystick.dy = 0;
                }
            }

            if (moveJoystick.active) {
                let found = false;
                for (let i = 0; i < touches.length; i++) {
                    if (touches[i].identifier === moveJoystick.touchId) {
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    moveJoystick.active = false;
                    moveJoystick.touchId = null;
                    moveJoystick.dx = 0;
                    moveJoystick.dy = 0;
                }
            }

            if (dashButton.active) {
                let found = false;
                for (let i = 0; i < touches.length; i++) {
                    if (touches[i].identifier === dashButton.touchId) {
                        found = true;
                        break;
                    }
                }
                if (!found) {
                    dashButton.active = false;
                    dashButton.touchId = null;
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchcancel', (e) => {
            if (!gameStarted) return;
            e.preventDefault();
            if (aimJoystick.active && aimJoystick.shouldShootOnRelease) {
                const angle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                if (Math.hypot(aimJoystick.dx, aimJoystick.dy) > 5) {
                    shoot(angle);
                }
                aimJoystick.shouldShootOnRelease = false;
            }
            aimJoystick.active = false;
            aimJoystick.touchId = null;
            aimJoystick.dx = 0;
            aimJoystick.dy = 0;
            moveJoystick.active = false;
            moveJoystick.touchId = null;
            moveJoystick.dx = 0;
            moveJoystick.dy = 0;
            dashButton.active = false;
            dashButton.touchId = null;
        }, { passive: false });

        // Mouse
        let mouseDown = false;
        let mouseOnAim = false;
        let mouseOnMove = false;

        canvas.addEventListener('mousedown', (e) => {
            if (!gameStarted) return;
            const { x, y } = getCanvasCoords(e);
            mouseDown = true;

            if (isInside(x, y, aimJoystick.x, aimJoystick.y, aimJoystick.radius + 20)) {
                mouseOnAim = true;
                aimJoystick.active = true;
                aimJoystick.dx = x - aimJoystick.x;
                aimJoystick.dy = y - aimJoystick.y;
                const maxDist = aimJoystick.radius * 0.6;
                const dist = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                if (dist > maxDist) {
                    aimJoystick.dx = (aimJoystick.dx / dist) * maxDist;
                    aimJoystick.dy = (aimJoystick.dy / dist) * maxDist;
                }
                aimJoystick.shouldShootOnRelease = true;
            } else if (isInside(x, y, moveJoystick.x, moveJoystick.y, moveJoystick.radius + 20)) {
                mouseOnMove = true;
                moveJoystick.active = true;
                moveJoystick.dx = x - moveJoystick.x;
                moveJoystick.dy = y - moveJoystick.y;
                const maxDist = moveJoystick.radius * 0.6;
                const dist = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                if (dist > maxDist) {
                    moveJoystick.dx = (moveJoystick.dx / dist) * maxDist;
                    moveJoystick.dy = (moveJoystick.dy / dist) * maxDist;
                }
            } else if (isInside(x, y, dashButton.x, dashButton.y, dashButton.radius + 20)) {
                performDash();
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!gameStarted) return;
            const { x, y } = getCanvasCoords(e);
            if (mouseDown && mouseOnAim && aimJoystick.active) {
                aimJoystick.dx = x - aimJoystick.x;
                aimJoystick.dy = y - aimJoystick.y;
                const maxDist = aimJoystick.radius * 0.6;
                const dist = Math.hypot(aimJoystick.dx, aimJoystick.dy);
                if (dist > maxDist) {
                    aimJoystick.dx = (aimJoystick.dx / dist) * maxDist;
                    aimJoystick.dy = (aimJoystick.dy / dist) * maxDist;
                }
            }
            if (mouseDown && mouseOnMove && moveJoystick.active) {
                moveJoystick.dx = x - moveJoystick.x;
                moveJoystick.dy = y - moveJoystick.y;
                const maxDist = moveJoystick.radius * 0.6;
                const dist = Math.hypot(moveJoystick.dx, moveJoystick.dy);
                if (dist > maxDist) {
                    moveJoystick.dx = (moveJoystick.dx / dist) * maxDist;
                    moveJoystick.dy = (moveJoystick.dy / dist) * maxDist;
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!gameStarted) return;
            mouseDown = false;
            if (mouseOnAim && aimJoystick.active) {
                if (aimJoystick.shouldShootOnRelease) {
                    const angle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                    if (Math.hypot(aimJoystick.dx, aimJoystick.dy) > 5) {
                        shoot(angle);
                    }
                    aimJoystick.shouldShootOnRelease = false;
                }
                aimJoystick.active = false;
                aimJoystick.dx = 0;
                aimJoystick.dy = 0;
            }
            mouseOnAim = false;
            mouseOnMove = false;
            if (moveJoystick.active) {
                moveJoystick.active = false;
                moveJoystick.dx = 0;
                moveJoystick.dy = 0;
            }
        });

        canvas.addEventListener('mouseleave', () => {
            if (!gameStarted) return;
            if (mouseDown) {
                if (mouseOnAim && aimJoystick.active) {
                    if (aimJoystick.shouldShootOnRelease) {
                        const angle = Math.atan2(aimJoystick.dy, aimJoystick.dx);
                        if (Math.hypot(aimJoystick.dx, aimJoystick.dy) > 5) {
                            shoot(angle);
                        }
                        aimJoystick.shouldShootOnRelease = false;
                    }
                    aimJoystick.active = false;
                    aimJoystick.dx = 0;
                    aimJoystick.dy = 0;
                }
                mouseDown = false;
                mouseOnAim = false;
                mouseOnMove = false;
                if (moveJoystick.active) {
                    moveJoystick.active = false;
                    moveJoystick.dx = 0;
                    moveJoystick.dy = 0;
                }
            }
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (!gameStarted) return;
            const key = e.key.toLowerCase();
            if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' ', 'shift'].includes(key) ||
                e.key === ' ') {
                e.preventDefault();
            }
            if (key === 'w' || e.key === 'ArrowUp') keys.up = true;
            if (key === 's' || e.key === 'ArrowDown') keys.down = true;
            if (key === 'a' || e.key === 'ArrowLeft') keys.left = true;
            if (key === 'd' || e.key === 'ArrowRight') keys.right = true;
            if (key === ' ' || e.key === 'Shift') performDash();
            if (key === 'j') shoot(player.facing);
        });

        window.addEventListener('keyup', (e) => {
            if (!gameStarted) return;
            const key = e.key.toLowerCase();
            if (key === 'w' || e.key === 'ArrowUp') keys.up = false;
            if (key === 's' || e.key === 'ArrowDown') keys.down = false;
            if (key === 'a' || e.key === 'ArrowLeft') keys.left = false;
            if (key === 'd' || e.key === 'ArrowRight') keys.right = false;
        });

        // ---------- MENU ----------
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const weapon = btn.dataset.weapon;
                weaponType = weapon;
                const config = weaponConfigs[weapon];
                shotgun.cooldownDuration = config.cooldownDuration;
                shotgun.pelletCount = config.pelletCount;
                shotgun.spread = config.spread;
                shotgun.pelletSpeed = config.pelletSpeed;
                shotgun.maxRange = config.maxRange;
                shotgun.damageBase = config.damageBase;
                shotgun.cooldown = 0;

                weaponLabel.textContent = weapon.toUpperCase();
                menuOverlay.classList.add('hidden');
                gameStarted = true;

                for (let i = 0; i < 2; i++) spawnEnemy();
            });
        });

        // ---------- GAME LOOP ----------
        let lastTime = 0;

        function gameLoop(time) {
            const dt = Math.min(time - lastTime, 30);
            lastTime = time;
            update(dt);
            render();
            requestAnimationFrame(gameLoop);
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w / 2) r = w / 2;
                if (r > h / 2) r = h / 2;
                this.moveTo(x + r, y);
                this.lineTo(x + w - r, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r);
                this.lineTo(x + w, y + h - r);
                this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
                this.lineTo(x + r, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r);
                this.lineTo(x, y + r);
                this.quadraticCurveTo(x, y, x + r, y);
                return this;
            };
        }

        requestAnimationFrame(gameLoop);

        console.log('💥 Drone Hunter - Missile Explosion & Sniper Beam');
        console.log('🔫 Suicide Missile: explodes on impact!');
        console.log('🔵 Sniper: leaves a blue beam trail that fades away.');
    </script>
</body>
</html>
